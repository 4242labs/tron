# registry.yaml — the PMT index (M-04 / R-PMT). CANON, copied verbatim at seed.
#
# The closed set of LLM-facing worker prompts. The engine resolves a PMT by its id
# (never by path) through this map; the body is imported FRESH at tick from the named
# file in this folder. messages.yaml worker-channel lines reference these ids.
#
# Each PMT is ONE self-contained file (no shared fragments). `slots` are the variables
# the engine fills (str.format); they must match the referencing message's `slots`.
# The prompt COPY is the operator's to author (R-PMT seam 2) — this layer is the mechanism.
# Versioned with the canon (no separate marker — single versioning; M-06 is out of scope).
#
# id scheme: PMT-<PURPOSE> (role-generic — the lane carries the role); a non-role
# qualifier that adds meaning stays (e.g. PMT-SCOPE-REMEDIATION, a SCOPE variant).

# ── The shared reply line (01-11 FX-1) — the SINGLE source of the channel instruction.
# Appended by the prompt loader to every PMT flagged `reply_expected: true`; lint L19 keeps
# the flag set total. A worker reply that never reaches the channel does not exist to TRON.
reply_line: >-
  Reply on the channel, always — `bash {report} {worker_id} "<your report>"` —
  a reply that is not on the channel does not exist to me. A gate reply carries its
  verb as data: put `--tag done|recorded|wall|branch|review-done|clean` (plus
  `--block <your block id>` when you have one, `--branch <name>` when you name a
  branch) before the message, and I read it with no judgment call.

prompts:
  PMT-SPAWN:             { file: PMT-SPAWN.md,             slots: [worker_id, role, persona, report] }   # bespoke check-in line inline (its reply is the literal "online")
  # reply_prefix (S-4, tron-07 review cycle): the prescribed opening of the PMT's expected
  # reply — the SINGLE source. Lint L20 asserts the PMT body and tron.md's classify context
  # carry it verbatim ({block} -> <block>/`<your block id>` prose forms allowed); the engine's
  # close-confirmation guard reads it from here (prompts.close_confirm_prefix), never a
  # hardcoded string.
  PMT-ASSIGN:            { file: PMT-ASSIGN.md,            slots: [worker_id, assignment, merge_path, report], reply_expected: true, reply_prefix: "done" }
  PMT-SCOPE:             { file: PMT-SCOPE.md,             slots: [block, worker_id, report],  reply_expected: true }
  PMT-RECONCILE:         { file: PMT-RECONCILE.md,         slots: [block, after, worker_id, report], reply_expected: true }
  PMT-SCOPE-REMEDIATION: { file: PMT-SCOPE-REMEDIATION.md, slots: [type, worker_id, report],   reply_expected: true }
  PMT-TRIAGE:            { file: PMT-TRIAGE.md,            slots: [detail, sender, worker_id, report], reply_expected: true }
  PMT-DONE-LOCAL:        { file: PMT-DONE-LOCAL.md,        slots: [worker_id, block, report],  reply_expected: true, reply_prefix: "done {block} — local:" }
  PMT-DONE-MERGE:        { file: PMT-DONE-MERGE.md,        slots: [worker_id, block, report],  reply_expected: true }
  PMT-DONE-TRUNK:        { file: PMT-DONE-TRUNK.md,        slots: [worker_id, block, report],  reply_expected: true, reply_prefix: "done {block} — trunk:" }
  PMT-DONE-RECORD:       { file: PMT-DONE-RECORD.md,       slots: [worker_id, block, record_path, report], reply_expected: true, reply_prefix: "recorded {block}" }
  PMT-DONE-REVIEW:       { file: PMT-DONE-REVIEW.md,       slots: [worker_id, report],         reply_expected: true, reply_prefix: "review done" }
  PMT-CLOSE:             { file: PMT-CLOSE.md,             slots: [worker_id, report],         reply_expected: true, reply_prefix: "clean" }
  PMT-CLOSE-DIRTY:       { file: PMT-CLOSE-DIRTY.md,       slots: [worker_id, detail, report], reply_expected: true, reply_prefix: "clean" }
  PMT-PING:              { file: PMT-PING.md,              slots: [worker_id, report],         reply_expected: true }
