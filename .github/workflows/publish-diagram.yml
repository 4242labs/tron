name: Publish BPMN diagram to tron-www

# SSoT: workflow/ (workflow.html + flow-description.html + assets) lives HERE (4242labs/tron).
# tron-www/public/workflow/ holds a GENERATED copy, served at tron.42labs.io/workflow/.
# On a merge that touches the workflow/ folder, open a sync PR on tron-www; merging it deploys (GitHub Pages).
# See docs/bpmn.md. Requires secret WWW_SYNC_TOKEN — a token with write + PR access to 4242labs/tron-www.

on:
  push:
    branches: [main]
    paths:
      - workflow/**
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (tron)
        uses: actions/checkout@v4

      - name: Checkout target (tron-www)
        uses: actions/checkout@v4
        with:
          repository: 4242labs/tron-www
          token: ${{ secrets.WWW_SYNC_TOKEN }}
          path: tron-www

      - name: Sync diagram into public/workflow/ (with generated banner)
        run: |
          set -euo pipefail
          mkdir -p tron-www/public/workflow
          banner='<!-- GENERATED from 4242labs/tron workflow/ — DO NOT EDIT. Edit the source, then re-sync (see docs/bpmn.md). -->'
          cp workflow/workflow.html          tron-www/public/workflow/index.html
          cp workflow/flow-description.html   tron-www/public/workflow/flow-description.html
          cp workflow/favicon-32x32.png       tron-www/public/workflow/favicon-32x32.png
          cp workflow/favicon-192x192.png     tron-www/public/workflow/favicon-192x192.png
          cp workflow/nyan-cat.gif            tron-www/public/workflow/nyan-cat.gif
          # M-06: the page's version+build-date corner stamp reads these two files, synced fresh every publish.
          cp VERSION                          tron-www/public/workflow/VERSION
          date -u +%Y-%m-%d > tron-www/public/workflow/BUILD_DATE
          for f in index.html flow-description.html; do
            target="tron-www/public/workflow/$f"
            awk -v b="$banner" '{print} /<head>/ && !done {print b; done=1}' "$target" > "$target.tmp"
            mv "$target.tmp" "$target"
          done

      - name: Open sync PR on tron-www
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WWW_SYNC_TOKEN }}
          path: tron-www
          branch: sync/bpmn-diagram
          delete-branch: true
          title: "Sync BPMN diagram from tron"
          commit-message: "chore: sync BPMN diagram from 4242labs/tron"
          body: |
            Automated publish of `workflow/` (diagram + assets) from **4242labs/tron**.

            This is a **generated copy** — do not hand-edit. Merging this PR deploys to
            `tron.42labs.io/workflow/` (GitHub Pages, on push to `main`).

      - name: Auto-merge the sync PR (generated copy — no second review needed)
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WWW_SYNC_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo 4242labs/tron-www --merge --delete-branch
