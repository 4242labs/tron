name: release-please

# Maintains VERSION + CHANGELOG.md from conventional-commit history on merge to main.
# See CONTRIBUTING.md (commit convention) and blocks/m-06-blueprint-versioning.md.
# Uses the repository secret WWW_SYNC_TOKEN to open the release PR (the default GITHUB_TOKEN
# can't create PRs).

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual re-run, e.g. after a bootstrap-tag fix

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.WWW_SYNC_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
