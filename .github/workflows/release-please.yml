name: release-please

# Maintains VERSION + CHANGELOG.md from conventional-commit history on merge to main.
# See CONTRIBUTING.md (commit convention) and blocks/m-06-blueprint-versioning.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
