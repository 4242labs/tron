name: engine-ci

# The deterministic engine ships its own selftests — each module is runnable as
# `python3 <module>.py [--selftest]` and gates on real behaviour (truth-gate runs
# use throwaway git repos; doc modules assert generated docs are in sync). This
# workflow runs the whole suite on every push/PR.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:            # name matches the required status check on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Configure git identity (gate selftests shell out to real git)
        run: |
          git config --global user.email "ci@tron.local"
          git config --global user.name "tron-ci"

      - name: Run the engine selftest suite
        run: |
          set -euo pipefail
          fail=0
          run() { echo "::group::$*"; if ! python3 $*; then echo "FAILED: $*"; fail=1; fi; echo "::endgroup::"; }
          run tron.py --selftest
          run gate.py
          run tg.py
          run events.py
          run workflow.py
          run bpmn.py
          run glossary.py
          run evaluation/harness.py --selftest
          exit $fail
