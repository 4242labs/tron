# workflow.yaml — per-project COMPOSITION (B2 canon instance)
# In the event-table model the *behaviour* (trigger -> step -> on-complete) is fixed
# canon: it lives in the engine's table (mirrors tron-workflow-v2-skills.csv) and in
# routing.yaml's grammar. This file holds ONLY the per-project knobs the engine reads:
# how many workers, how fast the architect drains, reviewer cadence, liveness, git.
# The seeder (B1) rewrites this per project; this is the default it ships with.
# Validated against routing.yaml + project.yaml by blueprint-lint (contracts §9).

# ── Knobs (per-project tunables the engine reads by name) ──
knobs:
  worker_count: ~          # REQUIRED per-session input: max concurrent workers
                           # (engineers + reviewers share this pool; architect EXCLUDED).
                           # NO baked default — start refuses until the operator sets it.
  architect_count: 1       # persistent architect queue drainers — the bottleneck knob.
  git: on                  # workflow commits (drives R8 + any ci availability)
  silence_ping_min: 6      # worker silent this many minutes -> heartbeat ping
  silence_escalate_min: 8  # silent past this -> engine emits worker:stalled (> ping)

# ── Reviewer cadence (PULL): <type> -> blocks between reviews ──
# Per-type counter +1 on every block:next:done; due at threshold; reset on dispatch.
# Checked in SWITCHBOARD FILL SLOTS, never auto-fired. Types are open (code|security|data|…).
cadence:
  code: 3

# ── Peer-consult pairs (R2) — canon ships none; the seeder sets them per project ──
peer_consults: []

# ── Session lifecycle ──
session:
  persistent_architect: true   # one architect spawned at bootup, alive until session end
