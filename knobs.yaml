# knobs.yaml — per-project KNOBS (B2 canon instance)
# The *behaviour* (trigger -> step -> on-complete) is NOT here: it is the fixed engine
# event table (PULSE + SWITCHBOARD), the same for every project, plus routing.yaml's
# grammar. This file holds ONLY the per-project knobs the engine reads by name: how many
# workers, how fast the architect drains, reviewer cadence, WAKE timing, liveness, git.
# The seeder (B1) rewrites this per project; this is the default it ships with.
# Validated against routing.yaml + project.yaml by blueprint-lint (contracts §9).

# ── Knobs (per-project tunables the engine reads by name) ──
knobs:
  worker_count: ~          # REQUIRED per-session input: max concurrent workers
                           # (every BUILD-/REVIEW-bound role shares this pool; the persistent
                           # TRIAGE/spec_owner role is EXCLUDED).
                           # NO baked default — start refuses until the operator sets it.
  # NOTE (ADR-0002 D4, 01-33): the 01-21/01-30 `worker_model` knob ({architect, other}) is
  # RETIRED — the model source is now `meta/tron/roles.yaml`'s per-role `model:` field,
  # resolved by fsm._model_for_role and validated fail-closed at Engine construction
  # (roles.RolesError: absent/unknown is boot-fatal, no default, ever). There is no
  # per-role model knob here anymore; it "subsumes the per-role model question into
  # config" — config is never silent, because a bad roles.yaml refuses to boot at all.
  architect_count: 1       # persistent architect queue drainers — the bottleneck knob.
  git: on                  # whether the build commits via git (drives R8 + any ci availability)
  ask_before_merging: false  # ON -> the trunk-merge step pauses for the operator (T8); the bootup
                           # question sets it per-session. Default off: TRON instructs merges itself.
                           # (Prod promotion is operator-only regardless — never a worker stage.)
  silence_ping_min: 6      # worker silent this many minutes -> heartbeat ping
  silence_escalate_min: 8  # silent past this -> engine emits worker:stalled (> ping)
  # DONE-gate liveness caps — ticks stalled at the same stage before escalating (MG-01,
  # rewired by 01-11: idle = the runner's own `state: idle`, a deterministic file read —
  # heartbeat freshness can't mask it). Read by name via knobs.get(key, default).
  # ── gate pacing (S-1, tron-07): ONE wall-clock law. These are MULTIPLIERS of
  # wake_ceiling_sec — "N ticks' worth of time" — measured against continuous runner-idle,
  # never tick counts (event bursts and event-starved timers both lie about time).
  # Derived detection latencies (R-8) at the default wake_ceiling_sec 30:
  #   re-nudge an idle worker after  gate_nudge_after x 30s = 60s of idle;
  #   escalate the gate after        gate_idle_cap   x 30s = 90s of idle;
  #   force-release a silent close   gate_close_cap  x 30s = 90s of idle.
  # A WORKING runner never accrues — its own turn deadline (TRON_TURN_TIMEOUT_S, runner-
  # declared) bounds long turns; past it the sweep escalates + hard-kills after a grace.
  gate_idle_cap: 3         # x wake_ceiling_sec of continuous idle at one stage -> escalate
  gate_nudge_after: 2      # x wake_ceiling_sec of continuous idle -> re-send the stage prompt once
                           # (fresh mailbox seq); keep < gate_idle_cap
  gate_close_cap: 3        # x wake_ceiling_sec of idle at close -> force release
                           # DUAL USE (01-18 addendum): this ONE knob reads as two different
                           # shapes at its two call sites in fsm.py — _drive_close's own
                           # wall-clock pace (a wake_ceiling_sec MULTIPLIER, via _pace) and
                           # _confirm_close's close_nudges (a plain ATTEMPTS COUNT of failed
                           # confirm retries, via knobs.get + int()). Retuning this value
                           # moves BOTH; they are not independently adjustable today
                           # (splitting them is new config surface — deferred, net-zero).
  # ── operator-case pacing (F-4/R-7, tron-13): same wall-clock law. A parked case
  # re-pings the operator every case_reping_after x wake_ceiling_sec; after
  # case_reping_max unanswered re-pings it SAFE-PARKS (named, resumable — the session
  # runs on and the case settles on the operator's reply at any later time). Derived
  # latencies at the default ceiling 30s (R-8): re-pings at 10/20/30 min, parked at 40.
  case_reping_after: 20    # x wake_ceiling_sec between operator re-pings of a parked case
  case_reping_max: 3       # unanswered re-pings before the case safe-parks
  # WAKE pulse-timing bounds (the daemon reads these, 01-04). Fixed knobs: edit here,
  # never asked at start, never changed by a runtime command. cooldown <= ceiling.
  wake_cooldown_sec: 5     # min gap between ticks — floor (debounce a chatty fleet)
  wake_ceiling_sec: 30     # max latency before a tick fires anyway — the cadence ceiling
  # Abandon-flag bounded-window escalation (ADR-0002 D3 third bullet, 01-31): an abandon
  # flag rides the architect's next dispatched touchpoint if one comes first; otherwise,
  # left unread this many MINUTES, it escalates to exactly ONE ordinary case — never left
  # to poll forever, never spamming beyond the one case (fsm._sweep_abandon_flags).
  abandon_flag_window: 60
  # Scratch-carve observation budget (ADR-0002 D1, 01-32 T2): a worker spawns into its
  # OWN TRON-owned scratch dir (`meta/agents/tron/scratch/<wid>/`) and its first ritual
  # act is carving its own worktree + branch there — TRON verifies by OBSERVATION
  # (never a checkout it performs itself). Ticks of budget from dispatch before a
  # not-yet-carved engineer becomes a bootstrap wall (architect-first, same case
  # machinery as every other violation). Default 5.
  carve_observe_ticks: 5
  # Grant TTL (ADR-0002 D2, 01-32 T3): wall-clock MINUTES a minted merge/close grant
  # stays LIVE before it expires. Expiry re-opens the case LOUDLY (architect-first,
  # forensic failure record) — never a silent re-mint; land.sh refuses an expired
  # grant on its own read of the same file. Default 60.
  grant_ttl: 60

# ── Reviewer cadence (PULL): <type> -> blocks between reviews ──
# Per-type counter +1 on every block:next:done; due at threshold; reset on dispatch.
# Checked in SWITCHBOARD FILL SLOTS, never auto-fired. Types are open (code|security|data|…).
cadence:
  code: 3

# ── Peer-consult pairs (R2) — canon ships none; the seeder sets them per project ──
peer_consults: []

# NOTE (ADR-0002 D4, 01-33): the `session.persistent_architect` knob is RETIRED — whether
# the spec_owner role is spawned once at boot and kept alive for the session is now that
# role's OWN `persistent:` flag in roles.yaml (fsm._spec_owner_persistent), exactly like
# every other per-role fact. No `session:` block ships here anymore.
