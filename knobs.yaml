# knobs.yaml — per-project KNOBS (B2 canon instance)
# The *behaviour* (trigger -> step -> on-complete) is NOT here: it is the fixed engine
# event table (PULSE + SWITCHBOARD), the same for every project, plus routing.yaml's
# grammar. This file holds ONLY the per-project knobs the engine reads by name: how many
# workers, how fast the architect drains, reviewer cadence, WAKE timing, liveness, git.
# The seeder (B1) rewrites this per project; this is the default it ships with.
# Validated against routing.yaml + project.yaml by blueprint-lint (contracts §9).

# ── Knobs (per-project tunables the engine reads by name) ──
knobs:
  worker_count: ~          # REQUIRED per-session input: max concurrent workers
                           # (engineers + reviewers share this pool; architect EXCLUDED).
                           # NO baked default — start refuses until the operator sets it.
  architect_count: 1       # persistent architect queue drainers — the bottleneck knob.
  git: on                  # whether the build commits via git (drives R8 + any ci availability)
  ask_before_merging: false  # ON -> the trunk-merge step pauses for the operator (T8); the bootup
                           # question sets it per-session. Default off: TRON instructs merges itself.
                           # (Prod promotion is operator-only regardless — never a worker stage.)
  silence_ping_min: 6      # worker silent this many minutes -> heartbeat ping
  silence_escalate_min: 8  # silent past this -> engine emits worker:stalled (> ping)
  # WAKE pulse-timing bounds (the daemon reads these, 01-04). Fixed knobs: edit here,
  # never asked at start, never changed by a runtime command. cooldown <= ceiling.
  wake_cooldown_sec: 5     # min gap between ticks — floor (debounce a chatty fleet)
  wake_ceiling_sec: 30     # max latency before a tick fires anyway — the cadence ceiling

# ── Reviewer cadence (PULL): <type> -> blocks between reviews ──
# Per-type counter +1 on every block:next:done; due at threshold; reset on dispatch.
# Checked in SWITCHBOARD FILL SLOTS, never auto-fired. Types are open (code|security|data|…).
cadence:
  code: 3

# ── Peer-consult pairs (R2) — canon ships none; the seeder sets them per project ──
peer_consults: []

# ── Session lifecycle ──
session:
  persistent_architect: true   # one architect spawned at bootup, alive until session end
