# manifest.yaml — the MANIFEST: live run-state (runtime; gitignored)
# TRON's per-session memory: workers, counters, cadence, the architect queue, and
# the disposable trunk-read caches. Written atomically every tick (tmp + mv). Do
# NOT hand-edit — the engine manages it. Seeded from this template; the engine
# fills it via setdefault, so missing keys are created on first run.
#
# TRON owns no pipeline: `pipeline` below is a READ-ONLY cache of the project's
# canon trunk (pipeline.md + blocks/*.md), rebuilt every wake. Status lives on
# trunk and only agents write it (via PR).

session:
  started_at: null            # set at bootup; reset to null at session-end
  ended_at: null

# ── FSM context (passed to judgment tools as block_ctx) ──
fsm: {}

# ── Run scoping chosen at bootup (session.scope): mode in all | phase | range ──
scope:
  mode: all
  value: null

# ── Active workers (source of truth for "what's running now") ──
# list of {id, role, session_id, shortid, spawned_at, status, block, [rtype], [current_job]}
# status in: spawning | working | idle (architect) | released
active_workers: []

# ── Counters (stall counts, etc.) ──
counters: {}

# ── Reviewer cadence (PULL): <type> -> merged-✅ blocks since its last review ──
cadence: {}
seen_done: []                 # block IDs already counted toward cadence (trunk dedup)

# ── Architect FIFO queue: queued {kind: forward|reconcile|log|triage, block, [type]} jobs ──
# forward = author a missing block file; reconcile = re-check the next scoped block vs a
# just-finished block's drift (M-05); log = log-review; triage = sort an unclassified input.
architect_queue: []

# ── Blocks the architect has reconciled forward (readiness gate lifted, M-05) ──
reconciled: []

# ── DONE-gate progress per block: {block_id: {stage, pr, post_merge_nudges}} (runtime only) ──
# stage in: validate-local | ci | ci-wait | merge | post-merge
gate: {}

# ── In-flight PRs keyed by head branch (trunk.open_prs cache) ──
open_prs: {}

# ── Blocks parked on an operator decision (runtime escalation; never git) ──
blocked: []

# ── Parked operator cases keyed by correlation id (02-10 stamps it; reply settles by it) ──
# {CASE-NNN: {block, kind: wall|await, worker_id, detail, raised_at, decision}}
pending_cases: {}

# ── Operator-pre-registered await checkpoints (rung a of the await ladder, R-AWAIT) ──
checkpoints: []

# ── Operator run-control flag PULSE checks each tick (R-HALT): absent | pause | drain | halt ──
# run_control: pause   # set/reset by PARLEY commands (pause/drain/resume/halt); not a classify tag

# ── Per-session merge knob (realign §8): APPROVED | ASK. Reset each session. ──
approvals:
  merge_staging: APPROVED
  promote_main: ASK

# ── Live config (this session) ──
live_config:
  worker_count: null          # set at session start (engineers + reviewers; architect excluded)

# ── Pipeline (READ-ONLY trunk cache; rebuilt every wake — never authority) ──
# list of merged rows: {id, task, status, phase, section, order, depends_on,
#                       reviewer_class, merge, deploy, has_block_file}
pipeline: []

# ── Last sweep ──
last_sweep:
  at: null
  sweeps_this_session: 0
