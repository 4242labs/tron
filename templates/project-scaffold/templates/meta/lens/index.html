<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__PROJECT_NAME__</title>
<meta name="theme-color" content="#FDFAF5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#06101A" media="(prefers-color-scheme: dark)">
<link rel="icon" href="assets/favicons/favicon.ico" sizes="32x32">
<link rel="icon" type="image/svg+xml" href="assets/favicons/icon.svg">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/favicon-192x192.png">
<link rel="apple-touch-icon" href="assets/favicons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     RAW TOKENS — 42labs Design System
     ========================================================= */
  :root {
    --canvas-warm: #FDFAF5;
    --canvas-cool: #FFFFFF;
    --cream: #FEF3E2;
    --linen: #E8E3DD;
    --mid-stone: #B8AFA8;
    --stone: #756D68;
    --graphite: #433E3A;
    --charcoal: #1C1917;
    --copper-soft: #FDECD8;
    --copper-border: #F5C9A1;
    --copper-focus: #F59342;
    --copper: #E2711D;
    --copper-dark: #CC5D0A;
    --copper-ink: #B45309;
    --copper-ink-dark: #92400E;
    --blue: #3B82F6;
    --blue-dark: #2563EB;

    --void: #06101A;
    --panel: #121C26;
    --panel-alt: #16222D;
    --divider: #2B3540;
    --mist: #6C7C89;
    --fog: #949FA8;
    --off-white: #F2F4F5;
    --mint: #00FFA7;
    --mint-hover: #09C385;
    --mint-soft: #051F14;
    --mint-border: #0E4A34;
    --blue-light: #60A5FA;

    /* Status ramps — both themes */
    --st-done: #16A34A;
    --st-progress: #D97706;
    --st-todo: #6B7280;
    --st-deferred: #9CA3AF;
    --st-debt: #EA580C;
    --st-cut: #B91C1C;
    --st-folded: #7C3AED;
    --st-split: #0EA5E9;

    --font-heading: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;

    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
    --sp-6: 24px; --sp-8: 32px; --sp-12: 48px; --sp-16: 64px;
    --r-2: 6px; --r-3: 8px; --r-4: 12px; --r-full: 999px;

    --pad-card-default: var(--sp-6);
    --pad-x: clamp(20px, 5vw, 32px);
    --w-xl: 1180px;
  }

  /* SEMANTIC tokens (light default) */
  :root {
    --surface: var(--canvas-warm);
    --surface-alt: var(--canvas-cool);
    --surface-muted: var(--cream);
    --border: var(--linen);
    --fg: var(--charcoal);
    --fg-2: var(--graphite);
    --fg-muted: var(--stone);
    --fg-disabled: var(--mid-stone);
    --accent: var(--copper);
    --accent-hover: var(--copper-dark);
    --accent-solid: var(--copper-ink);
    --accent-solid-hover: var(--copper-ink-dark);
    --accent-soft: var(--copper-soft);
    --accent-border: var(--copper-border);
    --accent-focus: var(--copper-focus);
    --accent-on: #FFFFFF;
    --link: var(--blue-dark);
    --link-hover: var(--blue);
  }
  body.theme-dark {
    --surface: var(--void);
    --surface-alt: var(--panel);
    --surface-muted: var(--panel-alt);
    --border: var(--divider);
    --fg: var(--off-white);
    --fg-2: #C8CED3;
    --fg-muted: var(--fog);
    --fg-disabled: var(--mist);
    --accent: var(--mint);
    --accent-hover: var(--mint-hover);
    --accent-solid: var(--mint);
    --accent-solid-hover: var(--mint-hover);
    --accent-soft: var(--mint-soft);
    --accent-border: var(--mint-border);
    --accent-focus: var(--mint);
    --accent-on: var(--void);
    --link: var(--blue-light);
    --link-hover: #93C5FD;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.55;
    color: var(--fg);
    background: var(--surface);
    -webkit-font-smoothing: antialiased;
    transition: background 150ms ease, color 150ms ease;
  }
  main {
    padding-block: var(--sp-12);
    padding-inline: var(--pad-x);
    max-width: var(--w-xl);
    margin-inline: auto;
  }

  /* HEADER */
  header.page-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--sp-6);
    margin-bottom: var(--sp-6);
    padding-bottom: var(--sp-6);
    border-bottom: 1px solid var(--border);
  }
  .page-head-text { flex: 1; min-width: 0; }
  .view-title {
    font-family: var(--font-heading);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0 0 var(--sp-2);
    color: var(--fg);
  }
  .page-meta {
    margin: 0;
    font-size: 14px;
    color: var(--fg-muted);
  }
  .page-meta code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--surface-muted);
    padding: 1px 6px;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
  }
  .header-controls { display: flex; align-items: center; gap: var(--sp-2); flex-shrink: 0; }
  .btn-tool {
    display: inline-flex; align-items: center; justify-content: center;
    padding: var(--sp-2);
    border-radius: var(--r-2);
    background: var(--surface);
    color: var(--fg-muted);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .btn-tool:hover { background: var(--surface-alt); color: var(--fg); }
  .btn-tool:focus-visible { outline: none; border-color: var(--accent-focus); box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn-tool svg,
  .theme-switch button svg { width: 16px; height: 16px; display: block; }
  /* Toggle-all icon swap: collapse glyph by default; expand when nothing open */
  #toggle-all-btn .ic-expand { display: none; }
  #toggle-all-btn.is-collapsed .ic-collapse { display: none; }
  #toggle-all-btn.is-collapsed .ic-expand { display: block; }
  .theme-switch {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--sp-1);
    padding: var(--sp-1);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-2);
  }
  .theme-switch button {
    display: inline-flex; align-items: center; justify-content: center;
    padding: var(--sp-2) var(--sp-3);
    border: 0; border-radius: var(--r-2);
    background: transparent; color: var(--fg-muted);
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  .theme-switch button.active {
    background: var(--surface-alt); color: var(--fg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  body.theme-dark .theme-switch button.active { box-shadow: 0 1px 2px rgba(0,0,0,0.4); }

  /* TABS */
  .tabs {
    display: flex; gap: var(--sp-2);
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--sp-4);
    overflow-x: auto;
  }
  .tab {
    flex-shrink: 0;
    background: transparent;
    border: 0;
    padding: var(--sp-3) var(--sp-4);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--fg-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 120ms ease, border-color 120ms ease;
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
  }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); border-bottom-color: var(--accent-solid); }
  .tab-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    background: var(--surface-muted);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: var(--r-full);
    font-variant-numeric: tabular-nums;
  }
  .tab.active .tab-count { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent-solid); }

  /* FILTER BAR — canonical .chip per 42labs DS (aria-pressed, accent-soft on selected) */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--sp-2);
    margin-bottom: var(--sp-6);
    align-items: center;
  }
  .chip-group {
    display: inline-flex;
    flex-wrap: wrap;
    gap: var(--sp-2);
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 14px;
    line-height: 1;
    padding: var(--sp-2) var(--sp-3);
    border-radius: var(--r-full);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    white-space: nowrap;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }
  .chip:hover { background: var(--surface-muted); border-color: var(--fg-muted); }
  .chip[aria-pressed="true"] {
    background: var(--accent-soft);
    border-color: var(--accent-border);
    color: var(--accent);
    font-weight: 500;
  }
  .chip[aria-pressed="true"]:hover { border-color: var(--accent); color: var(--accent-hover); }
  .chip:focus-visible { outline: none; border-color: var(--accent-focus); box-shadow: 0 0 0 3px var(--accent-soft); }
  .chip .chip-emoji { font-size: 13px; line-height: 1; }
  .chip .chip-count {
    font-family: var(--font-mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }
  .chip.is-muted { opacity: 0.5; }
  .filter-actions {
    margin-left: auto;
    display: flex;
    gap: var(--sp-2);
  }
  .filter-link {
    background: transparent;
    border: 0;
    color: var(--fg-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--r-2);
  }
  .filter-link:hover { color: var(--fg); background: var(--surface-muted); }

  /* PHASE CARD */
  details.phase {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: var(--r-3);
    margin-bottom: var(--sp-3);
    overflow: hidden;
    scroll-margin-top: var(--sp-4);
  }
  details.phase > summary {
    list-style: none;
    cursor: pointer;
    padding: var(--sp-4) var(--pad-card-default);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-4);
    transition: background 120ms ease;
  }
  details.phase > summary::-webkit-details-marker { display: none; }
  details.phase > summary:hover { background: var(--surface-muted); }
  details.phase[open] > summary { border-bottom: 1px solid var(--border); }
  .phase-head-text { flex: 1; min-width: 0; }
  .phase-title-line {
    font-family: var(--font-heading);
    font-weight: 500;
    font-size: 20px;
    line-height: 1.3;
    color: var(--fg);
    letter-spacing: -0.005em;
  }
  .phase-status-line {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 2px;
    font-family: var(--font-mono);
  }
  .phase-blurb {
    font-size: 14px;
    line-height: 1.5;
    color: var(--fg-muted);
    margin-top: var(--sp-1);
  }
  .phase-stats {
    display: inline-flex;
    gap: var(--sp-2);
    flex-wrap: wrap;
    margin-top: var(--sp-2);
  }
  .phase-stat {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    background: var(--surface-muted);
    padding: 1px 6px;
    border-radius: var(--r-full);
    border: 1px solid var(--border);
  }
  .phase-caret {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--fg-muted);
    flex-shrink: 0;
    transition: transform 200ms ease;
    line-height: 1;
  }
  details.phase[open] > summary .phase-caret { transform: rotate(180deg); }

  /* BLOCK / TILE */
  ul.tiles {
    list-style: none;
    margin: 0;
    padding: 0;
    background: transparent;
  }
  li.tile {
    display: flex;
    align-items: flex-start;
    gap: var(--sp-3);
    padding: var(--sp-3) var(--pad-card-default);
    border-bottom: 1px solid var(--border);
    transition: background 120ms ease;
    cursor: pointer;
  }
  li.tile:last-child { border-bottom: 0; }
  li.tile:hover { background: var(--surface-muted); }
  li.tile.is-hidden { display: none; }
  li.tile .tile-status {
    font-size: 14px;
    line-height: 1.5;
    flex: 0 0 auto;
    width: 24px;
    text-align: center;
  }
  li.tile .tile-body {
    flex: 1;
    min-width: 0;
  }
  li.tile .tile-title {
    font-size: 14px;
    line-height: 1.4;
    color: var(--fg);
    display: block;
  }
  li.tile.striked .tile-title {
    color: var(--fg-disabled);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
  }
  li.tile .tile-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    margin-right: var(--sp-2);
    background: var(--surface-muted);
    padding: 1px 5px;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
  }
  /* STATUS BADGE — per 42labs DS .badge (mono / 12px / uppercase / r-2). */
  .badge {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: var(--r-2);
    border: 1px solid transparent;
    margin-top: var(--sp-1);
  }
  /* DS canon variants: success / error / warning / info — map our 8 statuses onto them. */
  .badge.s-done       { background: rgba(22,163,74,0.10);  color: #15803D; border-color: rgba(22,163,74,0.30); }
  .badge.s-in_progress{ background: rgba(217,119,6,0.10);  color: #B45309; border-color: rgba(217,119,6,0.30); }
  .badge.s-todo       { background: var(--surface-muted);  color: var(--fg-muted); border-color: var(--border); }
  .badge.s-deferred   { background: var(--surface-muted);  color: var(--fg-muted); border-color: var(--border); }
  .badge.s-debt       { background: rgba(234,88,12,0.10);  color: #C2410C; border-color: rgba(234,88,12,0.30); }
  .badge.s-cut        { background: rgba(185,28,28,0.10);  color: #B91C1C; border-color: rgba(185,28,28,0.30); }
  .badge.s-folded     { background: rgba(124,58,237,0.10); color: #6D28D9; border-color: rgba(124,58,237,0.30); }
  .badge.s-split      { background: rgba(14,165,233,0.10); color: #0369A1; border-color: rgba(14,165,233,0.30); }
  .badge.s-unknown    { background: var(--surface-muted);  color: var(--fg-muted); border-color: var(--border); }
  body.theme-dark .badge.s-done       { background: rgba(34,197,94,0.10);  color: #4ADE80; border-color: rgba(34,197,94,0.30); }
  body.theme-dark .badge.s-in_progress{ background: rgba(251,191,36,0.10); color: #FBBF24; border-color: rgba(251,191,36,0.30); }
  body.theme-dark .badge.s-debt       { background: rgba(251,146,60,0.10); color: #FB923C; border-color: rgba(251,146,60,0.30); }
  body.theme-dark .badge.s-cut        { background: rgba(248,113,113,0.10);color: #F87171; border-color: rgba(248,113,113,0.30); }
  body.theme-dark .badge.s-folded     { background: rgba(167,139,250,0.10);color: #A78BFA; border-color: rgba(167,139,250,0.30); }
  body.theme-dark .badge.s-split      { background: rgba(56,189,248,0.10); color: #38BDF8; border-color: rgba(56,189,248,0.30); }

  .empty-state {
    padding: var(--sp-12) var(--sp-6);
    text-align: center;
    color: var(--fg-muted);
    font-size: 14px;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: var(--sp-12) var(--pad-x);
    z-index: 100;
    overflow-y: auto;
  }
  .modal-backdrop.is-open { display: flex; }
  .modal {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: var(--r-4);
    max-width: 760px;
    width: 100%;
    max-height: calc(100vh - var(--sp-12) * 2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head {
    padding: var(--sp-4) var(--sp-6);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: var(--sp-3);
  }
  .modal-head-text { flex: 1; min-width: 0; }
  .modal-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    background: var(--surface-muted);
    padding: 2px 6px;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
    margin-right: var(--sp-2);
  }
  .modal-title {
    font-family: var(--font-heading);
    font-weight: 500;
    font-size: 18px;
    line-height: 1.35;
    color: var(--fg);
    margin: var(--sp-2) 0 0;
  }
  /* modal-status now reuses .badge — kept selector for inline alignment with header */
  .modal-status { vertical-align: middle; }
  .modal-body {
    padding: var(--sp-6);
    overflow-y: auto;
    flex: 1;
    font-size: 14px;
    line-height: 1.65;
    color: var(--fg-2);
  }
  .modal-body code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--surface-muted);
    padding: 1px 5px;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
  }
  .modal-body a { color: var(--link); text-decoration: none; text-underline-offset: 3px; }
  .modal-body a:hover { color: var(--link-hover); text-decoration: underline; }
  .modal-body p { margin: 0 0 var(--sp-3); }
  .modal-body ul, .modal-body ol { padding-left: var(--sp-6); margin: 0 0 var(--sp-3); }
  .modal-body strong { color: var(--fg); }
  .modal-body pre {
    background: var(--surface-muted);
    border: 1px solid var(--border);
    padding: var(--sp-3);
    border-radius: var(--r-2);
    overflow-x: auto;
    font-size: 12px;
  }
  .modal-close {
    background: transparent;
    border: 0;
    color: var(--fg-muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: var(--sp-2);
    border-radius: var(--r-2);
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--surface-muted); color: var(--fg); }

  /* FOOTER */
  footer.credit {
    margin-top: var(--sp-16);
    padding-top: var(--sp-6);
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--fg);
  }
  footer.credit a {
    color: var(--link);
    text-decoration: none;
    text-underline-offset: 3px;
    transition: color 120ms ease;
  }
  footer.credit a:hover { color: var(--link-hover); text-decoration: underline; }
  footer.credit .sep { display: inline-block; margin: 0 var(--sp-3); color: var(--fg-muted); }

  @media (max-width: 720px) {
    header.page-head { flex-direction: column; align-items: stretch; }
    .header-controls { flex-wrap: wrap; }
    .modal-backdrop { padding: var(--sp-4); }
  }

  /* Print */
  @media print {
    body { background: white; color: black; }
    .header-controls, .filter-bar, .tabs { display: none; }
    details.phase, details.phase > summary { background: white !important; border-color: #ccc !important; }
    details.phase > summary { cursor: default; }
    details.phase { break-inside: avoid; }
    li.tile:hover, details.phase > summary:hover { background: transparent !important; }
    .modal-backdrop { display: none !important; }
  }
</style>
</head>
<body>
<main>

<header class="page-head">
  <div class="page-head-text">
    <h1 class="view-title">__PROJECT_NAME__</h1>
    <p class="page-meta" id="page-meta"></p>
  </div>
  <div class="header-controls">
    <button type="button" class="btn-tool" id="print-btn" title="Print or save as PDF" aria-label="Print or save as PDF">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14" rx="1"/></svg>
    </button>
    <button type="button" class="btn-tool" id="toggle-all-btn" title="Collapse all phases" aria-label="Collapse all phases">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="ic-collapse"><path d="m7 20 5-5 5 5"/><path d="m7 4 5 5 5-5"/></svg>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="ic-expand"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
    </button>
    <div class="theme-switch" role="tablist" aria-label="Theme">
      <button type="button" id="theme-light" class="active" aria-pressed="true" aria-label="Light theme" title="Light theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
      <button type="button" id="theme-dark" aria-pressed="false" aria-label="Dark theme" title="Dark theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button type="button" class="tab active" data-tab="pipeline">Pipeline <span class="tab-count" id="count-pipeline">·</span></button>
  <button type="button" class="tab" data-tab="tech_debt">Tech Debt <span class="tab-count" id="count-tech_debt">·</span></button>
  <button type="button" class="tab" data-tab="backlog">Backlog <span class="tab-count" id="count-backlog">·</span></button>
  <button type="button" class="tab" data-tab="archive">Archive <span class="tab-count" id="count-archive">·</span></button>
</nav>

<div class="filter-bar" id="filter-bar"></div>

<section id="view"></section>

<footer class="credit">
  <a href="https://tron.build/" target="_blank" rel="noopener noreferrer">BUILT WITH TRON</a>
  <span class="sep">&middot;</span>
  <a href="https://42labs.io" target="_blank" rel="noopener noreferrer">&hearts; 42LABS</a>
  <span class="sep">&middot;</span>
  <span id="generated-at"></span>
</footer>

</main>

<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal" id="modal-card">
    <div class="modal-head">
      <div class="modal-head-text">
        <div>
          <span class="modal-id" id="modal-id"></span>
          <span class="modal-status" id="modal-status"></span>
        </div>
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!--__LENS_DATA__-->

<script>
(function () {
  var dataEl = document.getElementById('__lens_data__');
  var data = null;
  try { data = dataEl ? JSON.parse(dataEl.textContent) : null; } catch (e) { console.error('lens: JSON parse failed', e); }
  if (!data) {
    document.getElementById('view').innerHTML = '<div class="empty-state">No data — run <code>node build.mjs</code></div>';
    return;
  }
  var STATUSES = data.statuses;
  var STATUS_KEYS = STATUSES.map(function (s) { return s.key; });

  // ----- State -----
  var state = {
    tab: 'pipeline',
    activeStatuses: new Set(STATUS_KEYS), // all on by default
  };

  // ----- Header meta -----
  document.getElementById('page-meta').innerHTML =
    '<code>pipeline.md</code> · <code>pipeline-archive.md</code> · <code>backlog.md</code>';
  document.getElementById('generated-at').textContent =
    'Generated ' + new Date(data.generated_at).toLocaleString();

  // ----- Tab counts -----
  function totalForTab(tab) {
    var s = data.stats[tab];
    return s ? s.total : 0;
  }
  ['pipeline','tech_debt','backlog','archive'].forEach(function (t) {
    var el = document.getElementById('count-' + t);
    if (el) el.textContent = (data.stats[t] && data.stats[t].total) || 0;
  });

  // ----- Filter bar -----
  function buildFilterBar() {
    var bar = document.getElementById('filter-bar');
    bar.innerHTML = '';
    var group = document.createElement('div');
    group.className = 'chip-group';
    group.setAttribute('role', 'group');
    group.setAttribute('aria-label', 'Filter by status');
    var tabStats = data.stats[state.tab] || {};
    STATUSES.forEach(function (s) {
      var count = tabStats[s.key] || 0;
      var pressed = state.activeStatuses.has(s.key);
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip' + (count === 0 ? ' is-muted' : '');
      chip.setAttribute('aria-pressed', pressed ? 'true' : 'false');
      chip.dataset.status = s.key;
      chip.innerHTML = '<span class="chip-emoji">' + s.emoji + '</span><span>' + s.label + '</span><span class="chip-count">' + count + '</span>';
      chip.addEventListener('click', function () {
        if (state.activeStatuses.has(s.key)) state.activeStatuses.delete(s.key);
        else state.activeStatuses.add(s.key);
        buildFilterBar();
        applyFilter();
      });
      group.appendChild(chip);
    });
    bar.appendChild(group);
    var actions = document.createElement('div');
    actions.className = 'filter-actions';
    var allBtn = document.createElement('button');
    allBtn.className = 'filter-link';
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', function () {
      state.activeStatuses = new Set(STATUS_KEYS);
      buildFilterBar(); applyFilter();
    });
    var noneBtn = document.createElement('button');
    noneBtn.className = 'filter-link';
    noneBtn.textContent = 'None';
    noneBtn.addEventListener('click', function () {
      state.activeStatuses = new Set();
      buildFilterBar(); applyFilter();
    });
    actions.appendChild(allBtn); actions.appendChild(noneBtn);
    bar.appendChild(actions);
  }

  // ----- Render views -----
  function tileNode(item, opts) {
    opts = opts || {};
    var li = document.createElement('li');
    li.className = 'tile' + (item.striked ? ' striked' : '');
    li.dataset.status = (item.status && item.status.key) || 'unknown';
    li.dataset.kind = opts.kind || 'block';
    li.tabIndex = 0;
    li.setAttribute('role', 'button');
    li.setAttribute('aria-label', (item.id ? item.id + ' ' : '') + (item.title || ''));

    var status = document.createElement('div');
    status.className = 'tile-status';
    status.textContent = (item.status && item.status.emoji) || '·';

    var body = document.createElement('div');
    body.className = 'tile-body';
    var title = document.createElement('div');
    title.className = 'tile-title';
    if (item.id) {
      var idSpan = document.createElement('span');
      idSpan.className = 'tile-id';
      idSpan.textContent = item.id;
      title.appendChild(idSpan);
    }
    var titleText = document.createElement('span');
    titleText.textContent = item.title || '(untitled)';
    title.appendChild(titleText);

    var statusLabel = document.createElement('span');
    statusLabel.className = 'badge s-' + ((item.status && item.status.key) || 'unknown');
    statusLabel.textContent = (item.status && item.status.label) || 'Unknown';

    body.appendChild(title);
    body.appendChild(statusLabel);
    li.appendChild(status);
    li.appendChild(body);

    li.addEventListener('click', function () { openModal(item); });
    li.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(item); }
    });
    return li;
  }

  function phaseNode(phase, opts) {
    opts = opts || {};
    var det = document.createElement('details');
    det.className = 'phase';
    det.open = opts.openByDefault === true;

    var sum = document.createElement('summary');
    var head = document.createElement('div');
    head.className = 'phase-head-text';

    var title = document.createElement('div');
    title.className = 'phase-title-line';
    title.textContent = 'Phase ' + phase.id + ' — ' + phase.title;

    var statusLine = document.createElement('div');
    statusLine.className = 'phase-status-line';
    statusLine.textContent = phase.status_line || '';

    var blurb = document.createElement('div');
    blurb.className = 'phase-blurb';
    blurb.textContent = phase.blurb || '';

    var stats = document.createElement('div');
    stats.className = 'phase-stats';
    var counts = {};
    phase.blocks.forEach(function (b) {
      var k = (b.status && b.status.key) || 'unknown';
      counts[k] = (counts[k] || 0) + 1;
    });
    STATUSES.forEach(function (s) {
      if (counts[s.key]) {
        var pill = document.createElement('span');
        pill.className = 'phase-stat';
        pill.textContent = s.emoji + ' ' + counts[s.key];
        stats.appendChild(pill);
      }
    });

    head.appendChild(title);
    if (phase.status_line) head.appendChild(statusLine);
    if (phase.blurb) head.appendChild(blurb);
    head.appendChild(stats);

    var caret = document.createElement('span');
    caret.className = 'phase-caret';
    caret.setAttribute('aria-hidden', 'true');
    caret.textContent = '▾';

    sum.appendChild(head);
    sum.appendChild(caret);
    det.appendChild(sum);

    var ul = document.createElement('ul');
    ul.className = 'tiles';
    phase.blocks.forEach(function (b) { ul.appendChild(tileNode(b, { kind: 'block' })); });
    det.appendChild(ul);

    return det;
  }

  // Render a flat (non-phase) grouping as the same <details class="phase"> accordion shape
  // so collapse/expand-all + visual treatment is consistent across the lens.
  function flatListNode(items, headerText, opts) {
    opts = opts || {};
    var det = document.createElement('details');
    det.className = 'phase';
    det.open = opts.openByDefault === true;

    var sum = document.createElement('summary');
    var head = document.createElement('div');
    head.className = 'phase-head-text';
    var title = document.createElement('div');
    title.className = 'phase-title-line';
    title.textContent = headerText || '';
    head.appendChild(title);

    // status tally pills
    var stats = document.createElement('div');
    stats.className = 'phase-stats';
    var counts = {};
    items.forEach(function (it) {
      var k = (it.status && it.status.key) || 'unknown';
      counts[k] = (counts[k] || 0) + 1;
    });
    STATUSES.forEach(function (s) {
      if (counts[s.key]) {
        var pill = document.createElement('span');
        pill.className = 'phase-stat';
        pill.textContent = s.emoji + ' ' + counts[s.key];
        stats.appendChild(pill);
      }
    });
    head.appendChild(stats);

    var caret = document.createElement('span');
    caret.className = 'phase-caret';
    caret.setAttribute('aria-hidden', 'true');
    caret.textContent = '▾';

    sum.appendChild(head);
    sum.appendChild(caret);
    det.appendChild(sum);

    var ul = document.createElement('ul');
    ul.className = 'tiles';
    items.forEach(function (it) { ul.appendChild(tileNode(it, { kind: opts.kind || 'item' })); });
    det.appendChild(ul);
    return det;
  }

  function renderPipeline() {
    var view = document.getElementById('view');
    view.innerHTML = '';
    if (data.pipeline.phases.length === 0 && data.pipeline.adhoc.length === 0) {
      view.innerHTML = '<div class="empty-state">No pipeline phases.</div>';
      return;
    }
    data.pipeline.phases.forEach(function (p) { view.appendChild(phaseNode(p, { openByDefault: false })); });
    if (data.pipeline.adhoc.length) {
      view.appendChild(flatListNode(data.pipeline.adhoc, 'Ad-hoc Blocks', { kind: 'adhoc', openByDefault: false }));
    }
  }

  function renderTechDebt() {
    var view = document.getElementById('view');
    view.innerHTML = '';
    if (data.tech_debt.items.length === 0) {
      view.innerHTML = '<div class="empty-state">No tech debt items.</div>';
      return;
    }
    view.appendChild(flatListNode(data.tech_debt.items, 'Technical Debt', { kind: 'td', openByDefault: false }));
  }

  function renderBacklog() {
    var view = document.getElementById('view');
    view.innerHTML = '';
    var anything = false;
    if (data.backlog.pipeline_backlog.length) {
      view.appendChild(flatListNode(data.backlog.pipeline_backlog, 'Pipeline Backlog', { kind: 'backlog', openByDefault: false }));
      anything = true;
    }
    data.backlog.sections.forEach(function (sec) {
      view.appendChild(flatListNode(sec.items, sec.title, { kind: 'backlog', openByDefault: false }));
      anything = true;
    });
    if (!anything) view.innerHTML = '<div class="empty-state">Backlog empty.</div>';
  }

  function renderArchive() {
    var view = document.getElementById('view');
    view.innerHTML = '';
    var anything = false;
    data.archive.phases.forEach(function (p) { view.appendChild(phaseNode(p, { openByDefault: false })); anything = true; });
    if (data.archive.resolved_td.length) {
      view.appendChild(flatListNode(data.archive.resolved_td, 'Resolved Tech Debt', { kind: 'td', openByDefault: false }));
      anything = true;
    }
    if (!anything) view.innerHTML = '<div class="empty-state">Archive empty.</div>';
  }

  function render() {
    if (state.tab === 'pipeline') renderPipeline();
    else if (state.tab === 'tech_debt') renderTechDebt();
    else if (state.tab === 'backlog') renderBacklog();
    else if (state.tab === 'archive') renderArchive();
    applyFilter();
  }

  function applyFilter() {
    var tiles = document.querySelectorAll('li.tile');
    tiles.forEach(function (t) {
      var st = t.dataset.status || 'unknown';
      t.classList.toggle('is-hidden', !state.activeStatuses.has(st));
    });
    // hide empty phase containers (covers both pipeline phases and flat-list groupings — both render as details.phase now)
    document.querySelectorAll('details.phase').forEach(function (d) {
      var visible = d.querySelectorAll('li.tile:not(.is-hidden)').length;
      d.style.display = visible === 0 ? 'none' : '';
    });
  }

  // ----- Modal -----
  var modal = document.getElementById('modal');
  function openModal(item) {
    var idEl = document.getElementById('modal-id');
    var titleEl = document.getElementById('modal-title');
    var statusEl = document.getElementById('modal-status');
    var bodyEl = document.getElementById('modal-body');
    idEl.textContent = item.id || '—';
    idEl.style.display = item.id ? '' : 'none';
    titleEl.textContent = item.title || '(untitled)';
    var skey = (item.status && item.status.key) || 'unknown';
    statusEl.className = 'badge modal-status s-' + skey;
    statusEl.textContent = (item.status && item.status.label) || 'Unknown';
    bodyEl.innerHTML = item.notes_html || '<em>No description.</em>';
    modal.classList.add('is-open');
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', function (e) {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
  });

  // ----- Tabs -----
  document.querySelectorAll('.tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      state.tab = btn.dataset.tab;
      buildFilterBar();
      render();
    });
  });

  // ----- Print + Collapse/Expand all -----
  var toggleAllBtn = document.getElementById('toggle-all-btn');
  function refreshToggleAllLabel() {
    var anyOpen = false;
    document.querySelectorAll('details.phase').forEach(function (d) { if (d.open && d.style.display !== 'none') anyOpen = true; });
    toggleAllBtn.classList.toggle('is-collapsed', !anyOpen);
    var label = anyOpen ? 'Collapse all phases' : 'Expand all phases';
    toggleAllBtn.setAttribute('aria-label', label);
    toggleAllBtn.title = label;
  }
  toggleAllBtn.addEventListener('click', function () {
    var details = document.querySelectorAll('details.phase');
    var anyOpen = false;
    details.forEach(function (d) { if (d.open) anyOpen = true; });
    var target = !anyOpen;
    details.forEach(function (d) { d.open = target; });
    refreshToggleAllLabel();
  });
  document.addEventListener('toggle', function (e) {
    if (e.target && e.target.matches && e.target.matches('details.phase')) refreshToggleAllLabel();
  }, true);

  document.getElementById('print-btn').addEventListener('click', function () { window.print(); });
  window.addEventListener('beforeprint', function () {
    document.querySelectorAll('details.phase').forEach(function (d) {
      d.dataset.wasOpen = d.open ? '1' : '0';
      d.open = true;
    });
  });
  window.addEventListener('afterprint', function () {
    document.querySelectorAll('details.phase').forEach(function (d) {
      d.open = d.dataset.wasOpen === '1';
      delete d.dataset.wasOpen;
    });
    refreshToggleAllLabel();
  });

  // Re-init toggle-all label after every render (state.tab change rebuilds the view)
  var origRender = render;
  render = function () { origRender(); refreshToggleAllLabel(); };

  // ----- Theme -----
  var THEME_KEY = 'lens-theme';
  var btnLight = document.getElementById('theme-light');
  var btnDark = document.getElementById('theme-dark');
  function applyTheme(theme) {
    if (theme === 'dark') {
      document.body.classList.add('theme-dark');
      btnLight.classList.remove('active'); btnLight.setAttribute('aria-pressed','false');
      btnDark.classList.add('active'); btnDark.setAttribute('aria-pressed','true');
    } else {
      document.body.classList.remove('theme-dark');
      btnDark.classList.remove('active'); btnDark.setAttribute('aria-pressed','false');
      btnLight.classList.add('active'); btnLight.setAttribute('aria-pressed','true');
    }
    localStorage.setItem(THEME_KEY, theme);
  }
  var saved = localStorage.getItem(THEME_KEY);
  if (saved === 'dark') applyTheme('dark');
  else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
  btnLight.addEventListener('click', function () { applyTheme('light'); });
  btnDark.addEventListener('click', function () { applyTheme('dark'); });

  // ----- Boot -----
  buildFilterBar();
  render();
})();
</script>
