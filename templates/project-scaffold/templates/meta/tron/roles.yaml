# meta/tron/roles.yaml — the project's fleet (ADR-0002 Decision 4; P2+P5)
#
# TRON ships NO personas and hardcodes no role name: every worker identity, model,
# persona path, dispatch-selector match, and paperwork scope is a lookup against THIS
# file, validated fail-closed at engine construction (a missing/malformed entry refuses
# to boot at all — loud, named, no silent default anywhere).
#
# Capability classes are SEALED: BUILD, REVIEW, TRIAGE, CLOSE. The blueprint (workflow
# shape) stays fixed; this file supplies the FLEET — which roles service which classes.
#
#   persona        repo-relative path to this role's agent file (required)
#   model          the worker model this role runs on (required — no default; absent or
#                  unknown is boot-fatal)
#   binds          list of capability classes this role services (>=1 required)
#   selector       optional {block_tag: <tag>} (BUILD) or {reviewer_class: <lens>}
#                  (REVIEW) — a role with no selector for a class is that class's
#                  DEFAULT match (today's behavior when a block declares no Role:/Tags:)
#   paperwork      optional {allow, deny, line_scoped} — templates may use
#                  {block_doc} {archive} {pipeline} {blocks_dir} {block_id}
#   spec_owner     bool — the architect-first target for every wall (exactly one, total,
#                  boot-enforced)
#   persistent     bool — spawned once at boot, alive for the whole session, excluded
#                  from the worker_count pool
#   cardinality    optional int (informational)
#   close_fallback bool — the designated CLOSE role when SEVERAL roles bind CLOSE
#                  (boot-validated unique in that case). Irrelevant/optional when only
#                  ONE role binds CLOSE at all — that sole role is the implicit
#                  fallback, flag or no flag (see below: this scaffold's own engineer
#                  role never sets it).
#
# This is the trivial scaffold default (engineer / reviewer-code / architect) — the
# fleet AC-1 proves runs unchanged from this file alone. Add roles (e.g. a designer
# bound to BUILD via `selector: {block_tag: design}`) with no engine change required.

roles:
  engineer:
    persona: meta/agents/engineer.md
    model: sonnet
    binds: [BUILD, CLOSE]
    paperwork:
      allow: ["{block_doc}", "{archive}", "meta/logs/engineering/"]
      line_scoped: { "{pipeline}": "{block_id}" }

  reviewer-code:
    persona: meta/agents/reviewer-code.md
    model: sonnet
    binds: [REVIEW]

  architect:
    persona: meta/agents/architect.md
    model: opus
    binds: [TRIAGE]
    persistent: true
    cardinality: 1
    spec_owner: true
    paperwork: { allow: ["{pipeline}", "{blocks_dir}"] }
