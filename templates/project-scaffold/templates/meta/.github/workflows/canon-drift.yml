# Canon-drift detection for skills marked `source: canon`.
#
# Setup notes:
#   - <CANON_KB_REPO>       — the shared knowledge-base repo (provides `principles-base`
#                             + shared skills). Remove this checkout AND its drift root
#                             below if the project has no shared KB ({shared_knowledge_path} blank).
#   - <CANON_SCAFFOLD_REPO> — the repo that owns the project-scaffold skills.
#   - secrets.CANON_READ_TOKEN — a read-only PAT (or fine-grained token) with `contents: read`
#                             on the canon repo(s). Required only if a canon repo is private.
name: canon-drift

on:
  schedule:
    - cron: '0 8 * * *'  # nightly at 08:00 UTC
  pull_request:
    paths:
      - 'skills/**'   # the drift check only scans skills/ — do not widen this
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout meta repo
        uses: actions/checkout@v4
        with:
          path: meta

      # Remove this step (and the canon-kb root in the drift-check call) if the project has no shared KB.
      - name: Checkout canon — shared knowledge base
        uses: actions/checkout@v4
        with:
          repository: <CANON_KB_REPO>
          path: canon-kb
          fetch-depth: 0
          token: ${{ secrets.CANON_READ_TOKEN }}

      - name: Checkout canon — project-scaffold skills
        uses: actions/checkout@v4
        with:
          repository: <CANON_SCAFFOLD_REPO>
          path: canon-scaffold
          fetch-depth: 0
          token: ${{ secrets.CANON_READ_TOKEN }}

      - name: Run drift check
        id: drift
        run: |
          chmod +x meta/scripts/canon-drift-check.sh
          meta/scripts/canon-drift-check.sh meta \
            "canon-kb::knowledge-base/skills" \
            "canon-scaffold::templates/project-scaffold/templates/meta/skills" \
            | tee drift-report.txt
          if grep -q "^DRIFT:" drift-report.txt; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt

      - name: Open / update drift issue
        if: steps.drift.outputs.drift_detected == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report.txt', 'utf8');
            const title = 'Canon drift detected';
            const body = `Drift CI detected canon-derived skills falling out of sync with their canon source HEAD.\n\n\`\`\`\n${report}\n\`\`\`\n\nResolution: review each flagged skill, sync changes from canon, update \`canon_version\` frontmatter, commit.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'canon-drift'
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['canon-drift']
              });
            }

      - name: Fail PR on drift
        if: steps.drift.outputs.drift_detected == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::Canon drift detected — see drift-report.txt artifact for details"
          cat drift-report.txt
          exit 1
