# [optional] Email blast to subscribers on GitHub Release publish — requires an email provider configured
# and a release-email script shipped at app/scripts/. Remove this workflow if you don't notify on release.
name: release-notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Send release email
        run: npx tsx scripts/send-release-email.ts
        env:
          <EMAIL_PROVIDER_API_KEY>: ${{ secrets.<EMAIL_PROVIDER_API_KEY> }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
