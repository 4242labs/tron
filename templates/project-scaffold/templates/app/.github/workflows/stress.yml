# [optional] Stress/load tests — placeholder. Fill in real scenarios per project, then remove this notice.
# Each step runs one k6 scenario under app/stress/scenarios/. Wire only the secrets your scenarios need.
name: Stress Tests

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  stress:
    name: k6 Stress Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app/stress

    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: 0.50.0

      # Add one step per scenario. Example:
      - name: <SCENARIO_NAME>
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          # Map only the secrets this scenario consumes, e.g.:
          # <STRESS_SESSION_TOKENS>: ${{ secrets.<STRESS_SESSION_TOKENS> }}
        run: k6 run scenarios/<SCENARIO_FILE>.js
