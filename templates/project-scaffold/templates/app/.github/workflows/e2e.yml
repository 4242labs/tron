# [optional] End-to-end test suite (Playwright)
name: E2E Tests

on:
  pull_request:
    branches:
      - staging
    paths-ignore:
      - 'docs/**'

jobs:
  e2e:
    name: E2E Suite (API + UI)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Map only the env/secrets your E2E suite needs; add per-integration
      # mock-mode flags (e.g. <INTEGRATION>_E2E_MODE: "1") as required.
      - name: Run E2E API tests
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: npm test -- <E2E_API_GLOB>

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: npx playwright test <E2E_UI_GLOB>
