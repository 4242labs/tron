<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 26 910 668" role="img" aria-label="TRON workflow BPMN">
  <style>
    :root{
      --charcoal:#1C1917; --graphite:#433E3A; --stone:#756D68; --mid-stone:#B8AFA8;
      --copper:#E2711D; --copper-dark:#CC5D0A; --copper-soft:#FDECD8; --copper-border:#F5C9A1;
      --blue-dark:#2563EB; --emerald:#16A34A;
      --surface-alt:#FFFFFF; --fg:var(--charcoal); --fg-2:var(--graphite); --fg-muted:var(--stone);
      --accent:var(--copper); --accent-hover:var(--copper-dark); --accent-soft:var(--copper-soft); --accent-border:var(--copper-border);
      --line:var(--mid-stone); --band:#FAF4EA;
      --role-tron:var(--graphite); --role-eng:var(--emerald); --role-arch:var(--copper-dark); --role-rev:var(--blue-dark);
      --font-heading:'Space Grotesk',system-ui,sans-serif; --font-body:'IBM Plex Sans',system-ui,sans-serif; --font-mono:'Geist Mono',ui-monospace,monospace;
    }
    text{font-family:var(--font-body)}
    .lbl{font-family:var(--font-heading);font-weight:600;font-size:12px;letter-spacing:.12em;fill:var(--fg-muted)}
    .step{font-family:var(--font-heading);font-weight:600;font-size:12.5px;fill:var(--fg)}
    .sub{font-family:var(--font-mono);font-size:9.5px;fill:var(--fg-muted)}
    .gear{fill:var(--accent-hover)}
    .trig{font-family:var(--font-mono);font-size:10px;fill:var(--fg-muted)}
    .evt{font-family:var(--font-body);font-size:10px;fill:var(--fg-2)}
    .ret{font-family:var(--font-mono);font-size:11px;fill:var(--accent-hover)}
  </style>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--line)"/></marker>
  </defs>

  <rect x="20" y="26" width="910" height="668" rx="12" fill="var(--surface-alt)"/>

  <!-- track bands -->
  <rect x="40" y="221" width="724" height="58" rx="8" fill="var(--band)"/>
  <rect x="40" y="423" width="622" height="58" rx="8" fill="var(--band)"/>
  <rect x="40" y="531" width="724" height="58" rx="8" fill="var(--band)"/>
  <rect x="40" y="613" width="724" height="58" rx="8" fill="var(--band)"/>
  <text class="lbl" x="50" y="214">ENGINEER</text>
  <text class="lbl" x="50" y="416">ARCHITECT</text>
  <text class="lbl" x="50" y="524">REVIEWERS (CODE, DATA, SECURITY)</text>

  <!-- sequence flows (orthogonal) -->
  <g fill="none" stroke="var(--line)" stroke-width="1.5" marker-end="url(#arr)">
    <path d="M88,96 H120"/>
    <path d="M224,96 H266"/>
    <path d="M300,64 V40 H900 V76"/>
    <path d="M115,250 H150"/>
    <path d="M115,452 H150"/>
    <path d="M115,560 H150"/>
    <path d="M282,250 H320"/>
    <path d="M440,250 H461"/>
    <path d="M495,250 H520"/>
    <path d="M652,250 H688"/>
    <path d="M380,273 V330 H461"/>
    <path d="M493,330 H520"/>
    <path d="M652,330 H690"/>
    <path d="M814,330 H838"/>
    <path d="M282,452 H369"/>
    <path d="M403,452 H440"/>
    <path d="M572,452 H608"/>
    <path d="M282,560 H320"/>
    <path d="M452,560 H473"/>
    <path d="M507,560 H540"/>
    <path d="M672,560 H708"/>
    <path d="M490,577 V642 H540"/>
    <path d="M672,642 H700"/>
  </g>
  <path d="M300,128 V160 H115 V560" fill="none" stroke="var(--line)" stroke-width="1.5"/>

  <!-- trigger labels -->
  <g class="trig">
    <text x="305" y="34">session:end</text>
    <text x="452" y="214">block:next:done</text>
    <text x="392" y="307">wall:raised:&lt;block&gt;</text>
    <text x="300" y="416">block:&lt;block&gt;:ready</text>
    <text x="462" y="524">review:&lt;type&gt;:done</text>
    <text x="556" y="607">block:adhoc:ready</text>
  </g>

  <!-- top row -->
  <circle cx="70" cy="96" r="18" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="2.2"/>
  <text class="evt" x="70" y="134" text-anchor="middle">tron:start</text>
  <g><rect x="120" y="73" width="104" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="172" y="94" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Bootup</text>
    <text class="sub" x="172" y="108" text-anchor="middle">script</text></g>
  <path d="M300,64 L332,96 L300,128 L268,96 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.8"/>
  <text class="step" x="300" y="93" text-anchor="middle" style="font-size:11px">PULSE</text>
  <text x="300" y="107" text-anchor="middle" style="font-family:var(--font-mono);font-size:8.5px;fill:var(--fg-muted)">dispatch loop</text>
  <circle cx="900" cy="96" r="20" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="3.4"/>
  <text class="evt" x="900" y="134" text-anchor="middle">Session End</text>

  <!-- ENGINEER -->
  <g><rect x="150" y="227" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="216" y="248" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Dispatch</text>
    <text class="sub" x="216" y="263" text-anchor="middle">script &#183; worktree</text></g>
  <g><rect x="320" y="227" width="120" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-eng)" stroke-width="1.8"/>
    <text class="step" x="380" y="248" text-anchor="middle">Build</text>
    <text class="sub" x="380" y="263" text-anchor="middle">Engineer</text></g>
  <circle cx="478" cy="250" r="17" fill="var(--surface-alt)" stroke="var(--role-eng)" stroke-width="1.8"/>
  <circle cx="478" cy="250" r="12.5" fill="none" stroke="var(--role-eng)" stroke-width="1.2"/>
  <g><rect x="520" y="227" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="586" y="248" text-anchor="middle"><tspan class="gear">&#9881;</tspan> DONE-gate</text>
    <text class="sub" x="586" y="263" text-anchor="middle">script &#183; pass or &#8634;</text></g>
  <text class="ret" x="692" y="254">&#8635; pulse</text>

  <!-- ENGINEER wall row -->
  <circle cx="478" cy="330" r="15" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.8"/>
  <text x="478" y="335" text-anchor="middle" style="font-size:13px;fill:var(--role-tron)">!</text>
  <g><rect x="520" y="308" width="132" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="586" y="328" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Escalate</text>
    <text class="sub" x="586" y="342" text-anchor="middle">script</text></g>
  <g><rect x="690" y="308" width="124" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="752" y="328" text-anchor="middle" style="font-size:11px"><tspan class="gear">&#9881;</tspan> Apply decision</text>
    <text class="sub" x="752" y="342" text-anchor="middle">operator:decision</text></g>
  <text class="ret" x="842" y="334">&#8635;</text>

  <!-- ARCHITECT -->
  <g><rect x="150" y="429" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
    <text class="step" x="216" y="450" text-anchor="middle">Scope block</text>
    <text class="sub" x="216" y="465" text-anchor="middle">Architect &#183; author &#8594; PR</text></g>
  <circle cx="386" cy="452" r="17" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
  <circle cx="386" cy="452" r="12.5" fill="none" stroke="var(--role-arch)" stroke-width="1.2"/>
  <g><rect x="440" y="429" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="506" y="450" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Observe</text>
    <text class="sub" x="506" y="465" text-anchor="middle">script &#183; block ready</text></g>
  <text class="ret" x="612" y="456">&#8635; pulse</text>

  <!-- REVIEWERS -->
  <g><rect x="150" y="537" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="216" y="558" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Dispatch</text>
    <text class="sub" x="216" y="573" text-anchor="middle">script &#183; sweep</text></g>
  <g><rect x="320" y="537" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-rev)" stroke-width="1.8"/>
    <text class="step" x="386" y="558" text-anchor="middle">&lt;type&gt; Review</text>
    <text class="sub" x="386" y="573" text-anchor="middle">Reviewer</text></g>
  <circle cx="490" cy="560" r="17" fill="var(--surface-alt)" stroke="var(--role-rev)" stroke-width="1.8"/>
  <circle cx="490" cy="560" r="12.5" fill="none" stroke="var(--role-rev)" stroke-width="1.2"/>
  <g><rect x="540" y="537" width="132" height="46" rx="9" fill="var(--surface-alt)" stroke="var(--role-tron)" stroke-width="1.6"/>
    <text class="step" x="606" y="558" text-anchor="middle"><tspan class="gear">&#9881;</tspan> Release</text>
    <text class="sub" x="606" y="573" text-anchor="middle">script</text></g>
  <text class="ret" x="710" y="564">&#8635; pulse</text>

  <!-- LOG REVIEW -->
  <g><rect x="540" y="620" width="132" height="44" rx="9" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
    <text class="step" x="606" y="640" text-anchor="middle" style="font-size:11.5px">Log Review</text>
    <text class="sub" x="606" y="654" text-anchor="middle">Architect &#183; findings &#8594; adhoc</text></g>
  <circle cx="716" cy="642" r="15" fill="var(--surface-alt)" stroke="var(--role-arch)" stroke-width="1.8"/>
  <circle cx="716" cy="642" r="10.5" fill="none" stroke="var(--role-arch)" stroke-width="1.1"/>
  <text class="ret" x="738" y="646">&#8635;</text>
</svg>
