<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TRON</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png" />
        <link rel="apple-touch-icon" href="favicon-192x192.png" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet" />

        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #000;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #matrix-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none;
            }

            .content {
                position: relative;
                z-index: 10;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100vh;
            }

            #canvas {
                display: block;
                max-width: 100vw;
                max-height: 60vh;
            }

            .hero-title {
                width: clamp(178px, 16.5vw, 237px);
                color: #00FFA7;
                margin: -16px 0 32px 0;
                line-height: 0;
            }
            .hero-title svg {
                display: block;
                width: 100%;
                height: auto;
            }

            /* 42labs DS — .btn secondary (dark theme). Literals are inlined
               canon tokens; do not retune individually — re-sync from
               https://42labs.io/design if the canon changes.
               --fg #F2F4F5  --border #2B3540  --surface-muted #16222D
               --accent #00FFA7  --accent-soft #051F14 */
            .btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: "IBM Plex Sans", system-ui, sans-serif;
                font-weight: 400;
                font-size: 14px;
                line-height: 1;
                padding: 8px 16px;
                border-radius: 6px;
                border: 1px solid transparent;
                text-decoration: none;
                cursor: pointer;
                transition: background 120ms ease, color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
            }

            .btn.secondary {
                background: transparent;
                color: #F2F4F5;
                border-color: #2B3540;
            }
            .btn.secondary:hover { background: #16222D; }
            .btn.secondary:focus-visible {
                outline: none;
                border-color: #00FFA7;
                box-shadow: 0 0 0 3px #051F14;
            }
        </style>
    </head>
    <body>
        <canvas id="matrix-canvas"></canvas>

        <div class="content">
            <canvas id="canvas"></canvas>

            <h1 class="hero-title" aria-label="TRON">
                <svg viewBox="220 2080 2560 690" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">

                    <polygon points="2710.5,2123.6 2710.5,2594.5 2249.3,2082 2249.3,2724.5 2314.5,2724.5 2314.5,2253.2 2775.8,2765.9 2775.8,2123.6"/>

            </h1>

            <a href="https://42labs.io" class="btn secondary" target="_blank" rel="noopener">

                    <line x1="64" y1="76" x2="64" y2="86"/>
                    <line x1="74" y1="76" x2="74" y2="86"/>
                    <circle cx="26" cy="98" r="7"/>
                    <line x1="32" y1="102" x2="96" y2="116"/>
                    <circle cx="102" cy="120" r="7"/>
                    <circle cx="102" cy="98" r="7"/>
                    <line x1="96" y1="102" x2="32" y2="116"/>
                    <circle cx="26" cy="120" r="7"/>
                </svg>42LABS
            </a>
        </div>

        <script>
            (function () {
                const assets = {
                    css: ["css/reset.min.css", "css/main.css"],
                    js: ["lib/script3.js", "lib/script1.js", "lib/matrix.js"],
                };

                if (window.location.search) {
                    history.replaceState({}, "", window.location.pathname);
                }

                const loadAssets = async () => {
                    assets.css.forEach((file) => {
                        const link = document.createElement("link");
                        link.rel = "stylesheet";
                        link.href = file;
                        document.head.appendChild(link);
                    });

                    for (const file of assets.js) {
                        await new Promise((resolve, reject) => {
                            const script = document.createElement("script");
                            script.src = file;
                            script.onload = resolve;
                            script.onerror = reject;
                            document.body.appendChild(script);
                        });
                    }
                };

                loadAssets().catch((err) =>
                    console.error("Error loading assets:", err),
                );
            })();
        </script>
    </body>
</html>
