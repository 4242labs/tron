# messages.yaml — CANON runtime copy registry (B2 instance)
# Every line TRON emits during a SESSION (operator / worker / terminal / TG),
# keyed by template id, with named slots. Rendered via render(id, slots).
# Seeder voice (tron-seed.md) is SEPARATE and never shares keys (contracts §6).
#
# Two kinds of template:
#   - human-facing (terminal / operator / tg / session): inline `text`.
#   - worker-facing (channel: worker): NO inline copy — it carries `pmt: PMT-*`, an id
#     into the prompt layer (prompts/registry.yaml). The body is imported fresh at tick
#     (M-04 / R-PMT); the prompt copy is the operator's to author, not inlined here.
#
# Tone (human-facing): the TRON persona — dark, dry, sardonic. NO host-runtime names, ever.
# The {detail} slot is the one place free-text (LLM judgment payload) is allowed.

# ── Slot catalog (the only interpolations templates may use) ──
slots:
  worker_id: <str>      # e.g. ENG-06-19  (NEVER a host-runtime name)
  role: <str>
  type: <str>           # reviewer lens: code | security | data | …
  block: <str>
  branch: <str>
  pr: <str>
  detail: <str>         # free-text judgment payload (the one slot the LLM may fill with prose)
  reason: <str>
  count: <int>
  case: <str>           # escalation correlation id (e.g. CASE-001) — reply with it to settle

# ── Templates, grouped by channel/situation ──
templates:

  # worker channel — each carries a PMT id (prompts/registry.yaml); the body is imported
  # at tick. NO inline copy and no host-runtime strings here (the prompt layer owns both).
  spawn.engineer:
    channel: worker
    slots: [worker_id, block, branch]
    pmt: PMT-ENG-BRIEF
  spawn.architect:
    channel: worker
    slots: []
    pmt: PMT-ARCH-BRIEF
  arch.forward:
    channel: worker
    slots: [block]
    pmt: PMT-ARCH-FORWARD
  arch.log:
    channel: worker
    slots: [type]
    pmt: PMT-ARCH-LOGREVIEW
  arch.triage:
    channel: worker
    slots: [detail]
    pmt: PMT-ARCH-TRIAGE
  spawn.reviewer:
    channel: worker
    slots: [worker_id, count]
    pmt: PMT-REV-BRIEF
  release.worker:
    channel: worker
    slots: [worker_id]
    pmt: PMT-RELEASE
  heartbeat.ping:
    channel: worker
    slots: [worker_id]
    pmt: PMT-PING
  gate.step:
    channel: worker
    slots: [worker_id, block, detail]
    pmt: PMT-GATE-DONE

  # between-task / terminal feedback (terminal channel; TRON voice)
  terminal.dispatched:
    channel: terminal
    slots: [worker_id, block]
    text: "[TRON]  {worker_id} dispatched on {block}. Worktree clean. May the source compile."
  terminal.block_done:
    channel: terminal
    slots: [block]
    text: "[TRON]  {block} done. Spawning the next. We'll be back."
  terminal.review:
    channel: terminal
    slots: [count]
    text: "[TRON]  Reviewer scheduled over the last {count} blocks. Brace yourselves."
  terminal.halt_bootup:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Can't boot — trunk's unreachable. {detail}. Nothing to supervise on a dead trunk. End of line."
  terminal.halt_trunk:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Trunk went dark mid-run and stayed dark. {detail}. I won't dispatch blind. Halting. End of line."
  terminal.plan_first:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Nothing to build — the pipeline's empty ({detail}). Plan first, then call me. End of line."
  terminal.scope_unknown:
    channel: terminal
    slots: [detail]
    text: "[TRON]  That scope ({detail}) matches nothing on trunk. Typo, or a plan that doesn't exist yet. Fix it and try again. End of line."
  terminal.run_control:
    channel: terminal
    slots: [detail]
    text: "[TRON]  {detail}"

  # escalation (operator / tg channels)
  escalate.wall:
    channel: operator
    slots: [worker_id, block, detail, case]
    text: "[TRON]  Above my pay grade [{case}]. {worker_id} walled on {block}: {detail}. Peer-consult exhausted. Your call — reply with the case id."
  escalate.await:
    channel: operator
    slots: [worker_id, block, detail, case]
    text: "[TRON]  Checkpoint [{case}]. {worker_id} is holding on {block} for your go-ahead: {detail}. It won't move until you say so — reply with the case id."
  escalate.unclassified:
    channel: operator
    slots: [detail]
    text: "[TRON]  Got something I can't parse: {detail}. I don't guess on flow decisions. Tell me what to do with it."
  tg.escalate:
    channel: tg
    slots: [worker_id, detail]
    text: |
      [TRON]  Hey boss — hope you're enjoying the beach.
              {worker_id} walled on {detail}.
              Architect peer-consulted, no consensus.
              What do you say?
  tg.status_digest:
    channel: tg
    slots: [detail]
    text: "[TRON]  Status, since you asked: {detail}. Routine: handled. End of line."

  # session lifecycle (operator channel)
  session.scope:
    channel: operator
    slots: []
    text: |
      [TRON]  Online. Before I take the fleet — how far do I run? Should I proceed with:
        1) All open phases and blocks
        2) A specific phase
        3) A range of blocks
      Your call. End of line.
  session.start:
    channel: operator
    slots: []
    text: "[TRON]  Online. The fleet's mine now. You'll hear from me when it matters — not before."
  session.end:
    channel: operator
    slots: [count]
    text: "[TRON]  Session closed. {count} blocks through the loop. Pings kept to a minimum. End of line."
