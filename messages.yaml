# messages.yaml — CANON runtime copy registry (B2 instance)
# Every line TRON emits during a SESSION (operator / worker / terminal / TG),
# keyed by template id, with named slots. Rendered via render(id, slots).
# Seeder voice (tron-seed.md) is SEPARATE and never shares keys (contracts §6).
#
# Two kinds of template:
#   - human-facing (terminal / operator / tg / session): inline `text`.
#   - worker-facing (channel: worker): NO inline copy — it carries `pmt: PMT-*`, an id
#     into the prompt layer (prompts/registry.yaml). The body is imported fresh at tick
#     (M-04 / R-PMT); the prompt copy is the operator's to author, not inlined here.
#
# Tone (human-facing): the TRON persona — dark, dry, sardonic. NO host-runtime names, ever.
# The {detail} slot is the one place free-text (LLM judgment payload) is allowed.

# ── Slot catalog (the only interpolations templates may use) ──
slots:
  worker_id: <str>      # e.g. ENG-06-19  (NEVER a host-runtime name)
  role: <str>
  type: <str>           # reviewer lens: code | security | data | …
  block: <str>
  branch: <str>
  pr: <str>
  persona: <str>        # absolute path to the project's agent file for a spawned worker (SPAWN)
  contract: <str>       # absolute path to the instance's worker-contract.md (SPAWN) — the worker/TRON interface
  report: <str>         # absolute path to the report channel script (SPAWN check-in command)
  detail: <str>         # free-text judgment payload (the one slot the LLM may fill with prose)
  reason: <str>
  count: <int>
  case: <str>           # escalation correlation id (e.g. CASE-001) — reply with it to settle
                        # WARNING (01-18 addendum): the settle match is a plain regex — the
                        # case id + a verb (approve|resume|abandon) ANYWHERE in your reply,
                        # prose and negations included. "don't approve CASE-7" still approves
                        # it. Reply with the bare verb + case id, never a sentence about one.
  assignment: <str>     # ASSIGN: the per-role work string the engine composes at emit
  merge_path: <str>     # ASSIGN: the mode-true merge instruction (local: no PR, engine merges; remote: PR) — 01-11 FX-4
  record_path: <str>    # DONE-RECORD: the mode-specific landing instruction for the gate-authorized ✅ commit — 01-11 FX-3

# ── Templates, grouped by channel/situation ──
templates:

  # worker channel — each carries a PMT id (prompts/registry.yaml); the body is imported
  # at tick. NO inline copy and no host-runtime strings here (the prompt layer owns both).
  # SPAWN is identity-only (01-07): every role comes online + reads its persona via PMT-SPAWN;
  # the work arrives next, on the worker's `online` report (assign.*).
  spawn.engineer:
    channel: worker
    slots: [worker_id, role, persona, report, contract]
    pmt: PMT-SPAWN
  spawn.architect:
    channel: worker
    slots: [worker_id, role, persona, report, contract]
    pmt: PMT-SPAWN
  spawn.reviewer:
    channel: worker
    slots: [worker_id, role, persona, report, contract]
    pmt: PMT-SPAWN
  # ASSIGN — the work, delivered after the worker reports online (01-07). Role-neutral:
  # the engine composes {assignment} per role at emit (engineer = its block; reviewer =
  # the since-last-review commit range).
  assign.engineer:
    channel: worker
    slots: [worker_id, assignment, merge_path, report]
    pmt: PMT-ASSIGN
  assign.reviewer:
    channel: worker
    slots: [worker_id, assignment, merge_path, report]
    pmt: PMT-ASSIGN
  arch.forward:
    channel: worker
    slots: [block, worker_id, report]
    pmt: PMT-SCOPE
  arch.reconcile:
    channel: worker
    slots: [block, after, worker_id, report]
    pmt: PMT-RECONCILE
  arch.remediation:
    channel: worker
    slots: [type, worker_id, report]
    pmt: PMT-SCOPE-REMEDIATION
  arch.triage:
    channel: worker
    slots: [detail, sender, worker_id, report]
    pmt: PMT-TRIAGE
  close.worker:
    channel: worker
    slots: [worker_id, report]
    pmt: PMT-CLOSE
  close.dirty:
    channel: worker
    slots: [worker_id, detail, report]
    pmt: PMT-CLOSE-DIRTY
  heartbeat.ping:
    channel: worker
    slots: [worker_id, report]
    pmt: PMT-PING
  # DONE gate — one stage-specific prompt per gate state (no wrapper, no {detail} dump).
  gate.local:
    channel: worker
    slots: [worker_id, block, report]
    pmt: PMT-DONE-LOCAL
  gate.merge:
    channel: worker
    slots: [worker_id, block, report]
    pmt: PMT-DONE-MERGE
  gate.trunk:
    channel: worker
    slots: [worker_id, block, report]
    pmt: PMT-DONE-TRUNK
  gate.record:
    channel: worker
    slots: [worker_id, block, record_path, report]
    pmt: PMT-DONE-RECORD
  gate.review:
    channel: worker
    slots: [worker_id, report]
    pmt: PMT-DONE-REVIEW

  # between-task / terminal feedback (terminal channel; TRON voice)
  terminal.dispatched:
    channel: terminal
    slots: [worker_id, block]
    text: "[TRON]  {worker_id} dispatched on {block}. Worktree clean. May the source compile."
  terminal.block_done:
    channel: terminal
    slots: [block]
    text: "[TRON]  {block} done. Spawning the next. We'll be back."
  terminal.review:
    channel: terminal
    slots: [count]
    text: "[TRON]  Reviewer scheduled over the last {count} blocks. Brace yourselves."
  terminal.halt_bootup:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Can't boot — trunk's unreachable. {detail}. Nothing to supervise on a dead trunk. End of line."
  terminal.halt_trunk:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Trunk went dark mid-run and stayed dark. {detail}. I won't dispatch blind. Halting. End of line."
  terminal.plan_first:
    channel: terminal
    slots: [detail]
    text: "[TRON]  Nothing to build — the pipeline's empty ({detail}). Plan first, then call me. End of line."
  terminal.scope_unknown:
    channel: terminal
    slots: [detail]
    text: "[TRON]  That scope ({detail}) matches nothing on trunk. Typo, or a plan that doesn't exist yet. Fix it and try again. End of line."
  terminal.run_control:
    channel: terminal
    slots: [detail]
    text: "[TRON]  {detail}"

  # escalation (operator / tg channels)
  escalate.wall:
    channel: operator
    slots: [worker_id, block, detail, case]
    text: "[TRON]  Above my pay grade [{case}]. {worker_id} walled on {block}: {detail}. Peer-consult exhausted. Your call — reply with the case id."
  escalate.await:
    channel: operator
    slots: [worker_id, block, detail, case]
    text: "[TRON]  Checkpoint [{case}]. {worker_id} is holding on {block} for your go-ahead: {detail}. It won't move until you say so — reply with the case id."
  escalate.gate:
    channel: operator
    slots: [worker_id, block, detail, case]
    text: "[TRON]  Merge gate [{case}]. {block} is ready to {detail} — that one's yours to call. It won't move until you say so: reply `resume` with the case id (or `abandon` to drop it)."
  escalate.unclassified:
    channel: operator
    slots: [detail]
    text: "[TRON]  Got something I can't parse: {detail}. I don't guess on flow decisions. Tell me what to do with it."
  tg.escalate:
    channel: tg
    slots: [worker_id, detail]
    text: |
      [TRON]  Hey boss — hope you're enjoying the beach.
              {worker_id} walled on {detail}.
              Architect peer-consulted, no consensus.
              What do you say?
  tg.status_digest:
    channel: tg
    slots: [detail]
    text: "[TRON]  Status, since you asked: {detail}. Routine: handled. End of line."

  # session lifecycle (operator channel)
  session.scope:
    channel: operator
    slots: []
    text: |
      [TRON]  Online. Before I take the fleet — how far do I run? Should I proceed with:
        1) All open phases and blocks
        2) A specific phase
        3) A range of blocks
      Your call. End of line.
  session.start:
    channel: operator
    slots: []
    text: "[TRON]  Online. The fleet's mine now. You'll hear from me when it matters — not before."
  session.end:
    channel: operator
    slots: [count]
    text: "[TRON]  Session closed. {count} blocks through the loop. Pings kept to a minimum. End of line."
