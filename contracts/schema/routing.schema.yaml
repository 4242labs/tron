# routing.yaml — schema (B0 / D1). CANON shape.
# routing.yaml carries the TRIGGER GRAMMAR (closed vocabulary) + the INBOUND
# message-tag -> trigger map. The behaviour table lives in workflow.yaml; the old
# primitive library is gone (the table states every edge directly).
# Ships with TRON, copied verbatim at seed. The seeder NEVER writes this.
# Validated by blueprint-lint canon-level rules (grammar + closed-enum + coverage).

# ── Trigger grammar (closed) ───────────────────────────────────────
grammar:                       # REQUIRED
  notation: <str>              # human note on the token format
  forms: [<form>, ...]         # REQUIRED, >=1. allowed trigger shapes
  subjects: [<name>, ...]      # REQUIRED. legal leading segment
  events:   [<name>, ...]      # REQUIRED. legal event/qualifier segment
  params:                      # REQUIRED. placeholder tokens and their meaning
    "<type>":  <str>
    "<block>": <str>
  reserved:                    # OPTIONAL. literal segments that never bind a param
    <literal>: <str>
  wildcard: <str>              # REQUIRED. the fallback token (e.g. "*")
  alternatives: <str>          # REQUIRED. in-cell alternation token (e.g. "|")
  terminals: [<token>, ...]    # REQUIRED. non-trigger endpoints (e.g. end, "-")
  control: <token>             # REQUIRED. dispatch-loop signal; NOT a table-listener trigger
  match: <str>                 # REQUIRED. resolution rule (e.g. most-specific-wins)

# ── Inbound tag map (closed enum -> action) ────────────────────────
# Every tag classify_message can return maps to EXACTLY ONE of:
#   { trigger: <t> }  -> emit a workflow trigger (must satisfy grammar)
#   { side: <h> }     -> a global handler; FSM does not advance
#   { tick: true }    -> run one bounded tick
# Enum is closed; coverage is total (blueprint-lint).
tags:                          # REQUIRED, map of <tag> -> action
  <tag>: { trigger: <t> } | { side: <handler> } | { tick: true }

# ── Invalid-output policy (a judgment tool that won't validate) ─────
invalid_output:                # REQUIRED
  max_retries: <int>           # bounded retries before giving up
  on_exhaustion: <trigger>     # what fires when retries are spent (e.g. escalate via wall:raised:<block>)

# ── Judgment tools (the only LLM calls; schema-in / schema-out) ────
# Output is always a tag + structured slots, never free prose to the flow.
tools:                         # REQUIRED, map of <tool> -> { in: [...], out: [...] }
  <tool>: { in: [<field>, ...], out: [<field>, ...] }
  # canon set: classify_message (cheap), assess_wall (strong).
  # NOT tools by design: review verdicts (milestone), findings-triage (architect skill),
  # stall detection (engine liveness side-system).
