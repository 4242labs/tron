# knobs.yaml — schema (B0 / event-table model)
# The per-project KNOBS. TRON's behaviour is the fixed event table (PULSE +
# SWITCHBOARD, encoded in the engine) and is NOT composed per project — there are
# no `steps`/`primitives` here. The seeder (B1) writes only the knobs below.
# Lives at <agents>/tron/knobs.yaml. Tracked + PR'd.
# Re-read every session start. Validated by blueprint-lint (contracts §9, L10–L15, L25).
#
# The seeder writes THIS. It never writes routing.yaml or the event table (canon).

# ── Knobs (the per-project tunables the engine reads by name) ──
knobs:                             # REQUIRED
  worker_count: <n>                # REQUIRED key; value may be null -> asked at every session start.
                                   # The worker pool (engineers + reviewers); architect EXCLUDED.
  worker_model:                    # REQUIRED key (01-21; per-role since 01-30) — a MAP, not a
                                   # single string. Two keys, each REQUIRED and independently
                                   # fail-closed:
    architect: <str>               #   the persistent architect's model (recommended: a strong tier).
    other: <str>                   #   every non-architect role's model (engineer, reviewer, ...;
                                   #   recommended: a fast tier). NO baked default anywhere in the
                                   #   engine for either key — set by the seeder/operator or the
                                   #   bootup model question (console.py). Null/absent on the
                                   #   resolving role's key -> that role's spawn path refuses
                                   #   outright rather than fall back to a host-CLI ambient default,
                                   #   and never silently borrows the other key's value.
  architect_count: 1               # persistent architect queue drainers (throughput knob)
  git: on | off                    # whether the build commits via git (R8)
  silence_ping_min: 6              # worker silent this long (min) -> heartbeat ping; multiple of wake cadence
  silence_escalate_min: 8          # silent past this -> engine emits worker:stalled; > silence_ping_min
  wake_cooldown_sec: 5             # WAKE min-gap floor (sec, n>0): shortest interval between ticks (debounce)
  wake_ceiling_sec: 30             # WAKE max-latency ceiling (sec, n>0): a tick fires by now regardless; >= cooldown

# ── Reviewer cadence (PULL) — <type> -> blocks between reviews ──
cadence:                           # REQUIRED (may be empty {}). Types are open.
  <type>: <n>                      # e.g. code: 3  — a <type> reviewer every n completed blocks (n>0)

# ── Peer-consult pairs (R2; canon ships none — seeder sets per project) ──
peer_consults:                     # OPTIONAL list; empty by default
  - worker: <role>                 # e.g. engineer
    may_consult: <role>            # e.g. architect
    for: <str>                     # e.g. "technical/design questions"

# ── Session lifecycle ──
session:                           # REQUIRED
  persistent_architect: true | false   # R1: spawn one architect at start, alive until session-end

# ── Embedded default is authored in knobs.yaml (B2), not here. ──
# This file is the SHAPE; the canon default instance ships in knobs.yaml.
