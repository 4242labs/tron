# project.yaml — schema (B0)
# Per-project config record. Written by the seeder (B1) by detecting + asking.
# Lives at <agents>/tron/project.yaml. Tracked + PR'd. Re-read every session start.
# The annotated example lives at project.example.yaml; field meanings carry over verbatim.
#
# Annotations:  # REQUIRED | # OPTIONAL | <placeholder>  | a | b  (enum)

tron_version: <str>         # REQUIRED. Stamped by the seeder from canon VERSION at every seed/re-seed.
                            # Never hand-edit — lint L18 + `tron start` hard-fail on drift vs the instance's own VERSION.

# ── Pointers ─────────────────────────────────────────────────────────
pointers:
  agents: <path>            # REQUIRED. The project's worker personas (TRON reads; ships none). e.g. meta/agents/

# ── Canon pipeline (git-tracked; agents write via PR, TRON only reads) ──
# Paths relative to repo.root. pipeline.md = living doc (order);
# block files = dispatch truth (status, deps, gates). TRON never writes these.
pipeline_path: <path>       # REQUIRED. e.g. meta/pipeline.md
blocks_dir:    <path>       # REQUIRED. e.g. meta/blocks/
archive_dir:   <path>       # REQUIRED. e.g. meta/blocks/archive/

# ── Agents available (roles found at pointers.agents) ───────────────
# Seeder enumerates files present by scanning pointers.agents (role = file stem);
# it never creates them and TRON ships none. lint L13 hardcodes no roster — it only
# checks that the roles TRON's own knobs.yaml references resolve here: each cadence
# lens to a `reviewer-<lens>` or a generic `reviewer`, and every peer_consult role to a
# listed role. Omit this block entirely and L13 skips.
agents:                     # OPTIONAL (seeder-populated by scanning pointers.agents)
  - role: <name>            # e.g. engineer | architect | reviewer | <custom>
    file: <path>            # e.g. meta/agents/engineer.md
    model: <str>            # OPTIONAL (block 01-30). A per-role RECOMMENDED default the bootup
                            # model question (console.py) offers for confirm/override — NEVER
                            # itself the fail-closed resolution path. That is knobs.yaml's
                            # per-role `worker_model` map (architect / other), read by
                            # fsm._spawn — this field only seeds what the prompt suggests.
                            # Absent -> the engine's own built-in suggestion is shown instead
                            # (architect: a strong tier; every other role: a fast tier).

# ── Detected repo facts (auto; only matter to workflows that use them) ──
repo:                       # OPTIONAL block; present when a git workflow is used
  name: <str>
  root: <path>              # the trunk checkout TRON reads; agents build in worktrees off it
  main_branch: <str>        # e.g. main
  staging: staging | none   # staging = a staging deploy exists (CI auto-deploys from trunk to validate); none = no staging. Workers merge to trunk only; prod is operator-only.
  remote: <org/repo> | none # OPTIONAL; absent or `none` => local trunk mode (TRON reads HEAD in place, no `git fetch`) — for a local shakeout with no remote
  worktrees_dir: <path>     # default ../worktrees/  (<workspace>/worktrees/<repo>--<branch>/)
  logs_dir: <path>

# ── Conventions (spawn scripts read these instead of hardcoding) ────
conventions:                # OPTIONAL; defaults applied if absent
  branch_naming: <pattern>  # e.g. "{type}/{slug}-YYMMDD"
  block_id_pattern: <pattern>
  worker_id_pattern: <pattern>
  commit_convention: <str>
  pr_title_rule: <str>

# ── Notifications (followed without asking; contracts §0) ──
# The heartbeat is the WAKE daemon (always on while a session is live); it has no
# config knob — the off-switch is run-control (pause/drain/halt) or not starting it.
notifications:
  telegram: off | on        # REQUIRED. on => escalations route to the operator's Telegram

# ── Protected branches (only when the build commits via git; rule R8) ──
protected_branches:         # OPTIONAL
  - repo: <repo-name>
    branch: <branch>

# ── Declared test command (block 01-28: the trunk-stage trusted-verdict model) ──
# The engine's SOLE source of truth for "run the tests" — replaces the old hardcoded
# `*_test.py` / `python3` discovery, which only ever found Python. No test-command field
# existed before this; unrelated to `ci: {}` / `local_validation_gaps` below. Absent ->
# the engine cannot confirm validation at all: the DONE-TRUNK gate HOLDS and routes to
# the architect first (never a false pass, never a wall — see T3). 02-10 populates this
# same key in the scaffold's seeded project.yaml.
test:                       # OPTIONAL
  command: <str>            # REQUIRED within `test:` when present. The EXACT shell command the
                            # engine runs ONCE, in a clean checkout of the merged commit that the
                            # worker never controls (a detached `git worktree` at the merged sha) —
                            # the single authoritative run. Any language: `pytest -q`, `npm test`,
                            # `go test ./...`. A worker's own local run is dev feedback only, never
                            # this gate.
  env: {}                   # OPTIONAL. key: value string pairs LAYERED onto the clean checkout's
                            # inherited shell environment (never replacing it) before `command` runs
                            # — e.g. {NODE_ENV: test}. Never secrets: this file is git-tracked; real
                            # secrets live in <agents>/tron/.env, which this field does not touch.

# ── Free-form operator context (any may be empty) ──────────────────
operator_only_tasks: []     # tasks TRON escalates, never dispatches (DNS, dashboards, billing…)
local_validation_gaps: []   # work engineers do but can't fully verify (mobile, paid 3rd-party UAT…)
ci:                          # runner / duration / stall-threshold override
  check_name: <str>         # OPTIONAL (block 01-28 T4). The EXACT GH check-run name that runs
                            # `test.command` on trunk pushes. When set, the DONE-TRUNK gate trusts
                            # THAT check-run's verdict for the merged commit instead of re-running —
                            # only when it is commit-exact (its head_sha == the merged sha),
                            # non-stale (status == completed, never a pending/queued read), and this
                            # exact declared name (never a bare rollup guess). Absent -> no CI-verdict
                            # trust; the engine always runs `test.command` itself in a clean checkout.
deploy: {}                  # success check for the canon DoD deploy gate; inherited by blocks,
                            # overridable per block via the block's `Deploy:` field
notes: <str>                # OPTIONAL free text (monorepo boundaries, migration rules…)

# env keys are NOT here — they live in <agents>/tron/.env (gitignored), read by scripts only.
