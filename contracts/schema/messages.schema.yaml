# messages.yaml — schema (B0)
# CANON runtime copy registry. Every line TRON emits during a SESSION
# (operator / worker / terminal / TG), keyed by template id, with named slots.
# Rendered by render.sh: render(id, slots) -> string. B2 authors the instances.
# Seeder voice (tron-seed.md) is SEPARATE and never shares keys (contracts §6).
#
# RULES enforced by review/lint:
# - Tone (human-facing copy) = the TRON persona (dark, dry, sardonic). No host-runtime names, ever.
# - Every routing action that emits text references a template id that exists here.
# - Human-facing templates (terminal / operator / tg / session) carry inline `text`.
# - Worker-facing templates (channel: worker) carry NO inline copy — they reference `pmt: PMT-*`
#   into prompts/registry.yaml; the body is imported at tick (M-04). lint L15/L16 enforce this.
# - Placeholder copy keyed to the tag vocabulary is acceptable for B3 testing (R-4).

# ── Slot catalog (the only interpolations templates may use) ───────
slots:
  worker_id: <str>      # e.g. ENG-06-19   (NEVER a host-runtime name)
  role: <str>
  type: <str>           # reviewer lens: code | security | data | …
  block: <str>
  branch: <str>
  pr: <str>
  persona: <str>        # SPAWN: absolute path to the project's agent file
  report: <str>         # SPAWN: absolute path to the report-channel script
  detail: <str>         # free-text judgment payload (the one slot the LLM may fill with prose)
  reason: <str>
  count: <int>
  case: <str>           # escalation correlation id (e.g. CASE-001) — reply with it to settle
  assignment: <str>     # ASSIGN: the per-role work string the engine composes at emit
  merge_path: <str>     # ASSIGN: the mode-true merge instruction (local: no PR, engine merges; remote: PR) — 01-11 FX-4
  record_path: <str>    # DONE-RECORD: the mode-specific landing instruction for the gate-authorized ✅ commit — 01-11 FX-3

# ── Templates, grouped by channel/situation ────────────────────────
# Each entry:
#   channel: operator | worker | terminal | tg
#   slots: [ ... ]   # which slots it expects (subset of the catalog)
#   text: <canned string with {slot}>   — human-facing channels only
#   pmt:  PMT-<ROLE>-<PURPOSE>           — worker channel only (id into prompts/registry.yaml)
templates:

  # dispatch / spawn (worker channel) — each references a PMT id, never inline copy.
  # SPAWN is identity-only (01-07): every role uses PMT-SPAWN; the work follows on `online` (assign.*).
  spawn.engineer:   {channel: worker,   slots: [worker_id, role, persona, report], pmt: PMT-SPAWN}
  spawn.architect:  {channel: worker,   slots: [worker_id, role, persona, report], pmt: PMT-SPAWN}
  spawn.reviewer:   {channel: worker,   slots: [worker_id, role, persona, report], pmt: PMT-SPAWN}
  assign.engineer:  {channel: worker,   slots: [worker_id, assignment, merge_path, report], pmt: PMT-ASSIGN}   # work, after engineer reports online
  assign.reviewer:  {channel: worker,   slots: [worker_id, assignment, merge_path, report], pmt: PMT-ASSIGN}   # work, after reviewer reports online
  arch.forward:     {channel: worker,   slots: [block, worker_id, report],  pmt: PMT-SCOPE}          # architect scope-forward job
  arch.reconcile:   {channel: worker,   slots: [block, after, worker_id, report], pmt: PMT-RECONCILE}      # architect reconcile-ahead job
  arch.remediation: {channel: worker,   slots: [type, worker_id, report],   pmt: PMT-SCOPE-REMEDIATION} # architect review-remediation job
  arch.triage:      {channel: worker,   slots: [detail, sender, worker_id, report], pmt: PMT-TRIAGE}         # unclassified -> architect triage
  close.worker:     {channel: worker,   slots: [worker_id, report],         pmt: PMT-CLOSE}
  close.dirty:      {channel: worker,   slots: [worker_id, detail, report], pmt: PMT-CLOSE-DIRTY}   # CLOSE claim rejected — leftovers named (01-11)
  heartbeat.ping:   {channel: worker,   slots: [worker_id, report],         pmt: PMT-PING}
  gate.local:       {channel: worker,   slots: [worker_id, block, report],  pmt: PMT-DONE-LOCAL}     # DONE gate: validate locally
  gate.merge:       {channel: worker,   slots: [worker_id, block, report],  pmt: PMT-DONE-MERGE}     # DONE gate: merge
  gate.trunk:       {channel: worker,   slots: [worker_id, block, report],  pmt: PMT-DONE-TRUNK}     # DONE gate: prove on trunk
  gate.record:      {channel: worker,   slots: [worker_id, block, record_path, report], pmt: PMT-DONE-RECORD} # DONE gate: gate-ordered ✅ status commit (01-11)
  gate.review:      {channel: worker,   slots: [worker_id, report],         pmt: PMT-DONE-REVIEW}    # DONE gate: reviewer attest

  # between-task / terminal feedback (terminal channel; TRON voice)
  terminal.dispatched: {channel: terminal, slots: [worker_id, block], text: "<canned>"}
  terminal.block_done: {channel: terminal, slots: [block],            text: "<canned>"}
  terminal.review:     {channel: terminal, slots: [count],            text: "<canned>"}

  # escalation (operator / tg channels)
  escalate.wall:        {channel: operator, slots: [worker_id, block, detail], text: "<canned>"}
  escalate.unclassified: {channel: operator, slots: [detail],                  text: "<canned>"}
  tg.escalate:          {channel: tg,       slots: [worker_id, detail],        text: "<canned>"}
  tg.status_digest:     {channel: tg,       slots: [detail],                   text: "<canned>"}

  # session lifecycle (operator channel)
  session.start:        {channel: operator, slots: [],        text: "<canned>"}
  session.end:          {channel: operator, slots: [count],   text: "<canned>"}

# Coverage note: B2 must provide a template for every routing action that
# emits text. blueprint-lint cross-checks routing.yaml emit-points <-> these ids.
