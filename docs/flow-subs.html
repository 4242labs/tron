<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRON — Node Sub-processes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-navigated-viewer.development.js"></script>
<style>
  :root{
    --canvas-warm:#FDFAF5; --cream:#FEF3E2; --linen:#E8E3DD; --border-cool:#E7E5E4;
    --mid-stone:#B8AFA8; --stone:#756D68; --graphite:#433E3A; --charcoal:#1C1917;
    --copper:#E2711D; --copper-dark:#CC5D0A; --copper-soft:#FDECD8; --copper-border:#F5C9A1;
    --blue-dark:#2563EB; --emerald:#16A34A;
    --font-heading:'Space Grotesk',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
    --font-mono:'Geist Mono',ui-monospace,monospace;
    --sp-3:12px; --sp-4:16px; --sp-6:24px; --sp-8:32px; --r-4:10px; --r-full:999px;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--canvas-warm); color:var(--charcoal); font-family:var(--font-body);}
  .wrap{max-width:1100px; margin:0 auto; padding:var(--sp-8) var(--sp-6) 96px;}
  h1{font-family:var(--font-heading); font-weight:700; font-size:22px; margin:0 0 var(--sp-3); letter-spacing:-.01em;}
  h1 .accent{color:var(--copper);}
  .legend{font-family:var(--font-mono); font-size:12px; color:var(--stone); display:flex; gap:var(--sp-6); flex-wrap:wrap; margin-bottom:var(--sp-8);}
  .legend b{font-weight:500;}
  .sw{display:inline-block; width:11px; height:11px; border-radius:3px; vertical-align:-1px; margin-right:5px; border:1.5px solid;}
  .sw.det{background:#fff; border-color:var(--graphite);}
  .sw.aide{background:var(--copper-soft); border-color:var(--copper);}
  section{margin-bottom:var(--sp-8);}
  .nodehead{display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-3);}
  .nnum{font-family:var(--font-mono); font-size:13px; font-weight:500; color:var(--copper-dark); background:var(--copper-soft); border:1px solid var(--copper-border); border-radius:var(--r-full); padding:2px 9px;}
  .nname{font-family:var(--font-heading); font-weight:600; font-size:17px;}
  .canvas{background:#fff; border:1px solid var(--border-cool); border-radius:var(--r-4); overflow:hidden;}
  /* TRON-AIDE (LLM) task — colored; DET tasks stay default white */
  .djs-element.aide .djs-visual > rect{ fill:var(--copper-soft) !important; stroke:var(--copper) !important; }
  .djs-element.aide .djs-visual > text{ fill:var(--copper-dark) !important; }
</style>
</head>
<body>
<div class="wrap">

  <h1>TRON — <span class="accent">Node Sub-processes</span></h1>
  <div class="legend">
    <span><span class="sw det"></span><b>TRON-DET</b> deterministic step (script task)</span>
    <span><span class="sw aide"></span><b>TRON-AIDE</b> LLM step (business-rule task)</span>
    <span>scroll to pan · ctrl/⌘+scroll to zoom · sentries shown separately</span>
  </div>

  <section>
    <div class="nodehead"><span class="nnum">ND-01</span><span class="nname">BOOTUP</span></div>
    <div class="canvas" id="c-bootup"></div>
  </section>

  <section>
    <div class="nodehead"><span class="nnum">ND-02</span><span class="nname">PULSE</span></div>
    <div class="canvas" id="c-pulse"></div>
  </section>

</div>

<script>
  // ── the two sub-processes: ordered mechanical steps (sentries excluded) ──
  const BOOTUP = {
    start: 'tron start', end: 'first pulse → SWITCHBOARD',
    steps: [
      {n:'spawn TRON-AIDE'},
      {n:'trunk refresh — fetch + ff-only'},
      {n:'read pipeline'},
      {n:'read blocks (+ open PRs)'},
      {n:'dispatch TRON-AIDE with state'},
      {n:'lock scope'},
      {n:'dispatch TRON-AIDE for counts'},
      {n:'lock counts'},
      {n:'spawn architect(s)'},
      {n:'cap the pool'},
    ],
  };
  const PULSE = {
    start: 'tick', end: 'tick complete',
    steps: [
      {n:'trunk refresh — fetch + ff-only'},
      {n:'rebuild pipeline view'},
      {n:'refresh open-PR cache'},
      {n:'recognize newly-✅ blocks'},
      {n:'release worker of each newly-✅ block'},
      {n:'tick review cadence per newly-✅ block'},
      {n:'sweep liveness — detect stalled workers'},
      {n:'claim inboxes — rotate to .proc, read'},
      {n:'classify each message', aide:true},
      {n:'ingest / route each message'},
      {n:'drive in-flight DONE gates'},
      {n:'drain triggers — dispatch queued work'},
      {n:'save (persist effects first)'},
      {n:'drop claimed sidecars (at-least-once)'},
    ],
  };

  // ── layout constants (vertical flow) ──
  const CX = 260, TW = 280, TH = 76, SE = 36;
  const TOP = 120, PITCH = TH + 48;
  const taskX = CX - TW/2, evX = CX - SE/2;

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildXML(pid, def){
    const n = def.steps.length;
    const els = [], di = [], flows = [];
    const yOf = i => TOP + i*PITCH;
    const endY = TOP + n*PITCH;

    // start event
    els.push(`<bpmn:startEvent id="S" name="${esc(def.start)}"><bpmn:outgoing>f0</bpmn:outgoing></bpmn:startEvent>`);
    di.push(`<bpmndi:BPMNShape id="S_di" bpmnElement="S"><dc:Bounds x="${evX}" y="40" width="${SE}" height="${SE}"/><bpmndi:BPMNLabel><dc:Bounds x="${CX+28}" y="48" width="160" height="20"/></bpmndi:BPMNLabel></bpmndi:BPMNShape>`);

    def.steps.forEach((s,i)=>{
      const id = 'T'+i, tag = s.aide ? 'businessRuleTask' : 'scriptTask';
      const inc = 'f'+i, out = 'f'+(i+1);
      els.push(`<bpmn:${tag} id="${id}" name="${esc(s.n)}"><bpmn:incoming>${inc}</bpmn:incoming><bpmn:outgoing>${out}</bpmn:outgoing></bpmn:${tag}>`);
      di.push(`<bpmndi:BPMNShape id="${id}_di" bpmnElement="${id}"><dc:Bounds x="${taskX}" y="${yOf(i)}" width="${TW}" height="${TH}"/></bpmndi:BPMNShape>`);
    });

    // end event
    els.push(`<bpmn:endEvent id="E" name="${esc(def.end)}"><bpmn:incoming>f${n}</bpmn:incoming></bpmn:endEvent>`);
    di.push(`<bpmndi:BPMNShape id="E_di" bpmnElement="E"><dc:Bounds x="${evX}" y="${endY}" width="${SE}" height="${SE}"/><bpmndi:BPMNLabel><dc:Bounds x="${CX+28}" y="${endY+8}" width="200" height="20"/></bpmndi:BPMNLabel></bpmndi:BPMNShape>`);

    // flows + edges
    const edge = (id, a, b, y1, y2) => {
      flows.push(`<bpmn:sequenceFlow id="${id}" sourceRef="${a}" targetRef="${b}"/>`);
      di.push(`<bpmndi:BPMNEdge id="${id}_di" bpmnElement="${id}"><di:waypoint x="${CX}" y="${y1}"/><di:waypoint x="${CX}" y="${y2}"/></bpmndi:BPMNEdge>`);
    };
    edge('f0','S','T0', 40+SE, TOP);
    for(let i=0;i<n-1;i++) edge('f'+(i+1),'T'+i,'T'+(i+1), yOf(i)+TH, yOf(i+1));
    edge('f'+n,'T'+(n-1),'E', yOf(n-1)+TH, endY);

    return `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="D_${pid}" targetNamespace="http://tron/flow">
  <bpmn:process id="${pid}" isExecutable="false">
    ${els.join('\n    ')}
    ${flows.join('\n    ')}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="Dg_${pid}"><bpmndi:BPMNPlane id="Pl_${pid}" bpmnElement="${pid}">
    ${di.join('\n    ')}
  </bpmndi:BPMNPlane></bpmndi:BPMNDiagram>
</bpmn:definitions>`;
  }

  async function render(containerId, pid, def){
    const n = def.steps.length;
    const height = TOP + n*PITCH + SE + 40;
    const el = document.getElementById(containerId);
    el.style.height = height + 'px';
    const viewer = new BpmnJS({ container: '#'+containerId });
    try{
      await viewer.importXML(buildXML(pid, def));
      const canvas = viewer.get('canvas');
      canvas.zoom('fit-viewport', 'auto');
      // color the TRON-AIDE (LLM) tasks
      def.steps.forEach((s,i)=>{ if(s.aide) canvas.addMarker('T'+i, 'aide'); });
    }catch(e){ el.innerHTML = '<pre style="padding:16px;color:#b91c1c">'+e+'</pre>'; }
  }

  render('c-bootup','ND01_BOOTUP', BOOTUP);
  render('c-pulse','ND02_PULSE', PULSE);
</script>
</body>
</html>
