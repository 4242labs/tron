<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRON — Core Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-viewer.development.js"></script>
<style>
  :root{
    --canvas-warm:#FDFAF5; --cream:#FEF3E2; --border-cool:#E7E5E4;
    --mid-stone:#B8AFA8; --stone:#756D68; --graphite:#433E3A; --charcoal:#1C1917;
    --copper:#E2711D; --copper-dark:#CC5D0A; --copper-soft:#FDECD8; --copper-border:#F5C9A1;
    --blue-dark:#2563EB; --emerald:#16A34A;
    --font-heading:'Space Grotesk',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
    --font-mono:'Geist Mono',ui-monospace,monospace;
    --sp-3:12px; --sp-4:16px; --sp-6:24px; --sp-8:32px; --r-4:10px; --r-full:999px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0; background:var(--canvas-warm); color:var(--charcoal); font-family:var(--font-body); height:100vh; overflow:hidden;}
  .wrap{max-width:none; margin:0; padding:0; height:100vh;}
  #core{height:100vh; background:var(--canvas-warm); overflow:hidden;}
  .bjs-powered-by{display:none !important;}
  .bjs-drilldown{display:none !important;}
  .zoomctl{position:absolute; right:18px; top:16px; display:flex; gap:6px; z-index:7;}
  .zoomctl.in-ov{right:56px;}
  .zoomctl button{width:32px; height:32px; border:1px solid var(--border-cool); background:#fff; border-radius:8px; font-size:18px; line-height:1; color:var(--graphite); cursor:pointer; font-family:var(--font-body); box-shadow:0 1px 3px rgba(28,25,23,.08);}
  .zoomctl button:hover{background:var(--cream); border-color:var(--copper-border);}
  /* collapsed sub-process nodes are clickable */
  .djs-element.has-sub{cursor:pointer;}
  .djs-element.has-sub .djs-visual > rect{ fill:var(--copper-soft) !important; stroke:var(--copper) !important; stroke-width:2px !important; }

  /* overlay */
  #ov{position:fixed; inset:0; background:var(--canvas-warm); display:none; z-index:50;}
  #ov.open{display:block;}
  .ovbox{position:relative; background:var(--canvas-warm); height:100vh; width:100vw; display:flex; flex-direction:column; overflow:hidden;}
  #ovcanvas{flex:1; min-height:0;}
  .ovnav{position:absolute; top:16px; left:18px; z-index:7;}
  .ovclose{position:absolute; top:16px; right:18px; z-index:7;}
  .nnum{font-family:var(--font-mono); font-size:13px; font-weight:500; color:var(--copper-dark); background:var(--copper-soft); border:1px solid var(--copper-border); border-radius:var(--r-full); padding:2px 9px;}
  .nname{font-family:var(--font-heading); font-weight:600; font-size:17px;}
  .x{cursor:pointer; border:1px solid var(--border-cool); background:#fff; border-radius:8px; width:32px; height:32px; font-size:18px; line-height:1; color:var(--stone);}
  .djs-element.aide .djs-visual > rect{ fill:var(--copper-soft) !important; stroke:var(--copper) !important; }
  .djs-element.aide .djs-visual > text{ fill:var(--copper-dark) !important; }
  .djs-element.op .djs-visual > rect{ fill:#EFF6FF !important; stroke:var(--blue-dark) !important; }
  .djs-element.op .djs-visual > text{ fill:var(--blue-dark) !important; }
  /* horizontal diagram header (42labs DS) — replaces the pool's vertical title band */
  .flowhead{position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:6;
    display:flex; align-items:center; gap:10px; pointer-events:none;}
  .flowhead .nname{font-family:var(--font-heading); font-weight:600; font-size:16px; color:var(--charcoal); letter-spacing:-.01em;}
</style>
</head>
<body>
<div class="wrap">
  <div id="core"></div>
</div>

<div id="ov"><div class="ovbox">
  <div class="flowhead" id="ovhead"></div>
  <div id="ovcanvas"></div>
  <button class="x ovnav" id="ov-back" onclick="ovBack()" style="display:none">‹</button>
  <button class="x ovclose" onclick="closeOv()">×</button>
</div></div>

<script>
/* ════════════ DATA MODEL ════════════ */
const LANES = [
  {id:'L_ENG', name:'ENGINEER',  y:80,  h:150},
  {id:'L_TRON',name:'TRON',      y:230, h:360},
  {id:'L_ARCH',name:'ARCHITECT', y:590, h:150},
  {id:'L_REV', name:'REVIEWERS', y:740, h:150},
];
const POOL = {x:160,y:80,w:1340,h:810};
const LANE_X = 190, LANE_W = 1310;

const NODES = [
  // TRON lane — spine: Start→BOOTUP→PULSE ; PULSE + CA1 merge at router RT1 → SWITCHBOARD (one centerline)
  {id:'Start', kind:'start', name:'tron:start',     lane:'L_TRON', x:240, y:292, w:36, h:36},
  {id:'ND-01', kind:'sub',   name:'BOOTUP',         lane:'L_TRON', x:300, y:276, w:96, h:68, sub:'BOOTUP'},
  {id:'ND-02', kind:'sub',   name:'PULSE',          lane:'L_TRON', x:470, y:276, w:96, h:68, sub:'PULSE'},
  {id:'ND-03', kind:'xor',   name:'SWITCHBOARD',    lane:'L_TRON', x:494, y:400, w:48, h:48},
  {id:'TM1',   kind:'timer', name:'cadence',        lane:'L_TRON', x:476, y:230, w:36, h:36, lblAbove:true},   // → PULSE top-¼ (cadence floor)
  {id:'CA1',   kind:'catch', name:'pulse',          lane:'L_TRON', x:524, y:230, w:36, h:36, lblAbove:true},   // → PULSE top-¾ (pulse event; catches TH1/TH2)
  // lower chain row (SWITCHBOARD level): fill-slot → done-path
  {id:'ND-05', kind:'task',  name:'Assign worker',  lane:'L_TRON', x:640, y:424, w:104,h:56},
  {id:'ND-04', kind:'task',  name:'DONE-gate',      lane:'L_TRON', x:800, y:424, w:110,h:56},
  {id:'ND-10', kind:'task',  name:'Release',        lane:'L_TRON', x:962, y:424, w:96, h:56},
  {id:'TH1',   kind:'throw', name:'pulse',          lane:'L_TRON', x:1140,y:434, w:36, h:36},
  // wall-path (lower sub-row)
  {id:'ND-06', kind:'task',  name:'Escalate',       lane:'L_TRON', x:800, y:500, w:100,h:56},
  {id:'ND-07', kind:'task',  name:'Apply decision', lane:'L_TRON', x:1090,y:500, w:120,h:56},
  // worker monitoring
  {id:'ND-09', kind:'task',  name:'Observe',        lane:'L_TRON', x:800, y:300, w:104,h:48},
  {id:'End',   kind:'end',   name:'Session End',    lane:'L_TRON', x:244, y:434, w:36, h:36},
  // ENGINEER lane
  {id:'ND-11', kind:'task',  name:'Build',          lane:'L_ENG',  x:640, y:128, w:104,h:52},
  {id:'EX',    kind:'xor',   name:'',               lane:'L_ENG',  x:900, y:131, w:48, h:48},
  // ARCHITECT lane
  {id:'ND-08', kind:'task',  name:'Assign',         lane:'L_ARCH', x:340, y:639, w:104,h:52},
  {id:'ND-12', kind:'task',  name:'Scope block',    lane:'L_ARCH', x:640, y:639, w:120,h:52},
  {id:'ND-13', kind:'task',  name:'Log Review',     lane:'L_ARCH', x:900, y:639, w:120,h:52},
  {id:'TH2',   kind:'throw', name:'pulse',          lane:'L_ARCH', x:1080,y:647, w:36, h:36},
  // REVIEWERS lane
  {id:'ND-14', kind:'task',  name:'<type> Review',  lane:'L_REV',  x:640, y:789, w:120,h:52},
];

const FLOWS = [
  ['Start','ND-01'], ['ND-01','ND-02'], ['ND-02','ND-03'],
  ['TM1','ND-02','',{toTop:0.25}], ['CA1','ND-02','',{toTop:0.75}],   // timer + pulse event re-enter PULSE at its top
  ['ND-03','ND-05','fill slot'], ['ND-03','ND-08','clear ahead'],
  ['ND-03','ND-14','review'], ['ND-03','End','session:end'],
  ['ND-05','ND-11'], ['ND-11','ND-09'], ['ND-09','EX'],
  ['EX','ND-04','done'], ['EX','ND-06','wall'],
  ['ND-04','ND-10'], ['ND-10','TH1'], ['ND-06','ND-07'], ['ND-07','TH1'],
  ['ND-08','ND-12'], ['ND-12','TH2'], ['ND-14','ND-13'], ['ND-13','TH2'],
];

const TAG = {start:'startEvent', end:'endEvent', task:'task', sub:'subProcess', xor:'exclusiveGateway', throw:'intermediateThrowEvent', catch:'intermediateCatchEvent', timer:'intermediateCatchEvent'};

/* ════════════ CORE XML ════════════ */
const byId = Object.fromEntries(NODES.map(n=>[n.id,n]));
const center = n => ({x:n.x+n.w/2, y:n.y+n.h/2});

function route(s,t){
  const sc=center(s), tc=center(t);
  if(Math.abs(sc.y-tc.y)<=22){
    return tc.x>sc.x ? [{x:s.x+s.w,y:sc.y},{x:t.x,y:tc.y}] : [{x:s.x,y:sc.y},{x:t.x+t.w,y:tc.y}];
  }
  if(Math.abs(sc.x-tc.x)<=6){  // same column → clean two-point vertical, no backtrack
    return [{x:sc.x, y: tc.y>sc.y ? s.y+s.h : s.y}, {x:tc.x, y: tc.y>sc.y ? t.y : t.y+t.h}];
  }
  const exitY = tc.y>sc.y ? s.y+s.h : s.y;
  let entry;
  if(tc.x>sc.x+4) entry={x:t.x,y:tc.y};
  else if(tc.x<sc.x-4) entry={x:t.x+t.w,y:tc.y};
  else entry={x:tc.x, y: tc.y>sc.y ? t.y : t.y+t.h};
  return [{x:sc.x,y:exitY},{x:sc.x,y:tc.y},entry];
}
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function coreXML(){
  const linkNodes = new Set(['TH1','TH2','CA1']);
  // process elements
  const flowEls = NODES.map(n=>{
    const tag = TAG[n.kind];
    const inc = FLOWS.filter(f=>f[1]===n.id).map((f,i)=>`<bpmn:incoming>${f[0]}__${f[1]}</bpmn:incoming>`).join('');
    const out = FLOWS.filter(f=>f[0]===n.id).map(f=>`<bpmn:outgoing>${f[0]}__${f[1]}</bpmn:outgoing>`).join('');
    const def = (n.kind==='throw'||n.kind==='catch') ? `<bpmn:linkEventDefinition id="${n.id}_led" name="pulse"/>`
              : n.kind==='timer' ? `<bpmn:timerEventDefinition id="${n.id}_ted"/>` : '';
    const label = n.name ? `${n.id}\n${n.name}` : n.id;
    return `<bpmn:${tag} id="${n.id}" name="${esc(label)}">${inc}${out}${def}</bpmn:${tag}>`;
  }).join('\n    ');

  const seqEls = FLOWS.map(f=>`<bpmn:sequenceFlow id="${f[0]}__${f[1]}" sourceRef="${f[0]}" targetRef="${f[1]}"${f[2]?` name="${esc(f[2])}"`:''}/>`).join('\n    ');

  const laneEls = LANES.map(l=>{
    const refs = NODES.filter(n=>n.lane===l.id).map(n=>`<bpmn:flowNodeRef>${n.id}</bpmn:flowNodeRef>`).join('');
    return `<bpmn:lane id="${l.id}" name="${l.name}">${refs}</bpmn:lane>`;
  }).join('\n      ');

  // DI
  const poolShape = `<bpmndi:BPMNShape id="Pool_di" bpmnElement="Pool" isHorizontal="true"><dc:Bounds x="${POOL.x}" y="${POOL.y}" width="${POOL.w}" height="${POOL.h}"/></bpmndi:BPMNShape>`;
  const laneShapes = LANES.map(l=>`<bpmndi:BPMNShape id="${l.id}_di" bpmnElement="${l.id}" isHorizontal="true"><dc:Bounds x="${LANE_X}" y="${l.y}" width="${LANE_W}" height="${l.h}"/></bpmndi:BPMNShape>`).join('\n      ');
  const nodeShapes = NODES.map(n=>{
    const exp = n.kind==='sub' ? ' isExpanded="false"' : '';
    const marker = n.kind==='xor' ? ' isMarkerVisible="true"' : '';
    const lbl = (n.kind==='start'||n.kind==='end'||n.kind==='throw'||n.kind==='catch'||n.kind==='timer')
      ? `<bpmndi:BPMNLabel><dc:Bounds x="${n.x-20}" y="${n.lblAbove?n.y-16:n.y+n.h+2}" width="76" height="14"/></bpmndi:BPMNLabel>` : '';
    return `<bpmndi:BPMNShape id="${n.id}_di" bpmnElement="${n.id}"${exp}${marker}><dc:Bounds x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}"/>${lbl}</bpmndi:BPMNShape>`;
  }).join('\n      ');
  const edgeShapes = FLOWS.map(f=>{
    const o=f[3]; let pts;
    if(o && o.toTop!==undefined){ const s=byId[f[0]], t=byId[f[1]], sx=s.x+s.w/2, tx=t.x+t.w*o.toTop;
      pts = Math.abs(sx-tx)<2 ? [{x:sx,y:s.y+s.h},{x:tx,y:t.y}] : [{x:sx,y:s.y+s.h},{x:sx,y:t.y-12},{x:tx,y:t.y-12},{x:tx,y:t.y}]; }
    else pts = route(byId[f[0]], byId[f[1]]);
    const wp = pts.map(p=>`<di:waypoint x="${Math.round(p.x)}" y="${Math.round(p.y)}"/>`).join('');
    return `<bpmndi:BPMNEdge id="${f[0]}__${f[1]}_di" bpmnElement="${f[0]}__${f[1]}">${wp}</bpmndi:BPMNEdge>`;
  }).join('\n      ');

  return `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="Defs" targetNamespace="http://tron/flow">
  <bpmn:collaboration id="Collab">
    <bpmn:participant id="Pool" name="TRON workflow" processRef="Proc"/>
  </bpmn:collaboration>
  <bpmn:process id="Proc" isExecutable="false">
    <bpmn:laneSet id="LS">
      ${laneEls}
    </bpmn:laneSet>
    ${flowEls}
    ${seqEls}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="Dg"><bpmndi:BPMNPlane id="Pl" bpmnElement="Collab">
      ${poolShape}
      ${laneShapes}
      ${nodeShapes}
      ${edgeShapes}
  </bpmndi:BPMNPlane></bpmndi:BPMNDiagram>
</bpmn:definitions>`;
}

/* ════════════ FLOW REGISTRY (overlay) — node sub-processes + sentry sub-processes ════════════ */
const FLOW = {
  'ND-01': { num:'ND-01', name:'BOOTUP', start:'', end:'PULSE', grid:true, endPos:[3,5],
    steps:[
    // common spine — row0 L→R, snakes down to the fork
    {n:'Spawn TRON-AIDE', pos:[0,0]},                                              // T0
    {n:'Refresh trunk',   pos:[1,0]},                                              // T1
    {n:'Refresh PRs',     pos:[2,0]},                                              // T2
    {n:'Build snapshot',  pos:[3,0], data:{name:'SNAPSHOT', dir:'out', at:'above'}}, // T3
    {n:'Read MANIFEST',   pos:[3,1], data:{name:'MANIFEST', dir:'in',  at:'right'}}, // T4 — probe
    {n:'Resume?', kind:'gateway', pos:[2,1]},                                      // T5 — fork on presence
    // fresh branch — straight down col2
    {n:'Set scope',  kind:'sub', opens:'ND-01-07', pos:[2,2]},                     // T6
    {n:'Set counts', kind:'sub', opens:'ND-01-08', pos:[2,3]},                     // T7
    {n:'Write MANIFEST', pos:[2,4], data:{name:'MANIFEST', dir:'out', at:'right'}},   // T8 — born
    // resume branch — down col1, LEFT of the fresh column (load+pipeline+fleet are one node)
    {n:'Reconcile',   pos:[1,1], data:{name:'MANIFEST', dir:'out', at:'left', dock:0.75}}, // T9 — aligned with Resume?; resume enters its right, MANIFEST docks left-¾
    {n:'Consistent?', kind:'gateway', pos:[1,2]},                                  // T10
    // merge → tail (col2)
    {n:'Cap pool', pos:[2,5]},                                                     // T11 → PULSE
    {n:'Resolve', kind:'sub', opens:'ND-01-13', pos:[1,3], data:{name:'OUTBOX', dir:'out', at:'below'}},   // T12 — escalation; may message live workers → durable OUTBOX (flushed by first PULSE Deliver)
    // link catches — where 01-13's throws land (repair re-reconciles, restart re-scopes)
    {n:'→ 01-10', kind:'catch', pos:[0,1]},                                        // T13 → Reconcile (docks left-¼)
    {n:'→ 01-07', kind:'catch', pos:[3,2]},                                        // T14 → Set scope
  ],
    edges:[
      {f:'S',t:'T0'},{f:'T0',t:'T1'},{f:'T1',t:'T2'},{f:'T2',t:'T3'},{f:'T3',t:'T4'},{f:'T4',t:'T5'},
      {f:'T5',t:'T6',label:'fresh'},
      {f:'T5',t:'T9',label:'resume'},   // same row → straight into Reconcile's right side
      {f:'T6',t:'T7'},{f:'T7',t:'T8'},
      {f:'T8',t:'T11'},
      {f:'T9',t:'T10'},
      {f:'T10',t:'T11',label:'ok'},
      {f:'T10',t:'T12',label:'conflict'},
      {f:'T11',t:'E'},
      {f:'T13',t:'T9', from:{s:'r'}, to:{s:'l',d:0.25}},   // → 01-10 catch → Reconcile left-¼ (repair); MANIFEST sits at left-¾
      {f:'T14',t:'T6'},   // → 01-07 catch → Set scope (restart)
    ]},
  'ND-02': { num:'ND-02', name:'PULSE', start:'', end:'Tick complete', grid:true, endPos:[2,2], steps:[
    // re-invoked each tick by the BASE loop (timer cadence OR pulse event); start here is just the entry
    // 02-01 fork: first entry from BOOTUP arrives with a fresh snapshot (trunk+PRs+build ran in ND-01 before the fork),
    // so the refresh trio is skipped once; every recurring tick rebuilds from trunk (no drift across crash / off-session).
    {n:'First tick?', kind:'gateway', pos:[0,0], lblPos:'top'},                          // T0  02-01
    {n:'Refresh trunk',     pos:[1,0]},                                                  // T1  02-02  ┐ refresh trio
    {n:'Refresh PRs',       pos:[2,0]},                                                  // T2  02-03  │  (recurring only)
    {n:'Rebuild snapshot',  pos:[3,0], data:{name:'SNAPSHOT', dir:'out', at:'above'}},   // T3  02-04  ┘
    {n:'Detect done',       pos:[4,0]},                                                  // T4  02-05  ← merge (both branches)
    // worker lifecycle — detect (Assess) then dispose (Settle); ambiguous cases escalate
    {n:'Assess workers',    pos:[4,1]},   // row 1 ←                                     // T5  02-06  liveness + TTL + PR → done/dead/hung/orphan
    {n:'Settle workers',    pos:[3,1]},                                                  // T6  02-07  release safe (resume-session / fresh); flag ambiguous; APPLY any resolved escalation whose operator reply has landed
    {n:'Escalate?', kind:'gateway', pos:[2,1]},                                          // T7  02-08
    {n:'Resolve', kind:'sub', opens:'ND-02-09', pos:[1,2]},                              // T8  02-09  raise-and-defer escalation (brief operator → OUTBOX → mark pending → await)
    {n:'Tick cadence',      pos:[1,1]},                                                  // T9  02-10  merge: clean + resolved
    {n:'Claim inboxes',     pos:[0,1]},                                                  // T10 02-11
    {n:'Messages?', kind:'gateway', pos:[0,2]},                                          // T11 02-12  empty inbox → skip ONLY classify+route (sends still happen)
    {n:'Classify messages', pos:[0.202,3], actor:'aide'},  // T12 02-13 — its top-¼ sits under 02-12's drop (straight)
    {n:'Route messages',    pos:[1,3]},   // row 3 →                                     // T13 02-14  inbound → outbox
    {n:'Drive gates',       pos:[2,3]},                                                  // T14 02-15  merge: routed + skipped; may enqueue sends (unblock/review/reject)
    {n:'Drain triggers',    pos:[3,3]},                                                  // T15 02-16  operator commands; may enqueue sends
    {n:'Deliver', kind:'mthrow', pos:[4,3], data:{name:'OUTBOX', dir:'in', at:'right'}}, // T16 02-17  single end-of-tick flush of ALL queued sends (id-tagged for dedupe)
    {n:'Save state',        pos:[4,2], data:{name:'MANIFEST', dir:'out', at:'right'}},   // T17 02-18
    {n:'Drop sidecars',     pos:[3,2]},                                                  // T18 02-19  (effects persisted before sidecars dropped)
  ],
    edges:[
      {f:'S',t:'T0'},
      {f:'T0',t:'T1',label:'recurring'},                       // full rebuild from trunk
      {f:'T0',t:'T4',label:'first', labelAt:'start', from:{s:'b'}, to:{s:'b',d:0.25}},  // skip the trio → straight under-route into Detect done
      {f:'T1',t:'T2'},{f:'T2',t:'T3'},{f:'T3',t:'T4'},         // refresh trio → merge
      {f:'T4',t:'T5'},{f:'T5',t:'T6'},{f:'T6',t:'T7'},          // detect done → assess → settle → escalate?
      {f:'T7',t:'T9',label:'ok'},                              // clean → continue the tick
      {f:'T7',t:'T8',label:'escalate', from:{s:'b'}, to:{s:'r'}},  // leave 02-08 bottom → into 02-09 right
      {f:'T8',t:'T9'},                                         // resolved → rejoin (straight up into cadence)
      {f:'T9',t:'T10'},                                        // cadence → claim inboxes
      {f:'T10',t:'T11'},                                       // claim → messages? gateway (down)
      {f:'T11',t:'T12',label:'yes', from:{s:'b'}, to:{s:'t',d:0.25}},          // messages → classify (straight drop)
      {f:'T11',t:'T14',label:'no', from:{s:'b',d:0.75}, to:{s:'t'}},    // empty inbox → skip classify+route → drive gates (top-centre)
      {f:'T12',t:'T13', from:{s:'t',d:0.75}, to:{s:'l'}},     // 02-13 top-¾ → 02-14 left
      {f:'T13',t:'T14'},                                       // route → drive gates (merge)
      {f:'T14',t:'T15'},                                       // gates → triggers
      {f:'T15',t:'T16'},                                       // triggers → deliver (single flush, after all producers)
      {f:'T16',t:'T17'},                                       // deliver → save
      {f:'T17',t:'T18'},                                       // save → drop (persist before drop)
      {f:'T18',t:'E'},
    ]},
  'ND-01-07': { num:'ND-01-07', name:'SET SCOPE', start:'', end:'Scope locked',
    steps:[
      {n:'Assign TRON-AIDE', col:0},                    // T0 det
      {n:'Ask scope', actor:'aide', col:0},             // T1 — directly below Assign (aligned)
      {n:'Answer scope', actor:'op', col:1},            // T2

      if(e.enter==='right'){                                          // back-edge → arc over the top, drop in from the target's right side
        const yL=bandTopOf(s.row)+TOK.loopInset, xR=t.right+TOK.loopInset, sx=s.cx+stag;
        wp=[[sx,s.top],[sx,yL],[xR,yL],[xR,t.cy],[t.right,t.cy]];
      } else if(e.enter==='top'){                                     // up-edge → into the target lane's top margin, drop into target top-center
        const yCh=bandTopOf(t.row)+TOK.laneTopMargin, sx=s.cx+stag;
        wp=[[sx,s.top],[sx,yCh],[t.cx,yCh],[t.cx,t.top]];
      } else if(sameRow && dcol<0){                                   // backward same-lane → straight (cleanest; arrives on the target's right)
        wp=[[s.left,s.cy],[t.right,t.cy]];
      } else if(drow===0){                                            // same lane forward → straight
        wp = dcol>=0 ? [[s.right,s.cy],[t.left,t.cy]] : [[s.left,s.cy],[t.right,t.cy]];
      } else if(sameCol){                                             // straight vertical between lanes
        wp = drow>0 ? [[s.cx,s.bottom],[t.cx,t.top]] : [[s.cx,s.top],[t.cx,t.bottom]];
      } else {                                                        // cross-lane hop → exit sideways toward target (never up through the source column), turn at the target column, enter top/bottom
        const ey=s.cy+stag, exX=dcol>0?s.right:s.left, enterY=drow>0?t.top:t.bottom;
        wp=[[exX,ey],[t.cx,ey],[t.cx,enterY]];
      }
    }
    // label at the midpoint of the edge's middle segment, offset off the line — diverging branches never share an anchor
    let lbl='';
    if(e.label){
      let lx,ly;
      if(e.vlabel){                                              // vertical label beside its line, hugging the gateway (source), letter-bottoms toward the line (rotated post-render)
        const lineX=wp[0][0], above=t.cy<s.cy, cx2=lineX+12;
        const cy2 = above ? s.top-26 : s.bottom+40;              // repair: just above the gateway · halt: below the bottom-centre id label
        lx=cx2-32; ly=cy2-7;
      } else if(e.labelAt==='start'){                            // hug the source: sit at the start of the first long run after the gateway
        const a=wp.length>3?wp[1]:wp[0], b=wp.length>3?wp[2]:wp[1], horiz=Math.abs(b[0]-a[0])>=Math.abs(b[1]-a[1]);
        lx=horiz?(a[0]<b[0]?a[0]+TOK.labelGap:a[0]-26-TOK.labelGap):a[0]+TOK.labelGap; ly=horiz?a[1]-16:a[1]+TOK.labelGap;
      } else {
        const i0=Math.floor((wp.length-1)/2), a=wp[i0], b=wp[i0+1];
        const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2, horiz=Math.abs(b[0]-a[0])>=Math.abs(b[1]-a[1]);
        lx=horiz?mx-26:mx+TOK.labelGap; ly=horiz?my-16:my-7;
      }
      lbl=`<bpmndi:BPMNLabel><dc:Bounds x="${Math.round(lx)}" y="${Math.round(ly)}" width="64" height="14"/></bpmndi:BPMNLabel>`;
    }
    di.push(`<bpmndi:BPMNEdge id="sf${k}_di" bpmnElement="sf${k}">${wp.map(p=>`<di:waypoint x="${Math.round(p[0])}" y="${Math.round(p[1])}"/>`).join('')}${lbl}</bpmndi:BPMNEdge>`);
  });

  // data objects — emitted from the precomputed token boxes; label on the far side so it never crosses the association
  const dataEls=[], assoc=[];
  dataBoxes.filter(Boolean).forEach(b=>{
    const {i, d, at, W, H, out, dx, dy, p1, p2} = b;
    const ref=`DOR${i}`, obj=`DO${i}`, aId=`asc${i}`;
    dataEls.push(`<bpmn:dataObjectReference id="${ref}" name="${esc(d.name)}" dataObjectRef="${obj}"/>`);
    dataEls.push(`<bpmn:dataObject id="${obj}"/>`);
    const lblY = at==='above' ? dy-TOK.dataLabelH : dy+H+3;   // far side of the icon (away from the node)
    assoc.push(`<bpmn:association id="${aId}" sourceRef="${out?'T'+i:ref}" targetRef="${out?ref:'T'+i}" associationDirection="One"/>`);
    di.push(`<bpmndi:BPMNShape id="${ref}_di" bpmnElement="${ref}"><dc:Bounds x="${Math.round(dx)}" y="${Math.round(dy)}" width="${W}" height="${H}"/><bpmndi:BPMNLabel><dc:Bounds x="${Math.round(dx+W/2-50)}" y="${Math.round(lblY)}" width="100" height="14"/></bpmndi:BPMNLabel></bpmndi:BPMNShape>`);
    const awp = out?[p1,p2]:[p2,p1];
    di.push(`<bpmndi:BPMNEdge id="${aId}_di" bpmnElement="${aId}">${awp.map(p=>`<di:waypoint x="${Math.round(p[0])}" y="${Math.round(p[1])}"/>`).join('')}</bpmndi:BPMNEdge>`);
  });

  return `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="D_sp" targetNamespace="http://tron/flow">
  <bpmn:collaboration id="CollabS"><bpmn:participant id="PoolS" name="" processRef="SP"/></bpmn:collaboration>
  <bpmn:process id="SP" isExecutable="false">
    <bpmn:laneSet id="LS_S">${lanes}</bpmn:laneSet>
    ${els.join('\n    ')}
    ${dataEls.join('\n    ')}
    ${fl.join('\n    ')}
    ${assoc.join('\n    ')}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="Dg_sp"><bpmndi:BPMNPlane id="Pl_sp" bpmnElement="CollabS">
    ${di.join('\n    ')}
  </bpmndi:BPMNPlane></bpmndi:BPMNDiagram>
</bpmn:definitions>`;
}

/* ════════════ RENDER ════════════ */
// repaint node shapes after edges so sequence flows sit beneath the boxes
// TODO(flow): edges still overlap some node boxes — appendChild reorder is partial.
//   Real fix likely needs per-edge waypoint clipping to shape borders, or a
//   separate connection layer. Deferred.
function edgesBehind(viewer){
  const er = viewer.get('elementRegistry');
  er.forEach(el=>{
    if(el.waypoints) return;                                   // skip connections
    if(el.type==='bpmn:Participant' || el.type==='bpmn:Lane') return; // keep pool/lanes back
    const g = er.getGraphics(el);
    if(g && g.parentNode) g.parentNode.appendChild(g);         // move to front
  });
}
// collapsed sub-process: bpmn-js centers the label but bottoms the [+] marker, leaving the
// content low with empty top. Shift label + marker up as one unit so it reads centered.
function recenterSubMarkers(viewer){
  const er=viewer.get('elementRegistry');
  er.filter(e=>e.type==='bpmn:SubProcess').forEach(e=>{
    const vis=er.getGraphics(e).querySelector('.djs-visual'); if(!vis) return;
    [...vis.children].forEach((ch,idx)=>{
      if(idx===0) return;                                   // keep the box outline
      const dy = idx===1 ? -12.5 : -7.5;                    // label up more, marker less → modest gap, still centered
      ch.setAttribute('transform', `translate(0,${dy}) ${ch.getAttribute('transform')||''}`.trim());
    });
  });
}
// bpmn-js draws no divider between a lane's owner-name band and its content — add one,
// inside the lane's own graphics group so it renders identically to the lane border
function addLaneDividers(viewer){
  const er = viewer.get('elementRegistry'), NS='http://www.w3.org/2000/svg';
  er.filter(e=>e.type==='bpmn:Lane').forEach(l=>{
    const g=er.getGraphics(l); if(!g) return;
    const ref=g.querySelector('rect'), cs=ref?getComputedStyle(ref):null;
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',30); ln.setAttribute('y1',0);     // local coords (lane group is translated)
    ln.setAttribute('x2',30); ln.setAttribute('y2',l.height);
    ln.setAttribute('stroke', cs?cs.stroke:'rgb(34, 36, 42)');
    ln.setAttribute('stroke-width', cs?parseFloat(cs.strokeWidth):1.5);
    g.appendChild(ln);
  });
}
// keep the viewport inside the diagram bounds (no infinite canvas)
function clampVB(canvas){
  const vb=canvas.viewbox(), inner=vb.inner; let {x,y,width,height}=vb;
  x = width>=inner.width  ? inner.x-(width-inner.width)/2   : Math.min(Math.max(x,inner.x), inner.x+inner.width-width);
  y = height>=inner.height? inner.y-(height-inner.height)/2 : Math.min(Math.max(y,inner.y), inner.y+inner.height-height);
  canvas.viewbox({x,y,width,height});
}
function fitNow(viewer){ const c=viewer.get('canvas'); c.zoom('fit-viewport','auto'); c.zoom(c.zoom()*0.9); viewer._minScale=c.zoom(); clampVB(c); }
function attachPanZoom(viewer, sel){
  if(viewer._panzoom) return; viewer._panzoom=true;
  const canvas=viewer.get('canvas'), c=document.querySelector(sel);
  c.style.position='relative'; c.style.cursor='grab';
  const min=()=>viewer._minScale||0.05, max=()=>(viewer._minScale||0.2)*6;
  const setZoom=s=>{ s=Math.min(Math.max(s,min()),max()); canvas.zoom(s); clampVB(canvas); };
  const ctl=document.createElement('div'); ctl.className='zoomctl'+(sel==='#ovcanvas'?' in-ov':'');
  ctl.innerHTML='<button data-z="in">+</button><button data-z="out">−</button><button data-z="fit">⤢</button>';
  c.appendChild(ctl);
  ctl.addEventListener('click',e=>{ const z=e.target.dataset.z; if(!z)return;
    if(z==='fit') fitNow(viewer); else setZoom(canvas.zoom()*(z==='in'?1.25:0.8)); });
  c.addEventListener('wheel',e=>{ e.preventDefault(); setZoom(canvas.zoom()*(e.deltaY<0?1.12:0.89)); },{passive:false});
  let drag=false;
  c.addEventListener('mousedown',e=>{ if(e.target.closest('.zoomctl'))return; drag=true; c.style.cursor='grabbing'; });
  window.addEventListener('mouseup',()=>{ if(drag){drag=false; c.style.cursor='grab';} });
  c.addEventListener('mousemove',e=>{ if(!drag)return; canvas.scroll({dx:e.movementX,dy:e.movementY}); clampVB(canvas); });
}
// rotate marked edge labels (vlabel) to vertical, around their own centre — for labels that sit beside a vertical line
function rotateVLabels(viewer, def){
  const reg=viewer.get('elementRegistry');
  (def.edges||[]).forEach((e,k)=>{
    if(!e.vlabel) return;
    const lbl=reg.get('sf'+k+'_label'); if(!lbl) return;
    const gfx=reg.getGraphics(lbl); if(!gfx) return;
    let bb; try{ bb=gfx.getBBox(); }catch(_){ return; }
    const cx=bb.x+bb.width/2, cy=bb.y+bb.height/2, tr=gfx.getAttribute('transform')||'';
    gfx.setAttribute('transform', (tr?tr+' ':'')+`rotate(90 ${cx} ${cy})`);  // letter-bottoms face the line
  });
}
let ovViewer, ovStack=[], ovCurrent=null;
function openFlow(key){ if(FLOW[key]){ ovStack.push(key); renderFlow(); } }
function ovBack(){ ovStack.pop(); if(ovStack.length===0) closeOv(); else renderFlow(); }
function closeOv(){ ovStack=[]; document.getElementById('ov').classList.remove('open'); }
async function renderFlow(){
  const key=ovStack[ovStack.length-1], def=FLOW[key]; ovCurrent=def;
  document.getElementById('ovhead').innerHTML = `<span class="nnum">${def.num}</span><span class="nname">${esc(def.name)}</span>`;
  document.getElementById('ov-back').style.display = '';
  document.getElementById('ov').classList.add('open');
  if(!ovViewer){
    ovViewer = new BpmnJS({ container:'#ovcanvas' });
    ovViewer.get('eventBus').on('element.click', e=>{
      const m=/^T(\d+)$/.exec(e.element.id); if(!m) return;
      const st=ovCurrent.steps[+m[1]]; if(st && st.opens) openFlow(st.opens);
    });
  }
  await ovViewer.importXML(subXML(def));
  const canvas=ovViewer.get('canvas');
  def.steps.forEach((s,i)=>{
    if(s.kind==='sub') canvas.addMarker('T'+i,'has-sub');
    else { const a=s.actor||'det'; if(a!=='det') canvas.addMarker('T'+i,a); }
  });
  edgesBehind(ovViewer);
  addLaneDividers(ovViewer);
  recenterSubMarkers(ovViewer);
  rotateVLabels(ovViewer, def);
  fitNow(ovViewer);
  attachPanZoom(ovViewer,'#ovcanvas');
}
document.getElementById('ov').addEventListener('click', e=>{ if(e.target.id==='ov') closeOv(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeOv(); });

(async ()=>{
  const core = new BpmnJS({ container:'#core' });
  await core.importXML(coreXML());
  const canvas = core.get('canvas');
  NODES.filter(n=>n.sub).forEach(n=> canvas.addMarker(n.id,'has-sub'));
  edgesBehind(core);
  addLaneDividers(core);
  recenterSubMarkers(core);
  fitNow(core);
  attachPanZoom(core,'#core');
  core.get('eventBus').on('element.click', e=>{
    const n = byId[e.element.id];
    if(n && n.sub) openFlow(n.id);
  });
})();
</script>
