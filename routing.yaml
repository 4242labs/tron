# routing.yaml — CANON. Two things the engine needs that are NOT the flow itself:
#   1. the TRIGGER GRAMMAR — the closed vocabulary every trigger must satisfy.
#   2. the INBOUND tag map — how a raw worker/operator message becomes a trigger.
# The behaviour (trigger -> step -> on-complete) lives in the ENGINE's event table
# (fsm.py TABLE) — NOT in knobs.yaml, which holds only per-project knobs. The old
# "primitive library" is gone: the engine table states every edge directly.
# Ships with TRON, copied verbatim at seed. The seeder never writes it.
# Shapes locked by contracts/schema/routing.schema.yaml; checked by blueprint-lint.

# ── Trigger grammar (closed) ───────────────────────────────────────
grammar:
  notation: "lowercase, colon-delimited segments, no spaces"
  forms:                       # every trigger matches exactly one form
    - "domain:object"          # imperative dispatch     e.g. build:block:next
    - "subject:event"          # completion              e.g. review:next, session:end
    - "subject:object:event"   # qualified completion    e.g. block:next:done, review:<type>:done
    - "subject:event:object"   # qualified event         e.g. wall:raised:<block>, worker:await:<block>
  subjects: [tron, build, block, review, cadence, session, worker, operator, wall]
  events:   [start, build, done, reconciled, stalled, next, end, adhoc, raised, decision, await, online]
  params:
    "<type>":  "reviewer type: code | security | data | …  (never the reserved literal 'next')"
    "<block>": "a pipeline block ID, e.g. NN-NN-NN"
  reserved:
    next: "the next block to dispatch (literal segment; never a <type>)"
  wildcard: "*"                # fallback trigger (the SENTRY catch-all row)
  alternatives: "|"            # alternatives within one cell
  terminals: ["end", "-"]      # end = session over ; - = no trigger
  control: "pulse"             # the dispatch-loop signal; NOT a table-listener trigger
  match: "most-specific-wins"  # literal > <type>/<block> > *

# ── Inbound message classification (closed tag enum -> trigger | side) ──
# classify_message returns exactly ONE tag. Each maps to:
#   trigger: <t>  -> emit that trigger (the FSM advances per the engine's event table)
#   side: <h>     -> a global handler; the FSM does not advance
# Closed enum + total coverage (blueprint-lint).
tags:
  # worker-origin
  worker.online:            { trigger: "worker:online" }   # a spawned worker checked in -> emit its pending assignment (01-07 two-step)
  worker.done:              { trigger: "block:next:done" }
  worker.recorded:          { trigger: "block:next:done" }  # the gate-ordered block-status ✅ commit landed (01-11 record step); same row — the gate reads trunk truth, never the say-so
  worker.wall:              { trigger: "wall:raised:<block>" }
  worker.review_done:       { trigger: "review:<type>:done" }
  worker.await_confirm:     { trigger: "worker:await:<block>" }   # pause mid-block for go-ahead; ALWAYS reaches the operator (D7/R-AWAIT)
  worker.branch:            { side: record_branch }   # the worker reports the branch it NAMED (it owns the name; TRON never guesses — 01-05 T2)
  worker.progress:          { side: none }
  worker.question_peer:     { side: triage_peer }       # peer/design question -> the architect sorts it (answer-and-relay or escalate); never a silent dead-end (01-08 T10)
  worker.question_tron:     { side: answer_from_context }
  # architect-origin (the persistent, forward-only consultant's reports)
  architect.reconciled:     { trigger: "block:<block>:reconciled" }   # forward/reconcile done -> upcoming block re-checked & ready on trunk (M-05)
  architect.logged:         { trigger: "block:adhoc:reconciled" }     # log-review done -> adhoc block files authored
  architect.relay:          { side: relay_to_worker }     # answered a triaged question -> relay the reply to the original asker (01-08 T10)
  architect.escalate:       { side: escalate_to_operator } # "operator's call" -> raise it to the operator, rides the wall edge (01-08 T10)
  # operator-origin
  operator.decision:        { trigger: "operator:decision:<block>" }
  operator.status_query:    { side: reply_digest }
  operator.knob_change:     { side: edit_self }   # M-01: off the prior "workflow" misnomer; edits a knob/rule
  operator.directive:       { side: best_effort }
  # system (engine-produced, not from classify_message)
  worker.stalled:           { trigger: "worker:stalled" }   # engine liveness side-system
  worker.dead:              { trigger: "worker:stalled" }   # recover handles both
  # reserved
  unclassified:             { trigger: "*" }                # -> SENTRY catch-all -> architect sorts it

# ── Invalid-output policy (a judgment tool that won't validate) ─────
invalid_output:
  max_retries: 2                         # read by the engine (judge retry budget)
  on_exhaustion: "*"                     # -> unclassified -> SENTRY catch-all -> architect sorts it

# ── Judgment tools (the ONLY LLM call; schema-in / schema-out) ─────
# Output is always a tag + structured slots, never free prose to the flow.
tools:
  classify_message: { in: [text, sender], out: [tag, slots, confidence] }
  # tiering: classify_message -> cheap. ONE judgment tool only.
  # NOT judgment tools (by design): "is this the operator's problem?" (that second judgment is
  # RETIRED — an unclassifiable input routes to the architect, who steers it, not the LLM); review
  # verdicts (review is a milestone); findings-triage (-> architect log-review skill);
  # stall detection (-> engine liveness).
