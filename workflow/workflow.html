<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRON | 42labs</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-viewer.development.js"></script>
<style>
  :root{
    --canvas-warm:#FDFAF5; --cream:#FEF3E2; --border-cool:#E7E5E4;
    --mid-stone:#B8AFA8; --stone:#756D68; --graphite:#433E3A; --charcoal:#1C1917;
    --copper:#E2711D; --copper-dark:#CC5D0A; --copper-soft:#FDECD8; --copper-border:#F5C9A1;
    --blue-dark:#2563EB; --sky:#EFF6FF;
    --emerald:#16A34A; --emerald-dark:#166534; --emerald-soft:#F0FDF4;   /* LLM / AIDE nodes */
    --amber:#EAB308; --amber-dark:#854D0E; --amber-soft:#FEFCE8;          /* sub-process drill-downs */
    --accent:var(--copper); --logo:var(--copper-dark);   /* 42labs DS semantic tokens (light) — logo wordmark = copper-dark */
    --font-heading:'Space Grotesk',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
    --font-mono:'Geist Mono',ui-monospace,monospace;
    --sp-3:12px; --sp-4:16px; --sp-6:24px; --sp-8:32px; --r-4:10px; --r-full:999px;
    --head-h:62px;   /* fixed page header — matches the website nav (26px logo + 18px block padding) */
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{margin:0; background:var(--canvas-warm); color:var(--charcoal); font-family:var(--font-body); height:100vh; overflow:hidden;}
  .wrap{max-width:none; margin:0; padding:0; height:100vh; display:flex; flex-direction:column;}
  /* fixed page header: full-bleed white bar; content constrained to the website's 1280px container */
  .topbar{flex:0 0 var(--head-h); height:var(--head-h); background:var(--canvas-warm); border-bottom:1px solid var(--border-cool);
    display:flex; align-items:center; z-index:20;}
  .topbar__inner{width:100%; max-width:1280px; margin-inline:auto; padding-inline:clamp(20px,5vw,48px);
    display:flex; align-items:center; justify-content:space-between; gap:24px;}
  .topctl{display:flex; align-items:center; gap:8px;}
  .logolink{display:inline-flex; align-items:center;}
  #core{flex:1; min-height:0; background:var(--cream); overflow:hidden;}
  /* every element name uppercased uniformly (single source — never hardcode mixed case in data) */
  #core text, #ovcanvas text{ text-transform:uppercase; }
  .bjs-powered-by{display:none !important;}
  .bjs-drilldown{display:none !important;}
  .zoomctl{display:flex; gap:6px;}
  .zoomctl button{width:32px; height:32px; border:1px solid var(--border-cool); background:#fff; border-radius:8px; font-size:18px; line-height:1; color:var(--graphite); cursor:pointer; font-family:var(--font-body); box-shadow:0 1px 3px rgba(28,25,23,.08);}
  .zoomctl button:hover{background:var(--cream); border-color:var(--copper-border);}
  /* annotations toggle — same control style as the zoom buttons, but accent (copper) */
  .annotbtn{height:32px; padding:0 14px;
    border:1px solid var(--copper-border); background:var(--copper-soft); color:var(--copper-dark);
    border-radius:8px; font-family:var(--font-body); font-size:12px; font-weight:600; cursor:pointer;
    text-transform:uppercase; letter-spacing:.03em; box-shadow:0 1px 3px rgba(28,25,23,.08);}
  .annotbtn:hover{background:var(--copper); color:#fff; border-color:var(--copper);}
  /* annotations — sliding right panel (hosts the flow notes); hidden off-canvas until toggled. Covers the header too. */
  .notes-panel{position:fixed; top:0; right:0; width:460px; max-width:92vw; height:100vh; z-index:60;
    background:#fff; border-left:1px solid var(--border-cool); box-shadow:-8px 0 24px rgba(28,25,23,.10);
    transform:translateX(100%); transition:transform .28s ease; display:flex; flex-direction:column;}
  .notes-panel.open{transform:translateX(0);}
  .notes-panel iframe{flex:1; width:100%; border:0;}
  .notes-close{position:absolute; top:12px; right:12px; width:30px; height:30px; border:1px solid var(--border-cool); background:#fff; border-radius:8px; font-size:17px; line-height:1; color:var(--stone); cursor:pointer; z-index:1;}
  .notes-close:hover{background:var(--cream); border-color:var(--copper-border);}
  /* chart area (pool + every lane) = canvas-warm, against the cream page behind it */
  .djs-element[data-element-id="Pool"] .djs-visual > rect,
  .djs-element[data-element-id="PoolS"] .djs-visual > rect,
  .djs-element[data-element-id^="L_"] .djs-visual > rect{ fill:var(--canvas-warm) !important; }
  /* collapsed sub-process nodes are clickable */
  .djs-element.has-sub{cursor:pointer;}
  .djs-element.has-sub .djs-visual > rect{ fill:var(--amber-soft) !important; stroke:var(--amber) !important; stroke-width:2px !important; }

  /* overlay */
  #ov{position:fixed; inset:0; background:var(--cream); display:none; z-index:50;}
  #ov.open{display:block;}
  .ovbox{position:relative; background:var(--cream); height:100vh; width:100vw; display:flex; flex-direction:column; overflow:hidden;}
  #ovcanvas{flex:1; min-height:0;}
  .nnum{font-family:var(--font-mono); font-size:13px; font-weight:500; color:var(--copper-dark); background:var(--copper-soft); border:1px solid var(--copper-border); border-radius:var(--r-full); padding:2px 9px;}
  .x{cursor:pointer; border:1px solid var(--border-cool); background:#fff; border-radius:8px; width:32px; height:32px; font-size:18px; line-height:1; color:var(--stone);}
  .djs-element.aide .djs-visual > rect, .djs-element.llm .djs-visual > rect{ fill:var(--emerald) !important; stroke:var(--emerald-dark) !important; }
  .djs-element.aide .djs-visual > text, .djs-element.llm .djs-visual > text{ fill:#fff !important; }
  .djs-element.op .djs-visual > rect{ fill:var(--sky) !important; stroke:var(--blue-dark) !important; }
  .djs-element.op .djs-visual > text{ fill:var(--blue-dark) !important; }
  /* horizontal diagram header (42labs DS) — ONE component for the core map and every sub-process,
     left side of the fixed top bar: [back?] [logo] | [id badge?] [name]. */
  .flowhead{display:flex; align-items:center; gap:10px;}
  .flowhead .nname{font-family:var(--font-heading); font-weight:600; font-size:16px; color:var(--charcoal); text-transform:uppercase; letter-spacing:.01em;}
  .flowhead .logo__svg{height:26px; width:auto; display:block;}   /* DS nav logo height */
  .flowhead .logo__mark{fill:var(--accent);}
  .flowhead .logo__type{fill:var(--logo);}
  .flowhead .hsep{width:1px; height:18px; background:var(--border-cool);}
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar"><div class="topbar__inner">
    <div class="flowhead" id="corehead"></div>
    <div class="topctl" id="corectl">
      <button class="annotbtn" id="annot-btn" onclick="toggleNotes()">annotations</button>
    </div>
  </div></header>
  <div id="core"></div>
</div>

<aside class="notes-panel" id="notes" aria-label="annotations">
  <button class="notes-close" onclick="toggleNotes(false)" aria-label="close annotations">×</button>
  <iframe id="notes-frame" title="flow annotations" loading="lazy"></iframe>
</aside>

<div id="ov"><div class="ovbox">
  <header class="topbar"><div class="topbar__inner">
    <div class="flowhead" id="ovhead"></div>
    <div class="topctl" id="ovctl">
      <button class="annotbtn" onclick="toggleNotes()">annotations</button>
    </div>
  </div></header>
  <div id="ovcanvas"></div>
</div></div>

<script>
/* ════════════ HEADER — one component for the core map and every sub-process ════════════ */
const LOGO_SVG = `<svg class="logo__svg" viewBox="0 0 150 27" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TRON"><path class="logo__mark" d="M23.5389 25.5945C23.5389 26.2534 23.004 26.7876 22.3442 26.7876H20.7762C20.716 26.7876 20.6567 26.7831 20.5989 26.7745C20.541 26.7831 20.4818 26.7876 20.4215 26.7876H1.19468C0.534876 26.7876 0 26.2534 0 25.5945V24.0659C0 23.407 0.534876 22.8728 1.19468 22.8728H8.82942V16.2481C8.82942 15.4791 9.45284 14.8557 10.2219 14.8557H11.3944C12.1634 14.8557 12.7868 15.4791 12.7868 16.2482V22.8728H19.5815V16.2481C19.5815 15.4791 20.2049 14.8557 20.974 14.8557H22.1465C22.9155 14.8557 23.5389 15.4791 23.5389 16.2482V25.5945Z"/><path class="logo__mark" d="M11.5921 0.279053C11.6524 0.279053 11.7116 0.283274 11.7695 0.291869C11.8273 0.283274 11.8865 0.279053 11.9468 0.279053H31.1736C31.8334 0.279053 32.3683 0.813209 32.3683 1.47212V3.00075C32.3683 3.65966 31.8334 4.19382 31.1736 4.19382H23.5389V10.5575C23.5389 11.3265 22.9155 11.95 22.1465 11.95H20.974C20.2049 11.95 19.5815 11.3265 19.5815 10.5575V4.19382H12.7868V10.5575C12.7868 11.3265 12.1634 11.95 11.3944 11.95H10.2219C9.45284 11.95 8.82942 11.3265 8.82942 10.5575V1.47212C8.82942 0.813209 9.3643 0.279053 10.0241 0.279053H11.5921Z"/><path class="logo__type" d="M89.728 8.75482C89.728 9.78958 89.6001 10.7139 89.3443 11.5278C89.0886 12.3416 88.7398 13.0625 88.298 13.6903C87.8678 14.3065 87.3678 14.8355 86.7981 15.2773C86.2284 15.7191 85.6297 16.0854 85.0018 16.376C84.3856 16.6551 83.7578 16.8585 83.1183 16.9864C82.4905 17.1143 81.8975 17.1783 81.3395 17.1783L90.8093 25.3575H83.7985L74.3461 17.1783H72.201C71.5846 17.1783 71.0848 16.6785 71.0848 16.0621V13.7601C71.0848 13.1436 71.5846 12.6439 72.201 12.6439H81.3395C81.9092 12.5974 82.4265 12.4811 82.8916 12.2951C83.3683 12.0975 83.7752 11.8359 84.1124 11.5103C84.4612 11.1848 84.7286 10.7953 84.9146 10.3418C85.1007 9.87678 85.1937 9.34777 85.1937 8.75482V5.89469C85.1937 5.6389 85.1588 5.44706 85.089 5.31917C85.0309 5.17965 84.9495 5.08083 84.8449 5.02269C84.7519 4.95293 84.6472 4.91224 84.531 4.90061C84.4263 4.88899 84.3275 4.88317 84.2345 4.88317H69.2711V25.3575H64.7367V2.63344C64.7367 2.31952 64.7949 2.02304 64.9111 1.74401C65.0274 1.46497 65.1844 1.22081 65.382 1.01153C65.5913 0.802254 65.8354 0.639483 66.1145 0.523217C66.3935 0.406952 66.6958 0.348819 67.0214 0.348819H84.2345C85.246 0.348819 86.1005 0.534844 86.7981 0.906893C87.4957 1.26732 88.0596 1.72657 88.4898 2.28464C88.9316 2.83109 89.2455 3.42404 89.4315 4.0635C89.6292 4.70296 89.728 5.30173 89.728 5.85981V8.75482Z"/><path class="logo__type" d="M51.3778 25.5668H46.8435V15.9052C46.8435 15.2887 47.3432 14.789 47.9596 14.789H50.2617C50.8781 14.789 51.3778 15.2887 51.3778 15.9052V25.5668Z"/><path class="logo__type" d="M61.3709 3.9763C61.3709 4.59274 60.8711 5.09245 60.2547 5.09245H51.3778V10.8825C51.3778 11.4989 50.8781 11.9986 50.2617 11.9986H47.9596C47.3432 11.9986 46.8435 11.4989 46.8435 10.8825V5.09245H37.9492C37.3327 5.09245 36.833 4.59274 36.833 3.9763V1.67425C36.833 1.05781 37.3327 0.558097 37.9492 0.558097H60.2547C60.8711 0.558097 61.3709 1.05781 61.3709 1.67425V3.9763Z"/><path class="logo__type" d="M98.5875 15.2424C98.5875 16.1377 98.727 16.9515 99.006 17.684C99.2967 18.4049 99.7036 19.0269 100.227 19.5501C100.75 20.0616 101.372 20.4628 102.093 20.7534C102.825 21.0325 103.633 21.172 104.517 21.172H110.621C111.505 21.172 112.307 21.0325 113.028 20.7534C113.76 20.4628 114.388 20.0616 114.911 19.5501C115.434 19.0269 115.835 18.4049 116.114 17.684C116.405 16.9515 116.55 16.1377 116.55 15.2424C116.55 14.992 116.753 14.789 117.004 14.789H120.631C120.882 14.789 121.085 14.992 121.085 15.2424C121.085 16.7655 120.823 18.1665 120.3 19.4454C119.777 20.7244 119.05 21.8289 118.12 22.759C117.19 23.6891 116.085 24.4158 114.807 24.939C113.539 25.4506 112.156 25.7063 110.656 25.7063H104.517C103.017 25.7063 101.628 25.4506 100.349 24.939C99.07 24.4158 97.9654 23.6891 97.0353 22.759C96.1052 21.8289 95.3727 20.7244 94.8379 19.4454C94.3147 18.1665 94.0531 16.7655 94.0531 15.2424C94.0531 14.992 94.2561 14.789 94.5065 14.789H98.134C98.3844 14.789 98.5875 14.992 98.5875 15.2424Z"/><path class="logo__type" d="M110.656 2.20737e-05C112.156 2.20737e-05 113.539 0.26162 114.807 0.784815C116.085 1.30801 117.19 2.03467 118.12 2.96479C119.05 3.88329 119.777 4.98781 120.3 6.27836C120.823 7.55728 121.085 8.95247 121.085 10.4639V10.8825C121.085 11.4989 120.585 11.9986 119.969 11.9986H117.667C117.05 11.9986 116.55 11.4989 116.55 10.8825V10.4639C116.55 9.56868 116.405 8.76063 116.114 8.03978C115.835 7.30731 115.434 6.68529 114.911 6.17372C114.4 5.65053 113.778 5.24941 113.045 4.97037C112.324 4.67971 111.528 4.53438 110.656 4.53438H104.517C103.633 4.53438 102.825 4.67971 102.093 4.97037C101.372 5.24941 100.75 5.65053 100.227 6.17372C99.7036 6.68529 99.2967 7.30731 99.006 8.03978C98.727 8.76063 98.5875 9.56868 98.5875 10.4639V10.8825C98.5875 11.4989 98.0877 11.9986 97.4713 11.9986H95.1693C94.5528 11.9986 94.0531 11.4989 94.0531 10.8825V10.4639C94.0531 8.95247 94.3147 7.55728 94.8379 6.27836C95.3727 4.98781 96.1052 3.88329 97.0353 2.96479C97.9654 2.03467 99.07 1.30801 100.349 0.784815C101.628 0.26162 103.017 2.20737e-05 104.517 2.20737e-05H110.656Z"/><path class="logo__type" d="M126.404 0.170605C126.834 -0.00378947 127.276 -0.044484 127.729 0.0485266C128.183 0.129911 128.572 0.339198 128.898 0.676361L142.157 14.5075L142.142 14.5225L143.822 16.245L145.466 17.9592V17.929L150 22.5756V23.4179C150 23.7434 149.936 24.0457 149.808 24.3248C149.692 24.6038 149.529 24.848 149.32 25.0572C149.122 25.2549 148.884 25.4119 148.605 25.5281C148.326 25.6444 148.029 25.7025 147.715 25.7025C147.436 25.7025 147.152 25.6502 146.861 25.5456C146.582 25.4409 146.332 25.2723 146.111 25.0398L129.543 7.73949V25.3537H125.009V2.28083C125.009 1.81577 125.137 1.3972 125.392 1.02516C125.66 0.641489 125.997 0.356628 126.404 0.170605Z"/><path class="logo__type" d="M148.884 0.345004C149.5 0.345004 150 0.844721 150 1.46115V15.8381C150 16.8391 148.784 17.3338 148.085 16.6175L145.783 14.2584C145.58 14.05 145.466 13.7703 145.466 13.4791V1.46115C145.466 0.844721 145.965 0.345004 146.582 0.345004H148.884Z"/></svg>`;
// header inner HTML: [back?] [logo] | [id badge?] [name] — same structure everywhere
function headBar({num, name, back}){
  return (back ? `<button class="x" onclick="ovBack()" aria-label="back">‹</button>` : '')
    + `<a class="logolink" href="https://tron.42labs.io" target="_self" aria-label="TRON — 42labs home">${LOGO_SVG}</a>`
    + `<span class="hsep"></span>`
    + (num ? `<span class="nnum">${num}</span>` : '')
    + `<span class="nname">${esc(name)}</span>`;
}
/* ════════════ DATA MODEL ════════════ */
// lanes tile the pool top→bottom; TRON owns grid-rows 0–2, AGENT row 3.
// y/h are computed by layoutCore() from the track grid (sized to content, symmetric padding).
const LANES = [
  {id:'L_TRON',name:'TRON',  rows:[0,2], y:0, h:0},
  {id:'L_ARCH',name:'AGENT', rows:[3,3], y:0, h:0},
];
const SHOW_EDGE_LABELS = false;         // edge labels are implicit (docs only) — kept OFF the canvas for a clean diagram
const POOL = {x:160,y:80,w:0,h:0};      // w/h/y computed by layoutCore()
let LANE_X = 190, LANE_W = 1310;        // computed by layoutCore()

// CORE NODES — placed on a track grid by (col,row). Same col → shared centre X (vertical alignment);
// same row → shared centre Y. Geometry (x/y) is derived in layoutCore(); only col/row/size live here.
const NODES = [
  // ── TRON lane · rows 0–2 ──
  // row 0 (new top) — WAKE sits above the convergence gateway
  {id:'ND-08', kind:'sub',   name:'WAKE',           lane:'L_TRON', col:2, row:0, w:96, h:68, sub:'WAKE'},   // moved up; re-entry feeds the converge gateway below
  // row 1 — spine: Start → BOOTUP → ◇converge → PULSE → SWITCHBOARD; ANCHOR (right) + TICK END (up) off SWITCHBOARD
  {id:'Start', kind:'start', name:'TRON:START',     lane:'L_TRON', col:0, row:1, w:36, h:36, lblOnly:true},
  {id:'ND-01', kind:'sub',   name:'BOOTUP',         lane:'L_TRON', col:1, row:1, w:96, h:68, sub:'BOOTUP'},
  {id:'CONV',  kind:'xor',   name:'',               lane:'L_TRON', col:2, row:1, w:48, h:48},   // convergence: BOOTUP first-entry OR WAKE re-entry → PULSE
  {id:'ND-02', kind:'sub',   name:'PULSE',          lane:'L_TRON', col:3, row:1, w:96, h:68, sub:'PULSE'},   // moved to WAKE's old column
  {id:'ND-03', kind:'xor',   name:'SWITCHBOARD',    lane:'L_TRON', col:4, row:1, w:48, h:48, lblPos:'t'},   // work selector hub; left in (PULSE), up → TICK END, right → ANCHOR, down → AGENT
  {id:'End',   kind:'end',   name:'ANCHOR',         lane:'L_TRON', col:5, row:1, w:36, h:36, lblOnly:true, lblAbove:true},   // run-end terminal — right of SWITCHBOARD
  {id:'End2',  kind:'end',   name:'TICK END',       lane:'L_TRON', col:4, row:0, w:36, h:36, lblOnly:true, lblAbove:true},   // new end event — idle tick ends here (above SWITCHBOARD)
  // row 2 — fleet intake/hopper + operator channel (intake → PARLEY)
  {id:'MSG',   kind:'mcatch',  name:'FLEET INTAKE', lane:'L_TRON', col:1, row:2, w:36, h:36, lblOnly:true},   // moved under BOOTUP; writes FLEET HOPPER
  {id:'HOPPER',kind:'datastore',name:'FLEET HOPPER',lane:'L_TRON', col:2, row:2, w:50, h:56, lblOnly:true},   // moved to Project Docs' column; feeds WAKE (message arm) AND drained by PULSE (02-12)
  {id:'OPI',   kind:'mcatch',name:'OPERATOR INTAKE',lane:'L_TRON', col:5, row:2, w:36, h:36, lblOnly:true},   // operator intake — own channel → PARLEY handler (ND-09)
  {id:'ND-09', kind:'sub',   name:'PARLEY',         lane:'L_TRON', col:6, row:2, w:96, h:68, sub:'PARLEY'},   // operator-message handler — own channel, off PULSE

  // ── AGENT lane · row 3 — the single LLM agent (consolidates every role); PROJECT DOCS in PULSE's column, read by both ──
  {id:'PD2',   kind:'datastore',name:'Project Docs',lane:'L_ARCH', col:3, row:3, w:50, h:56, lblOnly:true, lblAbove:true},   // PULSE's column; read by PULSE (straight up) and the agent (right)
  {id:'LLM',   kind:'task',  name:'AGENT',          lane:'L_ARCH', col:4, row:3, w:120,h:100, llm:true, sub:'AGENT'},   // the one LLM agent cat (below SWITCHBOARD); clickable → opens the AGENT sub (FLOW['LLM'])
];

const FLOWS = [
  ['Start','ND-01'],
  ['ND-01','CONV','',{from:{s:'r',d:0.5}, to:{s:'l',d:0.5}}],            // BOOTUP first-entry → converge
  ['ND-08','CONV','',{from:{s:'b',d:0.5}, to:{s:'t',d:0.5}}],            // WAKE re-entry → converge (straight down the col)
  ['CONV','ND-02','',{from:{s:'r',d:0.5}, to:{s:'l',d:0.5}}],            // converge → PULSE
  ['ND-02','ND-03'],                                                    // PULSE → SWITCHBOARD
  ['ND-02','ND-08','',{from:{s:'t',d:0.5}, to:{s:'r',d:0.5}}],          // tick complete → re-arm WAKE (up-left)
  ['OPI','ND-09','',{from:{s:'r',d:0.5}, to:{s:'l',d:0.5}}],            // operator intake → PARLEY (right, straight)
  ['ND-03','End'],                                                      // run end → ANCHOR (right)
  ['ND-03','End2','',{from:{s:'t',d:0.5}, to:{s:'b',d:0.5}}],           // idle tick → TICK END (up)
  ['ND-03','LLM','',{from:{s:'b',d:0.5}, to:{s:'t',d:0.5}}],            // dispatch → AGENT (straight down the col)
];

// COMMS — non-enforcing connections (BPMN associations): communication / data read that does NOT advance a token.
// [source, target, {from,to}] — same fractional-dock anchors as FLOWS.
const COMMS = [

  ['PD2','ND-02','',{from:{s:'t',d:0.5}, to:{s:'b',d:0.5}, undirected:true}],   // Project Docs → PULSE (read; straight up col c3 into PULSE center-bottom)
  ['PD2','LLM','',{from:{s:'r',d:0.5}, to:{s:'l',d:0.5}, undirected:true}],   // Project Docs → AGENT (read; same row, straight right into the cat's left side)

const TAG = {start:'startEvent', end:'endEvent', task:'task', sub:'subProcess', xor:'exclusiveGateway', inc:'inclusiveGateway', throw:'intermediateThrowEvent', catch:'intermediateCatchEvent', timer:'intermediateCatchEvent', mcatch:'intermediateCatchEvent', mthrow:'intermediateThrowEvent', datastore:'dataStoreReference'};

/* ════════════ CORE XML ════════════ */
const byId = Object.fromEntries(NODES.map(n=>[n.id,n]));
const center = n => ({x:n.x+n.w/2, y:n.y+n.h/2});

// ── CORE TRACK GRID — same rules as the sub-process grid, lifted to the swimlane core ──
// Column width = widest node in that column; row height = tallest node in that row; columns/rows are
// laid edge-to-edge with one grid gap (TOK.colGap/rowGap) and never below colMin/rowMin. Outer padding
// is a single symmetric PAD on every side, so no lane has a large empty pocket and margins match.
function layoutCore(){
  const G=TOK.colGap, GR=TOK.rowGap, PAD=TOK.pad, BAND=TOK.laneBand;   // one symmetric padding; lane owner strip
  const maxCol=Math.max(...NODES.map(n=>n.col)), maxRow=Math.max(...NODES.map(n=>n.row));
  const placed=NODES.filter(n=>!n.special);               // `special` nodes (none currently) would dock onto a host instead of sizing tracks
  const trackW=[], trackH=[];
  for(let c=0;c<=maxCol;c++){ const ws=placed.filter(n=>n.col===c).map(n=>n.w); trackW[c]=Math.max(TOK.colMin, ws.length?Math.max(...ws):TOK.colMin); }
  for(let r=0;r<=maxRow;r++){ const hs=NODES.filter(n=>n.row===r).map(n=>n.h); trackH[r]=Math.max(TOK.rowMin, hs.length?Math.max(...hs):TOK.rowMin); }
  // every row's lane → the vertical gap above a row is the small grid gap WITHIN a lane, but a full 2·PAD
  // BETWEEN lanes, so each lane's content clears its band top & bottom by exactly PAD (== the pool padding).
  const laneOfRow={}; LANES.forEach(l=>{ for(let r=l.rows[0];r<=l.rows[1];r++) laneOfRow[r]=l.id; });
  const colC=[], rowC=[];
  colC[0]=POOL.x+BAND+PAD+trackW[0]/2;
  for(let c=1;c<=maxCol;c++) colC[c]=colC[c-1]+trackW[c-1]/2+G+trackW[c]/2;
  rowC[0]=POOL.y+PAD+trackH[0]/2;
  for(let r=1;r<=maxRow;r++){ const gap = laneOfRow[r]===laneOfRow[r-1] ? GR : 2*PAD; rowC[r]=rowC[r-1]+trackH[r-1]/2+gap+trackH[r]/2; }
  placed.forEach(n=>{ n.x=Math.round(colC[n.col]-n.w/2); n.y=Math.round(rowC[n.row]-n.h/2); });
  // lane bands tile the pool; every boundary sits PAD below the upper lane's last content row (== PAD above
  // the lower lane's first row, since the inter-lane gap is 2·PAD) → uniform internal padding everywhere.
  const rowBot=r=>rowC[r]+trackH[r]/2;
  let top=POOL.y;
  LANES.forEach((l,k)=>{ const bottom=Math.round(rowBot(l.rows[1])+PAD); l.y=top; l.h=bottom-top; top=bottom; });
  POOL.h = top - POOL.y;
  POOL.w = Math.round(colC[maxCol]+trackW[maxCol]/2 + PAD - POOL.x);
  LANE_X = POOL.x; LANE_W = POOL.w;   // lanes sit FLUSH with the pool — the owner-name band is inside each lane; no dead strip
}

function route(s,t){
  const sc=center(s), tc=center(t);
  if(Math.abs(sc.y-tc.y)<=22){
    return tc.x>sc.x ? [{x:s.x+s.w,y:sc.y},{x:t.x,y:tc.y}] : [{x:s.x,y:sc.y},{x:t.x+t.w,y:tc.y}];
  }
  if(Math.abs(sc.x-tc.x)<=6){  // same column → clean two-point vertical, no backtrack
    return [{x:sc.x, y: tc.y>sc.y ? s.y+s.h : s.y}, {x:tc.x, y: tc.y>sc.y ? t.y : t.y+t.h}];
  }
  const exitY = tc.y>sc.y ? s.y+s.h : s.y;
  let entry;
  if(tc.x>sc.x+4) entry={x:t.x,y:tc.y};
  else if(tc.x<sc.x-4) entry={x:t.x+t.w,y:tc.y};
  else entry={x:tc.x, y: tc.y>sc.y ? t.y : t.y+t.h};
  return [{x:sc.x,y:exitY},{x:sc.x,y:tc.y},entry];
}
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// waypoints for a FLOWS/COMMS entry [source,target,label,opts] — shared by sequence flows and associations
function edgePts(f){
  const o=f[3];
  if(o && o.toTop!==undefined){ const s=byId[f[0]], t=byId[f[1]], sx=s.x+s.w/2, tx=t.x+t.w*o.toTop;
    return Math.abs(sx-tx)<2 ? [{x:sx,y:s.y+s.h},{x:tx,y:t.y}] : [{x:sx,y:s.y+s.h},{x:sx,y:t.y-12},{x:tx,y:t.y-12},{x:tx,y:t.y}]; }
  if(o && o.from){                                                   // fractional dock anchors: {from:{s,d}, to:{s,d}} — s∈t/b/l/r, d=fraction along that side
    const s=byId[f[0]], t=byId[f[1]];
    const dp=(n,a)=> a.s==='t'?{x:n.x+n.w*a.d,y:n.y} : a.s==='b'?{x:n.x+n.w*a.d,y:n.y+n.h} : a.s==='l'?{x:n.x,y:n.y+n.h*a.d} : {x:n.x+n.w,y:n.y+n.h*a.d};
    const sp=dp(s,o.from), tp=dp(t,o.to);
    const sv=o.from.s==='t'||o.from.s==='b', tv=o.to.s==='t'||o.to.s==='b';   // vertical exit / entry?
    if(Math.abs(sp.x-tp.x)<2 || Math.abs(sp.y-tp.y)<2) return [sp,tp];
    if(sv && !tv) return [sp,{x:sp.x,y:tp.y},tp];        // exit vertical, enter horizontal → L
    if(!sv && tv) return [sp,{x:tp.x,y:sp.y},tp];        // exit horizontal, enter vertical → L
    if(sv && tv){ const my=(sp.y+tp.y)/2; return [sp,{x:sp.x,y:my},{x:tp.x,y:my},tp]; }   // both vertical → Z
    const mx=(o.viaX!=null)?o.viaX:(sp.x+tp.x)/2; return [sp,{x:mx,y:sp.y},{x:mx,y:tp.y},tp]; }   // both horizontal → Z (viaX pins the vertical channel)
  return route(byId[f[0]], byId[f[1]]);
}

function coreXML(){
  const linkNodes = new Set(['TH1','TH2','CA1']);
  // process elements
  const flowEls = NODES.map(n=>{
    const tag = TAG[n.kind];
    const inc = FLOWS.filter(f=>f[1]===n.id).map((f,i)=>`<bpmn:incoming>${f[0]}__${f[1]}</bpmn:incoming>`).join('');
    const out = FLOWS.filter(f=>f[0]===n.id).map(f=>`<bpmn:outgoing>${f[0]}__${f[1]}</bpmn:outgoing>`).join('');
    const def = (n.kind==='throw'||n.kind==='catch') ? `<bpmn:linkEventDefinition id="${n.id}_led" name="pulse"/>`
              : n.kind==='timer' ? `<bpmn:timerEventDefinition id="${n.id}_ted"/>`
              : (n.kind==='mcatch'||n.kind==='mthrow') ? `<bpmn:messageEventDefinition id="${n.id}_med"/>` : '';
    const label = n.lblOnly ? n.name : (n.name ? `${n.id}\n${n.name}` : n.id);
    return `<bpmn:${tag} id="${n.id}" name="${esc(label)}">${inc}${out}${def}</bpmn:${tag}>`;
  }).join('\n    ');

  const seqEls = FLOWS.map(f=>`<bpmn:sequenceFlow id="${f[0]}__${f[1]}" sourceRef="${f[0]}" targetRef="${f[1]}"${(SHOW_EDGE_LABELS && f[2])?` name="${esc(f[2])}"`:''}/>`).join('\n    ');

  const laneEls = LANES.map(l=>{
    const refs = NODES.filter(n=>n.lane===l.id && n.kind!=='datastore').map(n=>`<bpmn:flowNodeRef>${n.id}</bpmn:flowNodeRef>`).join('');   // data stores are not flow nodes
    return `<bpmn:lane id="${l.id}" name="${l.name}">${refs}</bpmn:lane>`;
  }).join('\n      ');

  // DI
  const poolShape = `<bpmndi:BPMNShape id="Pool_di" bpmnElement="Pool" isHorizontal="true"><dc:Bounds x="${POOL.x}" y="${POOL.y}" width="${POOL.w}" height="${POOL.h}"/></bpmndi:BPMNShape>`;
  const laneShapes = LANES.map(l=>`<bpmndi:BPMNShape id="${l.id}_di" bpmnElement="${l.id}" isHorizontal="true"><dc:Bounds x="${LANE_X}" y="${l.y}" width="${LANE_W}" height="${l.h}"/></bpmndi:BPMNShape>`).join('\n      ');
  const nodeShapes = NODES.map(n=>{
    const exp = n.kind==='sub' ? ' isExpanded="false"' : '';
    const marker = n.kind==='xor' ? ' isMarkerVisible="true"' : '';
    const cx=n.x+n.w/2, cy=n.y+n.h/2;
    let lbl='';
    if(n.kind==='start'||n.kind==='end'||n.kind==='throw'||n.kind==='catch'||n.kind==='timer'||n.kind==='mcatch'||n.kind==='mthrow'||n.kind==='datastore')
      lbl=`<bpmndi:BPMNLabel><dc:Bounds x="${cx-38}" y="${n.lblAbove?n.y-34:n.y+n.h+3}" width="76" height="28"/></bpmndi:BPMNLabel>`;   // id+name on two lines, clear of the circle
    else if((n.kind==='xor'||n.kind==='inc') && n.lblPos){   // explicit gateway-label side, kept off the diamond's lines
      const W=96, p={ l:[n.x-W-6, cy-14], r:[n.x+n.w+6, cy-14], t:[cx-W/2, n.y-30], b:[cx-W/2, n.y+n.h+4],
                      bl:[n.x-W+4, n.y+n.h+4], br:[n.x+n.w-4, n.y+n.h+4] }[n.lblPos];
      lbl=`<bpmndi:BPMNLabel><dc:Bounds x="${Math.round(p[0])}" y="${Math.round(p[1])}" width="${W}" height="28"/></bpmndi:BPMNLabel>`; }
    return `<bpmndi:BPMNShape id="${n.id}_di" bpmnElement="${n.id}"${exp}${marker}><dc:Bounds x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}"/>${lbl}</bpmndi:BPMNShape>`;
  }).join('\n      ');
  const edgeShapes = FLOWS.map(f=>{
    const pts = edgePts(f);
    const wp = pts.map(p=>`<di:waypoint x="${Math.round(p.x)}" y="${Math.round(p.y)}"/>`).join('');
    // edge label — offset OFF the line: above a horizontal run, to the right of a vertical run
    let lbl='';
    if(SHOW_EDGE_LABELS && f[2]){ const i0=Math.floor((pts.length-1)/2), a=pts[i0], b=pts[i0+1], horiz=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, lx=horiz?mx-30:mx+TOK.labelGap, ly=horiz?my-19:my-8;
      lbl=`<bpmndi:BPMNLabel><dc:Bounds x="${Math.round(lx)}" y="${Math.round(ly)}" width="60" height="14"/></bpmndi:BPMNLabel>`; }
    return `<bpmndi:BPMNEdge id="${f[0]}__${f[1]}_di" bpmnElement="${f[0]}__${f[1]}">${wp}${lbl}</bpmndi:BPMNEdge>`;
  }).join('\n      ');

  // associations — non-enforcing communication / data-read connectors (dotted), e.g. PULSE pulling the HOPPER
  const assocEls = COMMS.map(f=>`<bpmn:association id="${f[0]}__${f[1]}_a" associationDirection="${f[3]&&f[3].undirected?'None':'One'}" sourceRef="${f[0]}" targetRef="${f[1]}"/>`).join('\n    ');
  const assocShapes = COMMS.map(f=>{
    const wp = edgePts(f).map(p=>`<di:waypoint x="${Math.round(p.x)}" y="${Math.round(p.y)}"/>`).join('');
    return `<bpmndi:BPMNEdge id="${f[0]}__${f[1]}_a_di" bpmnElement="${f[0]}__${f[1]}_a">${wp}</bpmndi:BPMNEdge>`;
  }).join('\n      ');

  return `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="Defs" targetNamespace="http://tron/flow">
  <bpmn:collaboration id="Collab">
    <bpmn:participant id="Pool" name="" processRef="Proc"/>
  </bpmn:collaboration>
  <bpmn:process id="Proc" isExecutable="false">
    <bpmn:laneSet id="LS">
      ${laneEls}
    </bpmn:laneSet>
    ${flowEls}
    ${seqEls}
    ${assocEls}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="Dg"><bpmndi:BPMNPlane id="Pl" bpmnElement="Collab">
      ${poolShape}
      ${laneShapes}
      ${nodeShapes}
      ${edgeShapes}
      ${assocShapes}
  </bpmndi:BPMNPlane></bpmndi:BPMNDiagram>
</bpmn:definitions>`;
}

        wp = drow>0 ? [[s.cx,s.bottom],[t.cx,t.top]] : [[s.cx,s.top],[t.cx,t.bottom]];
      } else {                                                        // cross-lane hop → exit sideways toward target (never up through the source column), turn at the target column, enter top/bottom
        const ey=s.cy+stag, exX=dcol>0?s.right:s.left, enterY=drow>0?t.top:t.bottom;
        wp=[[exX,ey],[t.cx,ey],[t.cx,enterY]];
      }
    }
    // label at the midpoint of the edge's middle segment, offset off the line — diverging branches never share an anchor
    let lbl='';
    if(SHOW_EDGE_LABELS && e.label){
      let lx,ly;
      if(e.vlabel){                                              // vertical label beside its line, hugging the gateway (source), letter-bottoms toward the line (rotated post-render)
        const lineX=wp[0][0], above=t.cy<s.cy, cx2=lineX+12;
        const cy2 = above ? s.top-26 : s.bottom+40;              // repair: just above the gateway · halt: below the bottom-centre id label
        lx=cx2-32; ly=cy2-7;
      } else if(e.labelAt==='start'){                            // hug the source: sit at the start of the first long run after the gateway
        const a=wp.length>3?wp[1]:wp[0], b=wp.length>3?wp[2]:wp[1], horiz=Math.abs(b[0]-a[0])>=Math.abs(b[1]-a[1]);
        lx=horiz?(a[0]<b[0]?a[0]+TOK.labelGap:a[0]-26-TOK.labelGap):a[0]+TOK.labelGap; ly=horiz?a[1]-16:a[1]+TOK.labelGap;
      } else {
        const i0=Math.floor((wp.length-1)/2), a=wp[i0], b=wp[i0+1];
        const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2, horiz=Math.abs(b[0]-a[0])>=Math.abs(b[1]-a[1]);
        lx=horiz?mx-26:mx+TOK.labelGap; ly=horiz?my-16:my-7;
      }
      lbl=`<bpmndi:BPMNLabel><dc:Bounds x="${Math.round(lx)}" y="${Math.round(ly)}" width="64" height="14"/></bpmndi:BPMNLabel>`;
    }
    di.push(`<bpmndi:BPMNEdge id="sf${k}_di" bpmnElement="sf${k}">${wp.map(p=>`<di:waypoint x="${Math.round(p[0])}" y="${Math.round(p[1])}"/>`).join('')}${lbl}</bpmndi:BPMNEdge>`);
  });

  // data objects — emitted from the precomputed token boxes; label on the far side so it never crosses the association
  const dataEls=[], assoc=[];
  dataBoxes.filter(Boolean).forEach(b=>{
    const {i, d, at, W, H, out, store, dx, dy, p1, p2} = b;
    const sfx = b.node || i, nodeRef = b.node || ('T'+i);   // node='S' for start-event data; else the step
    const ref=`DOR${sfx}`, obj=`DO${sfx}`, aId=`asc${sfx}`;
    const dispName = esc((d.id?d.id+'\n':'')+d.name);   // ID on top (maps to the prompt file in the folder), name below
    if(store){ dataEls.push(`<bpmn:dataStoreReference id="${ref}" name="${dispName}"/>`); }   // cylinder (shared read store)
    else { dataEls.push(`<bpmn:dataObjectReference id="${ref}" name="${dispName}" dataObjectRef="${obj}"/>`); dataEls.push(`<bpmn:dataObject id="${obj}"/>`); }
    const lblH = d.id?26:14, lblY = at==='above' ? dy-lblH : dy+H+3;   // far side of the icon (away from the node)
    const undirected = store && !out;   // store READ = undirected line (the read is the node's action; store is passive) — matches core HOPPER→PULSE
    assoc.push(`<bpmn:association id="${aId}" sourceRef="${out?nodeRef:ref}" targetRef="${out?ref:nodeRef}" associationDirection="${undirected?'None':'One'}"/>`);
    di.push(`<bpmndi:BPMNShape id="${ref}_di" bpmnElement="${ref}"><dc:Bounds x="${Math.round(dx)}" y="${Math.round(dy)}" width="${W}" height="${H}"/><bpmndi:BPMNLabel><dc:Bounds x="${Math.round(dx+W/2-50)}" y="${Math.round(lblY)}" width="100" height="${lblH}"/></bpmndi:BPMNLabel></bpmndi:BPMNShape>`);
    const awp = out?[p1,p2]:[p2,p1];
    di.push(`<bpmndi:BPMNEdge id="${aId}_di" bpmnElement="${aId}">${awp.map(p=>`<di:waypoint x="${Math.round(p[0])}" y="${Math.round(p[1])}"/>`).join('')}</bpmndi:BPMNEdge>`);
  });

  return `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" id="D_sp" targetNamespace="http://tron/flow">
  <bpmn:collaboration id="CollabS"><bpmn:participant id="PoolS" name="" processRef="SP"/></bpmn:collaboration>
  <bpmn:process id="SP" isExecutable="false">
    <bpmn:laneSet id="LS_S">${lanes}</bpmn:laneSet>
    ${els.join('\n    ')}
    ${dataEls.join('\n    ')}
    ${fl.join('\n    ')}
    ${assoc.join('\n    ')}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="Dg_sp"><bpmndi:BPMNPlane id="Pl_sp" bpmnElement="CollabS">
    ${di.join('\n    ')}
  </bpmndi:BPMNPlane></bpmndi:BPMNDiagram>
</bpmn:definitions>`;
}

/* ════════════ RENDER ════════════ */
// repaint node shapes after edges so sequence flows sit beneath the boxes
// TODO(flow): edges still overlap some node boxes — appendChild reorder is partial.
//   Real fix likely needs per-edge waypoint clipping to shape borders, or a
//   separate connection layer. Deferred.
function edgesBehind(viewer){
  const er = viewer.get('elementRegistry');
  er.forEach(el=>{
    if(el.waypoints) return;                                   // skip connections
    if(el.type==='bpmn:Participant' || el.type==='bpmn:Lane') return; // keep pool/lanes back
    const g = er.getGraphics(el);
    if(g && g.parentNode) g.parentNode.appendChild(g);         // move to front
  });
}
// collapsed sub-process: bpmn-js centers the label but bottoms the [+] marker, leaving the
// content low with empty top. Shift label + marker up as one unit so it reads centered.
function recenterSubMarkers(viewer){
  const er=viewer.get('elementRegistry');
  er.filter(e=>e.type==='bpmn:SubProcess').forEach(e=>{
    const vis=er.getGraphics(e).querySelector('.djs-visual'); if(!vis) return;
    [...vis.children].forEach((ch,idx)=>{
      if(idx===0) return;                                   // keep the box outline
      const dy = idx===1 ? -12.5 : -7.5;                    // label up more, marker less → modest gap, still centered
      ch.setAttribute('transform', `translate(0,${dy}) ${ch.getAttribute('transform')||''}`.trim());
    });
  });
}
// bpmn-js draws no divider between a lane's owner-name band and its content — add one,
// inside the lane's own graphics group so it renders identically to the lane border
function addLaneDividers(viewer){
  const er = viewer.get('elementRegistry'), NS='http://www.w3.org/2000/svg';
  er.filter(e=>e.type==='bpmn:Lane').forEach(l=>{
    const g=er.getGraphics(l); if(!g) return;
    const ref=g.querySelector('rect'), cs=ref?getComputedStyle(ref):null;
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',30); ln.setAttribute('y1',0);     // local coords (lane group is translated)
    ln.setAttribute('x2',30); ln.setAttribute('y2',l.height);
    ln.setAttribute('stroke', cs?cs.stroke:'rgb(34, 36, 42)');
    ln.setAttribute('stroke-width', cs?parseFloat(cs.strokeWidth):1.5);
    g.appendChild(ln);
  });
}
// keep the viewport inside the diagram bounds (no infinite canvas)
function clampVB(canvas){
  const vb=canvas.viewbox(), inner=vb.inner; let {x,y,width,height}=vb;
  x = width>=inner.width  ? inner.x-(width-inner.width)/2   : Math.min(Math.max(x,inner.x), inner.x+inner.width-width);
  y = height>=inner.height? inner.y-(height-inner.height)/2 : Math.min(Math.max(y,inner.y), inner.y+inner.height-height);
  canvas.viewbox({x,y,width,height});
}
function fitNow(viewer){ const c=viewer.get('canvas'); c.zoom('fit-viewport','auto'); c.zoom(c.zoom()*0.9); viewer._minScale=c.zoom(); clampVB(c); }
function attachPanZoom(viewer, sel, ctlHostSel){
  if(viewer._panzoom) return; viewer._panzoom=true;
  const canvas=viewer.get('canvas'), c=document.querySelector(sel);
  c.style.position='relative'; c.style.cursor='grab';
  const min=()=>viewer._minScale||0.05, max=()=>(viewer._minScale||0.2)*6;
  const setZoom=s=>{ s=Math.min(Math.max(s,min()),max()); canvas.zoom(s); clampVB(canvas); };
  const ctl=document.createElement('div'); ctl.className='zoomctl';
  ctl.innerHTML='<button data-z="in">+</button><button data-z="out">−</button><button data-z="fit">⤢</button>';
  const host=document.querySelector(ctlHostSel); host.insertBefore(ctl, host.firstChild);   // zoom sits first in the header control cluster
  ctl.addEventListener('click',e=>{ const z=e.target.dataset.z; if(!z)return;
    if(z==='fit') fitNow(viewer); else setZoom(canvas.zoom()*(z==='in'?1.25:0.8)); });
  c.addEventListener('wheel',e=>{ e.preventDefault(); setZoom(canvas.zoom()*(e.deltaY<0?1.12:0.89)); },{passive:false});
  let drag=false;
  c.addEventListener('mousedown',e=>{ if(e.target.closest('.zoomctl'))return; drag=true; c.style.cursor='grabbing'; });
  window.addEventListener('mouseup',()=>{ if(drag){drag=false; c.style.cursor='grab';} });
  c.addEventListener('mousemove',e=>{ if(!drag)return; canvas.scroll({dx:e.movementX,dy:e.movementY}); clampVB(canvas); });
}
// rotate marked edge labels (vlabel) to vertical, around their own centre — for labels that sit beside a vertical line
function rotateVLabels(viewer, def){
  const reg=viewer.get('elementRegistry');
  (def.edges||[]).forEach((e,k)=>{
    if(!e.vlabel) return;
    const lbl=reg.get('sf'+k+'_label'); if(!lbl) return;
    const gfx=reg.getGraphics(lbl); if(!gfx) return;
    let bb; try{ bb=gfx.getBBox(); }catch(_){ return; }
    const cx=bb.x+bb.width/2, cy=bb.y+bb.height/2, tr=gfx.getAttribute('transform')||'';
    gfx.setAttribute('transform', (tr?tr+' ':'')+`rotate(90 ${cx} ${cy})`);  // letter-bottoms face the line
  });
}
let ovViewer, ovStack=[], ovCurrent=null;
function openFlow(key){ if(FLOW[key]){ ovStack.push(key); renderFlow(); } }
function ovBack(){ ovStack.pop(); if(ovStack.length===0) closeOv(); else renderFlow(); }
function closeOv(){ ovStack=[]; document.getElementById('ov').classList.remove('open'); syncNotesTo(null); }
async function renderFlow(){
  const key=ovStack[ovStack.length-1], def=FLOW[key]; ovCurrent=def;
  document.getElementById('ovhead').innerHTML = headBar({num:def.num, name:def.name, back:true});
  document.getElementById('ov').classList.add('open');
  if(!ovViewer){
    ovViewer = new BpmnJS({ container:'#ovcanvas' });
    ovViewer.get('eventBus').on('element.click', e=>{
      const m=/^T(\d+)$/.exec(e.element.id); if(!m) return;
      const st=ovCurrent.steps[+m[1]]; if(st && st.opens) openFlow(st.opens);
    });
  }
  await ovViewer.importXML(subXML(def));
  const canvas=ovViewer.get('canvas');
  def.steps.forEach((s,i)=>{
    if(s.kind==='sub') canvas.addMarker('T'+i,'has-sub');
    else { const a=s.actor||'det'; if(a!=='det') canvas.addMarker('T'+i,a); }
  });
  edgesBehind(ovViewer);
  addLaneDividers(ovViewer);
  recenterSubMarkers(ovViewer);
  rotateVLabels(ovViewer, def);
  fitNow(ovViewer);
  attachPanZoom(ovViewer,'#ovcanvas','#ovctl');
  syncNotesTo(key);                     // canvas → notes: load this node's annotation page (if the panel is open)
}
document.getElementById('ov').addEventListener('click', e=>{ if(e.target.id==='ov') closeOv(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeOv(); });

// annotations ⇄ canvas sync — the panel reloads a per-diagram page (flow-description.html?d=ND-xx)
function notesSrcFor(id){ return 'flow-description.html' + (id ? ('?d=' + encodeURIComponent(id)) : ''); }
function syncNotesTo(id){               // swap the annotation page to this node (overview when id is null); no-op until the panel is opened
  const f=document.getElementById('notes-frame');
  if(!f || !f.getAttribute('src')) return;
  const want=notesSrcFor(id);
  if(f.getAttribute('src')!==want) f.setAttribute('src', want);
}
window.addEventListener('message', e=>{ // notes → canvas: a node badge was clicked in the annotations
  const d=e.data; if(!d || d.type!=='tron-flow') return;
  if(FLOW[d.id]){ ovStack=[]; openFlow(d.id); }   // swap the canvas to that sub-diagram (non-sub ids have no diagram)
});

// annotations panel — lazy-loads the flow notes on first open, slides in from the right
function toggleNotes(force){
  const p=document.getElementById('notes');
  const open = force===undefined ? !p.classList.contains('open') : force;
  if(open){                              // open to the page matching whatever the canvas is showing
    const f=document.getElementById('notes-frame');
    const want=notesSrcFor(ovStack.length ? ovStack[ovStack.length-1] : null);
    if(f.getAttribute('src')!==want) f.setAttribute('src', want);
  }
  p.classList.toggle('open', open);
  document.body.classList.toggle('notes-open', open);
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') toggleNotes(false); });

// EXPERIMENT — render LLM nodes as the bpmn-io nyan cat (replaces the shape's visual; drops the label, like the real renderer).
const NYAN_CAT_URL = 'nyan-cat.gif';   // vendored locally (was raw.githubusercontent.com — remote fetch per cat was the load-time hit)
function nyanify(viewer){
  const er = viewer.get('elementRegistry'), NS='http://www.w3.org/2000/svg', XL='http://www.w3.org/1999/xlink';
  NODES.filter(n=>n.llm).forEach(n=>{
    const g = er.getGraphics(n.id); if(!g) return;
    const vis = g.querySelector('.djs-visual'); if(!vis) return;
    while(vis.firstChild) vis.removeChild(vis.firstChild);
    const barH = 26, catH = n.h - barH;                        // box is sized to the cat's 1.43 aspect + a 2-line label strip (LLM id + name)
    const img = document.createElementNS(NS,'image');
    img.setAttribute('x',0); img.setAttribute('y',0);
    img.setAttribute('width',n.w); img.setAttribute('height',catH);
    img.setAttribute('href', NYAN_CAT_URL);
    img.setAttributeNS(XL,'href', NYAN_CAT_URL);
    img.setAttribute('preserveAspectRatio','xMidYMid meet');   // whole cat, no crop (region matches the cat aspect)
    vis.appendChild(img);
    const mkText=(y,size,weight,txt)=>{ const t=document.createElementNS(NS,'text');
      t.setAttribute('x', n.w/2); t.setAttribute('y', y); t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family','Space Grotesk, sans-serif'); t.setAttribute('font-size',size);
      t.setAttribute('font-weight',weight); t.setAttribute('fill','#1C1917'); t.textContent=txt; vis.appendChild(t); };
    mkText(n.h-15, '9', '700', n.llmId || n.id);               // LLM id on top
    mkText(n.h-4, '10', '600', n.name);                        // descriptive name below
  });
}

(async ()=>{
  document.getElementById('corehead').innerHTML = headBar({name:'workflow'});   // same header component as the subs
  layoutCore();                         // derive core geometry from the track grid (TOK is defined by now)
  const core = new BpmnJS({ container:'#core' });
  await core.importXML(coreXML());
  const canvas = core.get('canvas');
  NODES.filter(n=>n.sub).forEach(n=> canvas.addMarker(n.id,'has-sub'));
  // (LLM nodes are rendered as nyan cats below — no emerald class on the core)
  edgesBehind(core);
  addLaneDividers(core);
  recenterSubMarkers(core);
  nyanify(core);                        // EXPERIMENT: LLM nodes → nyan cat
  fitNow(core);
  attachPanZoom(core,'#core','#corectl');
  core.get('eventBus').on('element.click', e=>{
    const n = byId[e.element.id];
    if(n && n.sub) openFlow(n.id);
  });
})();
</script>
